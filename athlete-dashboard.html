  importSessions(){
    /* Accepts: whole runs.json ({runs:[{date,run_type,dist_km,time_s,…}]}) ·
       {gym:[{d,name}]} · a prior state export ({sessions:{…}}) · or any mix.
       Merge = replace-by-date within each kind. Import-only: the lens never
       writes back — runs.json and MacroFactor stay the sources of truth. */
    try{
      const p=JSON.parse(qs("sess_io").value); let nr=0, ng=0, skipped=0;
      const S=this.state.sessions;
      const upsert=(arr,e)=>{ const i=arr.findIndex(x=>x.d===e.d); if(i>=0) arr[i]=e; else arr.push(e); };
      const rawRuns = (p.sessions&&p.sessions.runs) || p.runs || [];
      rawRuns.forEach(r=>{ if(!r) return;
        const d=r.d||r.date; if(!d) return;
        // Quarantined runs (e.g. UTK 2025, injury-skewed) are KEPT for volume
        // display but tagged so any fitness/trend calc can exclude them.
        const isQ=(r.scale_flags||[]).some(f=>String(f).includes("quarantine"));
        upsert(S.runs,{ d, type:r.type||r.run_type||null,
          km: r.km!=null?r.km:(r.dist_km!=null?r.dist_km:null),
          h:  r.h!=null?r.h:(r.time_s!=null?Math.round(r.time_s/36)/100:null),
          quarantined: isQ });
        if(isQ) skipped++; else nr++; });
      const rawGym = (p.sessions&&p.sessions.gym) || p.gym || [];
      rawGym.forEach(g=>{ if(!g||!(g.d||g.date)) return; upsert(S.gym,{d:g.d||g.date, name:g.name||null}); ng++; });
      if(!nr&&!ng){ this.flash("Nothing recognised — expected runs.json and/or {gym:[…]}"); return; }
      S.runs.sort((a,b)=>a.d.localeCompare(b.d)); S.gym.sort((a,b)=>a.d.localeCompare(b.d));
      this.persist(); this.render();
      this.flash(`Merged ${nr} run${nr===1?"":"s"} · ${ng} gym session${ng===1?"":"s"}${skipped?` · ${skipped} quarantined skipped`:""}`);
    }catch(e){ this.flash("Sessions import failed — invalid JSON"); }
  },
  importFFF(){
    /* Accepts: intervals.icu Wellness CSV converted to JSON array [{date,ctl,atl,tsb,rampRate}]
       or the raw wellness CSV rows converted to objects. Merge by date, replace-on-conflict.
       Same import-only pattern as importSessions(). */
    try{
      const raw = JSON.parse(qs("fff_io").value);
      const rows = Array.isArray(raw) ? raw : (raw.fff||[]);
      if(!rows.length){ this.flash("Nothing recognised — expected array [{date,ctl,atl,tsb,rampRate}]"); return; }
      // field-preserving merge: never null-out an existing channel
      const nn=v=>(v!=null&&!isNaN(+v))?+v:null;
      const upsert=(arr,e)=>{ const i=arr.findIndex(x=>x.date===e.date);
        if(i<0){ arr.push(e); return; }
        const cur=arr[i]; Object.keys(e).forEach(k=>{ if(k==="date") return; if(e[k]!=null) cur[k]=e[k]; }); };
      let n=0;
      rows.forEach(r=>{ if(!r||!r.date) return;
        const sleepSecs=nn(r.sleepSecs);
        upsert(this.state.fff,{ date:r.date,
          ctl: nn(r.ctl), atl:nn(r.atl),
          tsb: r.tsb!=null?+r.tsb:(nn(r.ctl)!=null&&nn(r.atl)!=null?+(r.ctl-r.atl).toFixed(3):null),
          rampRate: nn(r.rampRate!=null?r.rampRate:r.ramp_rate),
          rhr:nn(r.rhr!=null?r.rhr:r.restingHR), hrv:nn(r.hrv),
          readiness:nn(r.readiness),
          sleepSecs, sleepHrs:sleepSecs!=null?+(sleepSecs/3600).toFixed(2):nn(r.sleepHrs),
          sleepScore:nn(r.sleepScore) });
        n++; });
      this.state.fff.sort((a,b)=>a.date.localeCompare(b.date));
      this.persist(); this.render();
      this.flash(`FFF: merged ${n} wellness row${n===1?"":"s"}`);
    }catch(e){ this.flash("FFF import failed — paste a JSON array [{date,ctl,atl,tsb,rampRate}]"); }
  },

  async syncICU(){
    /* Calls the Cloudflare Worker relay, which calls intervals.icu server-side.
       Worker returns {activities:[…], wellness:[…]} — same shape as CSV exports.
       Requires WORKER_URL to be set (Data tab shows the URL input). */
    const url = (qs("worker_url")||{}).value || WORKER_URL;
    if(!url){ this.flash("Worker URL not set — paste it in the field above or edit WORKER_URL in the file"); return; }
    const btn = qs("sync_btn");
    if(btn){ btn.disabled=true; btn.textContent="⟳ Syncing…"; }
    try{
      const res = await fetch(url, {method:"GET", headers:{"Accept":"application/json"}});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // Ingest activities → sessions.runs + body weight (icu_weight, kg, when present)
      let nr=0, nf=0, nw=0, skipped=0;
      const S=this.state.sessions;
      const upsertR=(arr,e)=>{ const i=arr.findIndex(x=>x.d===e.d); if(i>=0) arr[i]=e; else arr.push(e); };
      const upsertBdy=(arr,e)=>{ const i=arr.findIndex(x=>x.d===e.d);
        if(i>=0){ if(e.kg!=null) arr[i].kg=e.kg; } // weight-only: never overwrite existing bf%
        else arr.push({d:e.d, kg:e.kg}); };
      (data.activities||[]).forEach(r=>{
        const d=(r.start_date_local||r.date||r.Date||"").slice(0,10); if(!d) return;
        // Body weight: icu_weight field present on any activity type (Withings→MFP→Garmin→ICU chain)
        const wkg=r.icu_weight!=null?+r.icu_weight:null;
        if(wkg!=null&&wkg>30&&wkg<200){ upsertBdy(this.state.body,{d,kg:Math.round(wkg*10)/10}); nw++; }
        // Runs only
        const type=r.type||r.Type||r.sport_type||"";
        if(!["Run","TrailRun","VirtualRun"].includes(type)) return;
        const dist_m=r.distance||r.Distance||r.icu_distance||r.dist_m||null;
        const dist_km=dist_m?Math.round(dist_m/10)/100:null;
        const time_s=r.moving_time||r.elapsed_time||r["Moving Time"]||r.time_s||null;
        upsertR(S.runs,{ d, type:type==="TrailRun"?"easy":type==="Run"?"easy":"easy", km:dist_km,
          h: time_s?Math.round(time_s/36)/100:null });
        nr++;
      });
      // Ingest wellness → fff (CTL/ATL/TSB/rampRate + daily wellness channels).
      // Merge-by-date, field-preserving: a later sync that lacks a channel must
      // not wipe a value an earlier sync/import set. Only overwrite when the
      // incoming value is non-null.
      const nn=v=>(v!=null&&!isNaN(+v))?+v:null;
      const upsertF=(arr,e)=>{ const i=arr.findIndex(x=>x.date===e.date);
        if(i<0){ arr.push(e); return; }
        const cur=arr[i];
        Object.keys(e).forEach(k=>{ if(k==="date") return; if(e[k]!=null) cur[k]=e[k]; });
      };
      (data.wellness||[]).forEach(r=>{
        const date=(r.date||"").slice(0,10); if(!date) return;
        const ctl=nn(r.ctl), atl=nn(r.atl);
        const sleepSecs=nn(r.sleepSecs);
        upsertF(this.state.fff,{ date, ctl, atl,
          tsb:(ctl!=null&&atl!=null)?+(ctl-atl).toFixed(3):(nn(r.tsb)),
          rampRate:nn(r.rampRate),
          rhr:nn(r.rhr), hrv:nn(r.hrv), readiness:nn(r.readiness),
          sleepSecs, sleepHrs:sleepSecs!=null?+(sleepSecs/3600).toFixed(2):nn(r.sleepHrs),
          sleepScore:nn(r.sleepScore) });
        nf++;
      });
      S.runs.sort((a,b)=>a.d.localeCompare(b.d));
      this.state.fff.sort((a,b)=>a.date.localeCompare(b.date));
      this.state.body.sort((a,b)=>a.d.localeCompare(b.d));
      // Stash the sync diagnostics (not persisted state shape — a transient
      // note the Data tab surfaces, so the provisional-scope reveal is visible).
      this.lastSync={ at:new Date().toISOString(),
        detailDiag:data.detailDiag||null, coverage:data.wellnessCoverage||null };
      this.persist(); this.render();
      // Build an honest coverage line for the flash.
      const cov=data.wellnessCoverage, dd=data.detailDiag;
      let extra="";
      if(cov){ const has=k=>cov[k]?cov[k]:"none";
        extra=` · wellness back to ${cov.oldest||"—"} (RHR from ${has("first_rhr")}, HRV from ${has("first_hrv")}, sleep from ${has("first_sleep")})`; }
      if(dd&&dd.detailAvailable===false) extra+=` · ⚠ no activity-detail fields on recent runs — detail half is inert (summary-only holds)`;
      this.flash(`Sync complete — ${nr} run${nr===1?"":"s"} · ${nf} wellness row${nf===1?"":"s"}${nw?` · ${nw} weight point${nw===1?"":"s"}`:""}${extra}`);
    }catch(e){
      this.flash(`Sync failed: ${e.message}`);
    }finally{
      if(btn){ btn.disabled=false; btn.textContent="↻ Sync now"; }
    }
  },

  /* ── Scorecard (v1.5): computed from logged data only — "—" until data exists ── */
  scores(){
    const S=this.state, cw=todayWeek();
    // running adherence: executed vs plan hours over weeks with actuals
    let adh=null; { let ph=0,ah=0; Object.keys(S.actualWeeks||{}).forEach(k=>{ const a=S.actualWeeks[k];
      if(a&&a.h!=null&&PLAN[k-1]){ ph+=PLAN[k-1].h; ah+=a.h; } });
      if(ph>0) adh=Math.round(ah/ph*100); }
    // strength + running done/planned this week to date
    const now=new Date(); const di=Math.min(6,(now.getDay()+6)%7);
    const {R,G}=sessionMaps();
    let gp=0,gd=0,rp=0,rd=0;
    for(let i=0;i<=di;i++){ const p=plannedDay(cw,i), iso=dayISO(cw,i);
      if(classifyGym(p.g)){ gp++; if(G[iso]) gd++; }
      if(classifyRun(p.r)!=="rest"){ rp++; if(R[iso]) rd++; } }
    // protein: last 7 calendar days, days ≥117 g
    const wk=[...Array(7)].map((_,k)=>{ const d=new Date(Date.now()-k*864e5);
      return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); });
    const plog=(S.protein||[]).filter(p=>wk.includes(p.d));
    const pHit=plog.filter(p=>p.g>=117).length, pDays=plog.length;
    // health: latest value per marker vs range
    let flags=0, seen=0;
    MARKERS.forEach(m=>{ const pts=(S.labs||[]).filter(l=>l.marker===m.id).sort((a,b)=>a.d.localeCompare(b.d));
      if(!pts.length) return; seen++;
      const lv=pts[pts.length-1].value;
      if((m.lo!=null&&lv<m.lo)||(m.hi!=null&&lv>m.hi)) flags++; });
    // mind: latest weekly check-in → 0–100 (stress inverted)
    const ci=[...(S.checkins||[])].sort((a,b)=>a.d.localeCompare(b.d)).pop()||null;
    const mind=ci?Math.round(((ci.sleep+(6-ci.stress)+ci.mot)/3)/5*100):null;
    return {adh, gym:gp?`${gd}/${gp}`:null, gymOK:gp?gd/gp:null, run:rp?`${rd}/${rp}`:null, runOK:rp?rd/rp:null,
            prot:pDays?`${pHit}/7`:null, protOK:pDays?pHit/7:null, flags, seen, mind, ci};
  },

  boardSignals(){
    /* Live wellness read-outs, routed to the relevant board persona's lens.
       COMPUTED from synced data — NOT written into state.boardNotes (those stay
       coach-authored dated entries; fabricating them would break the no-invented-
       data rule). Each signal has a severity; only `action`-severity items are
       promoted to the CEO banner. All thresholds are trend-vs-own-baseline, never
       cross-athlete and never across the 3 Jul chest-strap break. Returns
       {items:[{persona,role,text,sev}], ceo:[…action texts…]} or null if no data. */
    const fff=(this.state.fff||[]).filter(r=>r.date);
    if(!fff.length) return null;
    const roleOf=id=>(BOARD.find(b=>b.id===id)||{}).role||id;
    // helper: latest value + baseline (mean of prior 7 non-null, excluding latest)
    const chan=id=>{ const p=fff.filter(r=>r[id]!=null); if(!p.length) return null;
      const cur=p[p.length-1][id]; const prior=p.slice(-8,-1).map(r=>r[id]);
      const base=prior.length?prior.reduce((s,v)=>s+v,0)/prior.length:null;
      return {cur, base:base!=null?+base.toFixed(1):null, n:p.length}; };
    const items=[]; const ceo=[];
    const push=(persona,text,sev)=>{ items.push({persona,role:roleOf(persona),text,sev}); if(sev==="action") ceo.push(text); };

    const hrv=chan("hrv"), rhr=chan("rhr"), rd=chan("readiness"), sl=chan("sleepHrs");
    // HRV — Data Analyst lens; suppressed vs baseline = overreach signal (Physio/CMO on action)
    if(hrv&&hrv.base!=null){ const d=(hrv.cur-hrv.base)/hrv.base*100;
      if(d<=-12) push("data",`HRV ${fmt(hrv.cur,0)} ms is ${fmt(Math.abs(d),0)}% below its 7-day baseline (${fmt(hrv.base,0)}) — an overreach flag. Corroborate with RHR + readiness before cutting load.`,"action");
      else if(d>=8) push("data",`HRV ${fmt(hrv.cur,0)} ms sits above baseline — parasympathetic recovery looks intact.`,"info");
      else push("data",`HRV ${fmt(hrv.cur,0)} ms tracking its own baseline (${fmt(hrv.base,0)}) — no divergence.`,"info"); }
    // RHR — Physio/CMO lens; elevated vs baseline = accumulated fatigue/illness
    if(rhr&&rhr.base!=null){ const d=rhr.cur-rhr.base;
      if(d>=5) push("phys",`Resting HR ${fmt(rhr.cur,0)} bpm is ${fmt(d,0)} above baseline (${fmt(rhr.base,0)}) — fatigue or an incoming bug. Cross-check HRV; if both point the same way, it's real.`,"action");
      else push("phys",`Resting HR ${fmt(rhr.cur,0)} bpm near baseline — nothing flagging.`,"info"); }
    // Readiness — COO/Mindset lens; low readiness = check the quality day, don't auto-cut
    if(rd){ if(rd.cur<45) push("coo",`Readiness ${fmt(rd.cur,0)}/100 is low. If today carries a quality run, the call is to inspect the session — not reflexively cut it — and to look at what sleep/stress drove it.`,"action");
      else if(rd.cur>=70) push("coo",`Readiness ${fmt(rd.cur,0)}/100 — green. Good day to bank a harder session if the plan calls for one.`,"info");
      else push("coo",`Readiness ${fmt(rd.cur,0)}/100 — moderate. Proceed as planned, watch the warm-up.`,"info"); }
    // Sleep — COO (the lever a full-time job squeezes first) + Dietitian if chronic
    if(sl&&sl.base!=null){ if(sl.base<6.5) push("coo",`Sleep averaging ${fmt(sl.base,1)} h over the last week — under the 7 h hypertrophy/recovery floor. This is the first lever to protect before adaptation slips.`,"action");
      else push("coo",`Sleep averaging ${fmt(sl.base,1)} h — holding the recovery floor.`,"info"); }

    return {items, ceo};
  },

          <div style="font-size:12.5px;color:var(--chalk);margin-top:8px">${esc(t.purpose)}</div>
          <div style="font-size:12px;margin-top:8px"><span style="font-family:var(--mono);color:${C.teal};font-size:10px;letter-spacing:.1em">RX </span><span style="color:var(--mist)">${esc(t.rx)}</span></div>
          <div style="font-size:12px;margin-top:4px"><span style="font-family:var(--mono);color:${C.amber};font-size:10px;letter-spacing:.1em">STRUCTURE </span><span style="color:var(--mist)">${esc(t.structure)}</span></div>
          <div class="note" style="margin-top:4px">log: ${esc(t.log)}</div>
        </div>`).join("");
      return `<div><div class="eyebrow" style="margin:6px 0">${gr}</div><div class="cols3">${items}</div></div>`; }).join("");
    const tn=[...(this.state.taxNotes||[])].sort((a,b)=>b.d.localeCompare(a.d));
    const noteRows=tn.length?tn.map(n=>`<tr>
      <td style="font-family:var(--mono);font-size:11px;color:var(--dim);width:86px;vertical-align:top">${esc(n.d)}</td>
      <td style="width:110px;vertical-align:top"><span class="pill" style="font-size:9px">${esc((TYPE_BY_ID[n.type]||{name:n.type}).name)}</span></td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--dim);width:36px;vertical-align:top">P${esc(String(n.phase||"—"))}</td>
      <td style="font-size:12.5px;color:var(--chalk)">${esc(n.note)}</td></tr>`).join(""):"";
    const typeOpts=RUN_TYPES.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join("");
    return `
    <div class="card"><div class="eyebrow" style="color:${C.teal}">Run taxonomy — the standard session language</div>
      <div class="note" style="margin-top:6px">Every plan entry maps to one of these types (Week Lens chips deep-link here). The taxonomy is a locked registry: WHAT each session is never changes mid-plan. What shifts by period is the FOCUS — captured as dated notes below. Rx reads symbolically until the wk-3 AeT test and wk-6 TT anchor the numbers.</div></div>
    ${cards}
    <div class="card"><div class="eyebrow" style="color:${C.amber}">Period focus notes — dated, per type</div>
      ${noteRows?`<table style="margin-top:10px"><tbody>${noteRows}</tbody></table>`:`<div class="empty">◦ No period notes yet.</div>`}
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center">
        <input id="tx_d" type="date" style="width:150px"><select id="tx_t">${typeOpts}</select>
        <input id="tx_p" type="number" min="1" max="11" placeholder="phase #" style="width:90px">
        <input id="tx_n" placeholder="focus note for this period" style="flex:1;min-width:200px">
        <button class="btn solid" data-act="taxAdd">Add note</button></div></div>`;
  },
  view_changelog(){
    const log=`v1.25  06/07/26  Daily wellness channels + Training Readiness.
                   Worker v2 (separate file): wellness 730 d every sync,
                   activity DETAIL_DAYS=90 (Option 3), passes RHR/HRV/readiness/
                   sleep + coverage + detail diagnostics. s.fff rows gain optional
                   rhr/hrv/readiness/sleep* (norm-safe, STORE_KEY unchanged,
                   back-compatible). syncICU + importFFF merge field-preservingly.
                   Training Readiness card on Overview — standalone graph, DAY/WEEK
                   toggle (week = macro-week means, axis matches the plan); NOT
                   bundled with the plan chart. Wellness section in the Health tab
                   (option A): stat cards + selectable trend, DAY/WEEK toggle,
                   screen-only (out of the clinical print). Boardroom: live signals
                   routed to persona lenses, only action items promoted to a CEO
                   banner (computed from Sync, not written into boardNotes). Data
                   tab shows a coverage reveal + activity-detail probe. New-channel
                   depth is provisional; no Body Battery (no standard ICU key).
                   node --check + render harness: clean.
v1.24  06/07/26  GitHub Pages hosting bake: WORKER_URL confirmed, Cloudflare
                   Worker ALLOWED_ORIGIN locked to https://andregarridoo.github.io.
                   Live URL: https://andregarridoo.github.io/andregarridoo-dashboard/
                   athlete-dashboard.html. Sync button now functional in real browser.
v1.23  05/07/26  Projection continuity: bias-correct dashed projection
                   lines so they start seamlessly from the last real FFF point
                   (eliminates the visual step-change at the join). Offset
                   Δ=(actual−proj) at last real week applied to all future
                   projection weeks. Both Overview (panels 2+3) and Running tab
                   FFF chart corrected. FFF_PROJ constant unchanged.
v1.22  05/07/26  5 UI changes: (1) Ph12 (W47–49) now renders — fixed
                   wEnd cap Math.min(46→49) in slider callback, crosshair,
                   view_overview IIFE, FFF/body loop, and plan-area close.
                   Week Lens next-button cap also corrected 46→49.
                   (2) Overview SVG fills card width: removed fixed px width
                   attribute — SVG now width="100%" (viewBox unchanged).
                   (3) Scorecard replaced with Performance Radar: new
                   perfRadarSVG() (6-axis hex: run adherence, run wk, gym wk,
                   protein, health, mind) + compact pill stats beside it.
                   scoreCard() retained for internal use; overviewRadarCard()
                   replaces it in Overview tab.
                   (4) Boardroom card moved above the main plan chart in
                   view_overview() — CEO synthesis is now the first thing
                   visible on the Overview tab.
                   (5) Changelog tab added — all changelog entries consolidated
                   here; stray post-&lt;/html&gt; text removed from source.
                   node --check + render harness: clean.
v1.21  05/07/26  8 changes: (1) High Risk TSB band pastelised. (2) FFF_PROJ
                   upgraded to PLAN-hours×IF model. (3) Race names aligned
                   across PLAN/PHASES/RACES. (4) Ph12 W47–49 added to PHASES +
                   PLAN; FFF_PROJ byWeek extended; future slider max 52.
                   (5) Header layout: KM/HRS pills + sliders top-right.
                   (6) Legend projection note removed.
v1.19  05/07/26  FFF plan-projection overlay (Bannister CTL τ=42/ATL τ=7,
                   seed 14.6/4.2, dashed lines + race TSB gate bands, toggle).
v1.18  05/07/26  Weight EWMA trend line (α=0.1, raw + smoothed).
v1.17  05/07/26  syncICU() weight upsert into state.body.
v1.16  05/07/26  Historic volume line + auto-sync on open.
v1.15  05/07/26  Historic run bars: dimmed, stub dots, full loop.
v1.14  05/07/26  syncICU() ROOT FIX: start_date_local field name.
v1.13  05/07/26  syncICU() field-name fix; WORKER_URL baked in.
v1.9.1–v1.9.7 05/07/26  FFF readiness bands, panel layout, crosshair,
                   tooltip volume row, y-axis tight fit, historic line style.
v1.9  05/07/26   Two-panel overviewSVG (plan + FFF), shared x-axis.
v1.8  05/07/26   Merged plan + FFF into single overviewSVG, dual y-axes.
v1.7.1–v1.7.3 05/07/26  Slider drag fix, shared crosshair + tooltip,
                   pre-plan history, negative week support.
v1.7  05/07/26   Linked date-range view: sliders drive plan + FFF.
v1.6  05/07/26   intervals.icu integration: FFF_DATA, importFFF(),
                   Cloudflare Worker Sync, FFF panel in Running tab.
v1.5  04/07/26   Scorecard, Athletic Board, Body Map, demo mode, girth radar.
v1.0–v1.4  02–04/07/26  Initial build; ported from React artifact.
                   Full early history in OPERATING_BRIEF.md.`;
    return `<div class="card">
      <div class="eyebrow" style="color:${C.teal};margin-bottom:12px">Dashboard changelog — v1.25 (current) → v1.0</div>
      <pre style="font-family:var(--mono);font-size:11px;color:var(--mist);line-height:1.7;white-space:pre-wrap;margin:0">${esc(log)}</pre>
    </div>`;
  },
  taxAdd(){
    const d=qs("tx_d").value, t=qs("tx_t").value, p=parseInt(qs("tx_p").value)||null, n=qs("tx_n").value.trim();
    if(!d||!n){ this.flash("Date and note required"); return; }
    this.state.taxNotes.push({d,type:t,phase:p,note:n}); this.persist(); this.render(); this.flash("Period note added");
  },
  addCheckin(){
    const d=qs("ci_d").value, sl=parseInt(qs("ci_s").value), st=parseInt(qs("ci_x").value), mo=parseInt(qs("ci_m").value);
    if(!d){ this.flash("Date required"); return; }
    this.state.checkins.push({d,sleep:sl,stress:st,mot:mo}); this.persist(); this.render(); this.flash("Check-in logged");
  },
  addProtein(){
    const d=qs("pr_d").value, g=parseFloat(qs("pr_g").value);
    if(!d||isNaN(g)){ this.flash("Date and grams required"); return; }
    this.state.protein.push({d,g}); this.persist(); this.render(); this.flash("Protein day logged");
  },
  toggleDemo(){
    if(this.demo){ this.state=this._real; this._real=null; this.demo=false; this.flash("Back to real data"); }
    else { this._real=this.state; this.state=norm(makeDemo()); this.demo=true; this.flash("Demo data loaded — read-only"); }
    this.gymDay=null; this.render();
  },
  doReset(){
    if(!this._resetArm){ this._resetArm=true; const b=qs("resetBtn"); if(b) b.textContent="Tap again to confirm reset";
      setTimeout(()=>{ this._resetArm=false; const b2=qs("resetBtn"); if(b2) b2.textContent="Reset data"; },3000); return; }
    this._resetArm=false; this.state=norm(JSON.parse(JSON.stringify(EMPTY))); this.persist(); this.render(); this.flash("Reset — plan itself is code and stays");
  },

  /* ── wiring ── */
  bind(){
    document.querySelectorAll("[data-act]").forEach(el=>{
      // Range sliders fire oninput continuously; wire them separately
      if(el.type==="range"){
        el.onchange=()=>{ const a=el.dataset.act, v=+el.value;
          if(a==="rangePast"){ this.ovRange.past=v; this.render(); }
          else if(a==="rangeFuture"){ this.ovRange.future=v; this.render(); }
        }; return;
      }
      el.onclick=()=>{ const a=el.dataset.act, v=el.dataset.v;
        if(a==="tab"){ this.tab=v; this.week=null; this.render(); }
        else if(a==="unit"){ this.unit=v; this.render(); }
        else if(a==="clinical"){ this.clinical=!this.clinical; this.render(); }
        else if(a==="marker"){ this.selMarker=v; this.render(); }
        else if(a==="seg"){ this.selSeg=v; this.render(); }
        else if(a==="print"){ window.print(); }
        else if(a==="back"){ this.closeWeek(); }
        else if(a==="wkprev"){ this.openWeek(this.week-1); }
        else if(a==="wknext"){ this.openWeek(this.week+1); }
        else if(a==="addWeek") this.addWeek();
        else if(a==="addBody") this.addBody();
        else if(a==="addLab") this.addLab();
        else if(a==="addLift") this.addLift();
        else if(a==="addSeg") this.addSeg();
        else if(a==="addGirth") this.addGirth();
        else if(a==="addProt") this.addProt();
        else if(a==="setTarget") this.setTarget();
        else if(a==="demoToggle") this.toggleDemo();
        else if(this.demo && ["addWeek","addBody","addLab","addLift","addGirth","addProt","setTarget","import","importSess","importFFF","reset","taxAdd","addCheckin","addProtein","export"].includes(a)){ this.flash("Demo mode is read-only — toggle off at the bottom"); }
        else if(a==="gymday"){ const [w,i]=v.split("-").map(Number); this.gymDay=(this.gymDay&&this.gymDay.w===w&&this.gymDay.i===i)?null:{w,i}; this.render(); }
        else if(a==="gymclose"){ this.gymDay=null; this.render(); }
        else if(a==="runtype"){ if(v){ this.selType=v; this.week=null; this.tab="sessions"; this.render(); const t=qs("type_"+v); if(t) t.scrollIntoView({behavior:"smooth",block:"center"}); } }
        else if(a==="board"){ this.boardOpen=!this.boardOpen; this.render(); }
        else if(a==="taxAdd") this.taxAdd();
        else if(a==="addCheckin") this.addCheckin();
        else if(a==="addProtein") this.addProtein();
        else if(a==="lensprev"){ this.selWeek=Math.max(1,(this.selWeek||todayWeek())-1); this.render(); }
        else if(a==="lensnext"){ this.selWeek=Math.min(49,(this.selWeek||todayWeek())+1); this.render(); }
        else if(a==="lensopen") this.openWeek(this.selWeek||todayWeek());
        else if(a==="importSess") this.importSessions();
        else if(a==="importFFF") this.importFFF();
        else if(a==="fffToggle"){ if(v&&this.fffViz.hasOwnProperty(v)){ this.fffViz[v]=!this.fffViz[v]; this.render(); } }
        else if(a==="readyView"){ if(v==="day"||v==="week"){ this.readyView=v; this.render(); } }
        else if(a==="wellMetric"){ if(v){ this.wellMetric=v; this.render(); } }
        else if(a==="wellView"){ if(v==="day"||v==="week"){ this.wellView=v; this.render(); } }
        else if(a==="syncICU"){ if(this.demo){ this.flash("Demo mode is read-only"); } else { this.syncICU(); } }
        else if(a==="export") this.doExport();
        else if(a==="import") this.doImport();
        else if(a==="reset") this.doReset(); };
    });
    // body figure segment taps
    document.querySelectorAll("rect[data-seg]").forEach(r=>{
      r.addEventListener("click",()=>{ this.selSeg=r.dataset.seg; this.render(); });
    });
    // hero + FFF shared crosshair tooltip
    const bindCharts=()=>{
      const wrap=qs("overviewWrap"), tip=qs("tip");
      if(!wrap||!tip) return;
      const moveCross=(w)=>{
        const cw=todayWeek(), past=App.ovRange.past, future=App.ovRange.future;
        const wStart=cw-past, wEnd=Math.min(49,cw+future);
        const span=wEnd-wStart; if(span<=0) return;
        const Pl=52, Pr=14, W=920, iw=W-Pl-Pr;
        const x=Pl+((w-wStart)/span)*iw;
        const ox=qs("overviewX");
        if(ox){ ox.setAttribute("x1",x); ox.setAttribute("x2",x); }
      };
      const hideCross=()=>{ const ox=qs("overviewX"); if(ox){ ox.setAttribute("x1","-999"); ox.setAttribute("x2","-999"); } };
      wrap.querySelectorAll("rect[data-w]").forEach(r=>{
        const show=(ev)=>{ const w=parseInt(r.dataset.w);
          tip.innerHTML=overviewTipHTML(w); tip.style.display="block";
          const x=Math.min(ev.pageX+14, window.scrollX+document.documentElement.clientWidth-260);
          tip.style.left=x+"px"; tip.style.top=(ev.pageY+14)+"px";
          moveCross(w); };
        r.addEventListener("pointerenter",show);
        r.addEventListener("pointermove",show);
        r.addEventListener("pointerleave",()=>{ tip.style.display="none"; hideCross(); });
        // click-through only for plan weeks (data-plan="1")
        if(r.dataset.plan==="1"){
          r.addEventListener("click",()=>{ tip.style.display="none"; hideCross(); App.openWeek(parseInt(r.dataset.w)); });
        }
      });
      wrap.addEventListener("pointerleave",()=>{ tip.style.display="none"; hideCross(); });
    };
    bindCharts();
  },
};

/* ── boot ── */
(async function(){
  Store.init();
  const saved = await Store.load();
  if(saved) App.state=norm(saved);
  else if(EMBEDDED_STATE) App.state=norm(EMBEDDED_STATE);
  App.render();
  // Auto-sync on open if Worker is configured — silent background pull
  if(WORKER_URL){ App.syncICU(); }
})();
</script>
</body>
</html>
