  *{box-sizing:border-box}
  body{margin:0;background:var(--night);color:var(--chalk);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1120px;margin:0 auto;padding:22px 16px 70px}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
  .card{background:var(--ridge);border:1px solid var(--contour);border-radius:10px;padding:16px}
  .grid{display:grid;gap:14px}
  .cols2{display:grid;gap:14px;grid-template-columns:1fr}
  .cols3{display:grid;gap:14px;grid-template-columns:1fr}
  .cols4{display:grid;gap:14px;grid-template-columns:1fr 1fr}
  @media(min-width:760px){.cols2{grid-template-columns:1fr 1fr}.cols3{grid-template-columns:1fr 1fr 1fr}.cols4{grid-template-columns:repeat(4,1fr)}}
  .empty{font-family:var(--mono);font-size:11px;color:var(--dim);padding:14px 0;line-height:1.7}
  button{font-family:var(--mono);cursor:pointer}
  .btn{font-size:11px;letter-spacing:.06em;padding:7px 12px;border-radius:7px;background:transparent;color:var(--mist);border:1px solid var(--contour)}
  .btn.solid{background:var(--teal);color:var(--night);border-color:var(--teal)}
  .btn.danger{color:var(--rose);border-color:var(--rose)}
  .btn:disabled{opacity:.4;cursor:default}
  .pill{font-size:10px;letter-spacing:.1em;padding:4px 10px;border-radius:999px;border:1px solid var(--contour);background:transparent;color:var(--mist)}
  .pill.on{background:var(--teal);color:var(--night);border-color:var(--teal)}
  .tabbar{display:flex;gap:2px;margin:20px 0 16px;border-bottom:1px solid var(--contour);overflow-x:auto}
  .tab{font-size:11px;letter-spacing:.08em;padding:9px 14px;background:transparent;border:none;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase}
  .tab.on{color:var(--chalk);border-bottom-color:var(--teal)}
  input,select,textarea{background:var(--night);border:1px solid var(--contour);border-radius:6px;color:var(--chalk);font-family:var(--mono);font-size:12px;padding:6px 8px;outline:none}
  label.f{display:flex;flex-direction:column;gap:4px}
  label.f span{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .scroll{overflow-x:auto}
  .note{font-family:var(--mono);font-size:9.5px;color:var(--dim);line-height:1.7}
  .flash{font-family:var(--mono);font-size:11px;color:var(--teal);min-height:16px}
  .tip{position:absolute;pointer-events:none;background:var(--ridge2);border:1px solid var(--contour);border-radius:8px;padding:10px 12px;max-width:240px;z-index:9;display:none}
  table{width:100%;border-collapse:collapse}
  td{border-bottom:1px solid var(--contour);padding:7px 0}
  a{color:var(--teal)}
  body.clinical{background:var(--paper);color:var(--ink)}
  body.clinical .card{background:#fff;border-color:var(--paperline)}
  body.clinical .eyebrow{color:var(--papersub)}
  body.clinical td{border-color:var(--paperline)}
  body.clinical input,body.clinical select{background:#fff;color:var(--ink);border-color:var(--paperline)}
  @media print{.no-print{display:none!important}body{background:#fff}}
  .lens-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
  .lens-day{border:1px solid var(--contour);border-radius:8px;padding:6px 5px;display:flex;flex-direction:column;gap:5px;min-width:0}
  .lens-dh{font-family:var(--mono);font-size:10px;color:var(--mist);display:flex;align-items:center;gap:4px}
  .lens-chip{font-family:var(--mono);font-size:9.5px;line-height:1.25;padding:4px 5px;border-radius:5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lens-rest{border:1px dashed var(--contour);color:var(--dim)}
  .lens-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:auto}
  @media(max-width:560px){.lens-grid{grid-template-columns:repeat(7,minmax(56px,1fr));overflow-x:auto}.lens-chip{font-size:8.5px}}
</style>

   pre-race days 32 TSS/day, race day = explicit race TSS, post-race days 5/day.
   STATIC — never synced, never persisted. Divergence from state.fff = calibration
   signal; log monthly in FFF_PROJECTION_BASELINE.md §4.
   Extend only with Andre's explicit sign-off on RUNNING_PLAN.md. ── */
const FFF_PROJ = (()=>{
  const W1proj=new Date(2026,5,29);
  const IF_W={
    1:0.65,2:0.65,3:0.65,
    4:0.72,5:0.72,6:0.72,7:0.72,
    8:0.48,
    10:0.50,11:0.55,
    12:0.65,13:0.67,14:0.67,15:0.65,16:0.68,17:0.68,
    18:0.78,19:0.78,20:0.75,
    21:0.58,
    23:0.45,24:0.50,25:0.52,
    26:0.62,27:0.63,28:0.63,29:0.63,30:0.62,31:0.65,
    32:0.75,33:0.77,34:0.77,
    35:0.80,36:0.70,37:0.78,38:0.80,39:0.70,
    40:0.80,41:0.82,42:0.82,43:0.76,
    44:0.72,45:0.68,
    47:0.45,48:0.50,49:0.55,
  };
  const RACE_TSS={9:120,22:420,46:800};
  const RACE_DATE={9:"2026-08-30",22:"2026-11-27",46:"2027-05-15"};
  const daily={};
  PLAN.forEach(p=>{
    const w=p.w,h=p.h;
    const isRace=RACE_TSS[w]!=null;
    if(isRace){
      const rdStr=RACE_DATE[w];
      const rd=new Date(rdStr+"T00:00:00");
      for(let d=0;d<7;d++){
        const dt=new Date(W1proj.getTime()+(w-1)*7*864e5+d*864e5);
        const iso=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
        daily[iso]=iso===rdStr?RACE_TSS[w]:dt<rd?32:5;
      }
    } else {
      const iF=IF_W[w]||0.70;
      const dTSS=Math.round(h*iF*100/7*10)/10;
      for(let d=0;d<7;d++){
        const dt=new Date(W1proj.getTime()+(w-1)*7*864e5+d*864e5);
        const iso=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
        daily[iso]=dTSS;
      }
    }
  });
  const kCTL=1-Math.exp(-1/42),kATL=1-Math.exp(-1/7);
  let ctl=14.6,atl=4.2;
  const rows=[];
  Object.keys(daily).sort().forEach(iso=>{
    const tss=daily[iso];
    ctl=ctl+kCTL*(tss-ctl); atl=atl+kATL*(tss-atl);
    rows.push({date:iso,tss:Math.round(tss*10)/10,ctl:Math.round(ctl*10)/10,atl:Math.round(atl*10)/10,tsb:Math.round((ctl-atl)*10)/10});
  });
  const idx={};
  rows.forEach(r=>{ idx[r.date]=r; });
  const byWeek={};
  rows.forEach(r=>{
    const d=new Date(r.date+"T00:00:00");
    const w=Math.floor((d-W1proj)/864e5/7)+1;
    if(w>=1&&w<=49) byWeek[w]=r;
  });
  return {rows,idx,byWeek};
})();

/* planWeekOf(iso) — which macro week (W1 = w/c Mon 29/06/26) a date falls in.
   Used to aggregate daily wellness to a weekly x-axis that lines up with the
   plan / FFF charts. Returns integer ≥1 (can exceed 49 for far-future dates). */
const planWeekOf = iso => {
  const w1=new Date(2026,5,29).getTime();
  const t=new Date(iso+"T00:00:00").getTime();
  return Math.floor((t-w1)/(7*864e5))+1;
};

/* aggregateWellness(rows, key, view) — from fff rows [{date, <key>, …}] build
   {cats:[label…], data:[value|null…]} at daily or weekly resolution.
   - "day":  one point per row, label = MM-DD, value = the raw channel.
   - "week": one point per macro week present in the data, label = "W#",
             value = mean of that week's non-null values (null if none).
   Weekly means align the x-axis to the plan/FFF charts (both W#-indexed). */
function aggregateWellness(rows, key, view){
  const pts=rows.filter(r=>r&&r.date&&r[key]!=null);
  if(view==="week"){
    const byW={};
    pts.forEach(r=>{ const w=planWeekOf(r.date); (byW[w]=byW[w]||[]).push(+r[key]); });
    const ws=Object.keys(byW).map(Number).sort((a,b)=>a-b);
    return { cats:ws.map(w=>"W"+w),
             data:ws.map(w=>{ const a=byW[w]; return a.length?+(a.reduce((s,v)=>s+v,0)/a.length).toFixed(2):null; }) };
  }
  return { cats:pts.map(r=>r.date.slice(5)), data:pts.map(r=>+r[key]) };
}

/* ── storage adapter: Claude → localStorage → memory ── */
const Store = {
  mode:"memory",
  init(){
    if (typeof window!=="undefined" && window.storage && window.storage.get) { this.mode="claude"; return; }
    try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); this.mode="local"; }
    catch(e){ this.mode="memory"; }
  },
  async load(){
    try{
      if(this.mode==="claude"){ const r=await window.storage.get(STORE_KEY); return (r&&r.value)?JSON.parse(r.value):null; }
      if(this.mode==="local"){ const v=localStorage.getItem(STORE_KEY); return v?JSON.parse(v):null; }
    }catch(e){}
    return null;
  },
  async save(s){
    try{
      const v=JSON.stringify(s);
      if(this.mode==="claude"){ await window.storage.set(STORE_KEY,v); }
      else if(this.mode==="local"){ localStorage.setItem(STORE_KEY,v); }
    }catch(e){ console.error("save failed",e); }
  },
};

function niceMax(v){ if(v<=0) return 1; const p=Math.pow(10,Math.floor(Math.log10(v))); const n=v/p; const m=n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10; return m*p; }

function chartSVG(o){
  const W=o.w||460, H=o.h||200, P={l:44,r:12,t:14,b:26};
  const iw=W-P.l-P.r, ih=H-P.t-P.b, n=o.cats.length;
  let vals=[];
  o.series.forEach(s=>s.data.forEach(v=>{ if(v!=null) vals.push(v); }));
  (o.refs||[]).forEach(r=>vals.push(r.y));
  if(o.band){ vals.push(o.band.lo, o.band.hi); }
  if(!vals.length) vals=[0,1];
  let lo = o.yMin!=null ? o.yMin : Math.min(...vals), hi = o.yMax!=null ? o.yMax : Math.max(...vals);
  if(lo===hi){ lo-=1; hi+=1; }
  const pad=(hi-lo)*0.12; if(o.yMin==null) lo-=pad; if(o.yMax==null) hi+=pad;
  const sx = i => n<=1 ? P.l+iw/2 : P.l + i*(iw/(n-1));
  const sy = v => P.t + ih - (v-lo)/(hi-lo)*ih;
  let g="";
  if(o.band) g+=`<rect x="${P.l}" y="${sy(o.band.hi)}" width="${iw}" height="${Math.max(0,sy(o.band.lo)-sy(o.band.hi))}" fill="${o.band.color||C.teal}" opacity="0.1"/>`;
  for(let i=0;i<=3;i++){ const v=lo+(hi-lo)*i/3, y=sy(v);
    g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${y}" y2="${y}" stroke="${o.line||C.contour}" stroke-opacity="0.35"/>`;
    g+=`<text x="${P.l-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="9" fill="${o.sub||C.dim}">${fmt(v)}${o.yUnit?" "+o.yUnit:""}</text>`; }
  const step=Math.ceil(n/8);
  o.cats.forEach((c,i)=>{ if(i%step===0||i===n-1) g+=`<text x="${sx(i)}" y="${H-8}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${o.sub||C.dim}">${esc(c)}</text>`; });
  (o.refs||[]).forEach(r=>{ const y=sy(r.y);
    g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${y}" y2="${y}" stroke="${r.color}" stroke-dasharray="4 3"/>`;
    g+=`<text x="${W-P.r}" y="${y-4}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${r.color}">${esc(r.label)}</text>`; });
  const bars = o.series.filter(s=>s.type==="bar"), bw = bars.length ? Math.max(3,(iw/Math.max(1,n))/(bars.length+1.2)) : 0;
  o.series.forEach((s)=>{
    if(s.type==="bar"){
      const bi=bars.indexOf(s);
      s.data.forEach((v,i)=>{ if(v==null) return; const x=sx(i)-(bars.length*bw)/2+bi*bw, y=sy(Math.max(0,v)), h=Math.abs(sy(0)-sy(v));
        g+=`<rect x="${x}" y="${Math.min(y,sy(0))}" width="${bw-1}" height="${Math.max(1,h)}" fill="${s.color}" rx="1.5"><title>${esc(o.cats[i])} · ${esc(s.name)}: ${fmt(v)}</title></rect>`; });
    } else {
      let path="", started=false;
      s.data.forEach((v,i)=>{ if(v==null){ return; } const x=sx(i),y=sy(v); path+=(started?"L":"M")+x+" "+y; started=true; });
      if(path) g+=`<path d="${path}" fill="none" stroke="${s.color}" stroke-width="1.6"/>`;
      s.data.forEach((v,i)=>{ if(v==null) return;
        g+=`<circle cx="${sx(i)}" cy="${sy(v)}" r="3" fill="${s.color}"><title>${esc(o.cats[i])} · ${esc(s.name)}: ${fmt(v)}${o.yUnit?" "+o.yUnit:""}</title></circle>`; });
    }
  });
  const legend = o.series.length>1 ? `<div style="display:flex;gap:14px;margin-top:6px;flex-wrap:wrap">${o.series.map(s=>`<span class="note" style="display:flex;align-items:center;gap:6px"><i style="width:8px;height:8px;border-radius:2px;background:${s.color};display:inline-block"></i>${esc(s.name)}</span>`).join("")}</div>` : "";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}</svg>${legend}`;
}

function sparkSVG(series,color){
  if(series.length<2) return "";
  const W=160,H=42,vals=series.map(p=>p.v);
  let lo=Math.min(...vals),hi=Math.max(...vals); if(lo===hi){lo-=1;hi+=1;}
  const sx=i=>i*(W/(series.length-1)), sy=v=>H-3-((v-lo)/(hi-lo))*(H-6);
  let p=""; series.forEach((pt,i)=>{ p+=(i?"L":"M")+sx(i)+" "+sy(pt.v); });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="42" preserveAspectRatio="none"><path d="${p}" fill="none" stroke="${color}" stroke-width="1.4"/></svg>`;
}

/* ── girthSVG v2 (v1.5): silhouette rebuilt from Andre's 04/07/26 baseline
   photos. METHOD (honest split): waist/shoulder width ratio (0.57) and the
   crotch line (~0.53 of stature → legs ≈47%) were MEASURED from the front
   photo via colour-mask silhouette analysis; remaining widths are girth-
   proportioned within that frame; vertical landmarks are standard-male
   anthropometry, consistent with the photo where measurable. Arms included
   (biceps/forearm girth-driven). Girth deltas amplified ×3 around the
   04/07/26 seed so monthly change is visible. Dual outline: today (teal
   solid) vs target (amber dashed). ── */
function girthSVG(todayG, targetG){
  const Hf=380, Wf=280, cx=Wf/2, top=14, BH=Hf-2*top;   // body height in px
  // vertical landmarks (fraction of stature)
  const Y={headT:0,headB:.105,neck:.135,sho:.18,chest:.245,waist:.36,abd:.415,hip:.475,crotch:.53,
           upTh:.585,loTh:.665,knee:.72,calf:.795,ankle:.955};
  // base half-widths (px) — shoulder anchored, waist/shoulder = 0.57 photo-measured
  const K=54;
  const BASEW={sho:1.00,chest:.90,waist:.57,abd:.60,hip:.68,upTh:.295,loTh:.235,calf:.185,ankle:.085,
               neck:.155,headR:.30,armU:.115,armF:.095,wrist:.055};
  const AMP=3;
  const seedOf=id=>GIRTH_SEED[id];
  const scale=(g,id)=>{ if(!g||g[id]==null||seedOf(id)==null) return 1;
    return 1 + AMP*((g[id]-seedOf(id))/seedOf(id)); };
  const py=f=>top+f*BH;
  function outline(g){
    const sho=K*BASEW.sho*scale(g,"shoulder"), che=K*BASEW.chest*scale(g,"chest"),
          wai=K*BASEW.waist*scale(g,"waist"), abd=K*BASEW.abd*scale(g,"abdomen"),
          hip=K*BASEW.hip*scale(g,"hip");
    const legC=hip*0.52;
    const leg=(side,idU,idL,idC)=>{ const sgn=side; const c=cx+sgn*legC;
      const uT=K*BASEW.upTh*scale(g,idU), lT=K*BASEW.loTh*scale(g,idL), ca=K*BASEW.calf*scale(g,idC), an=K*BASEW.ankle;
      return {c,uT,lT,ca,an}; };
    const L=leg(-1,"upThighL","loThighL","calfL"), R=leg(1,"upThighR","loThighR","calfR");
    // torso path (right side down, left side up)
    const P=[[cx+K*BASEW.neck,py(Y.neck)],[cx+sho,py(Y.sho)],[cx+che,py(Y.chest)],[cx+wai,py(Y.waist)],
             [cx+abd,py(Y.abd)],[cx+hip,py(Y.hip)],[R.c+R.uT*0.9,py(Y.crotch)],
             [cx+2,py(Y.crotch)],[cx-2,py(Y.crotch)],[L.c-L.uT*0.9,py(Y.crotch)],
             [cx-hip,py(Y.hip)],[cx-abd,py(Y.abd)],[cx-wai,py(Y.waist)],[cx-che,py(Y.chest)],
             [cx-sho,py(Y.sho)],[cx-K*BASEW.neck,py(Y.neck)]];
    const torso="M"+P.map(p=>fmt(p[0],1)+","+fmt(p[1],1)).join(" L ")+" Z";
    const legPath=X=>{ const q=[[X.c-X.uT,py(Y.upTh)],[X.c-X.lT,py(Y.loTh)],[X.c-X.lT*0.92,py(Y.knee)],
      [X.c-X.ca,py(Y.calf)],[X.c-X.an,py(Y.ankle)],[X.c+X.an,py(Y.ankle)],[X.c+X.ca,py(Y.calf)],
      [X.c+X.lT*0.92,py(Y.knee)],[X.c+X.lT,py(Y.loTh)],[X.c+X.uT,py(Y.upTh)],
      [X.c+X.uT*0.95,py(Y.crotch)],[X.c-X.uT*0.95,py(Y.crotch)]];
      return "M"+q.map(p=>fmt(p[0],1)+","+fmt(p[1],1)).join(" L ")+" Z"; };
    // arms: shoulder joint → wrist, girth-driven, hanging slightly out
    const arm=(sgn,idB,idF)=>{ const x0=cx+sgn*sho*0.94, x1=cx+sgn*(sho*0.94+8);
      const aU=K*BASEW.armU*scale(g,idB), aF=K*BASEW.armF*scale(g,idF), wr=K*BASEW.wrist;
      const q=[[x0-sgn*aU*0.4,py(Y.sho)],[x1+sgn*aU,py(.30)],[x1+sgn*aF,py(.44)],[x1+sgn*wr,py(.565)],
               [x1-sgn*wr,py(.565)],[x1-sgn*aF,py(.44)],[x1-sgn*aU,py(.30)]];
      return "M"+q.map(p=>fmt(p[0],1)+","+fmt(p[1],1)).join(" L ")+" Z"; };
    return {torso, legL:legPath(L), legR:legPath(R), armL:arm(-1,"bicepL","forearmL"), armR:arm(1,"bicepR","forearmR"),
            head:`<ellipse cx="${cx}" cy="${fmt(py(Y.headB/2+Y.headT/2)+3,1)}" rx="${fmt(K*BASEW.headR,1)}" ry="${fmt(BH*(Y.headB-Y.headT)/2,1)}"/>`};
  }
  const render=(g,color,dash,fill)=>{ if(!g) return "";
    const o=outline(g);
    const st=`stroke="${color}" stroke-width="1.6" ${dash?`stroke-dasharray="5 4"`:""} fill="${fill||"none"}"`;
    return `<g ${st}>${o.head}<path d="${o.torso}"/><path d="${o.legL}"/><path d="${o.legR}"/><path d="${o.armL}"/><path d="${o.armR}"/></g>`; };
  return `<svg viewBox="0 0 ${Wf} ${Hf}" width="${Wf}" height="${Hf}" style="max-width:100%">
    ${render(targetG,C.amber,true)}
    ${render(todayG,C.teal,false,"rgba(94,234,212,.06)")}
    <text x="${cx}" y="${Hf-1}" text-anchor="middle" font-size="8.5" fill="var(--dim)" font-family="var(--mono)">today (teal) vs target (amber) · widths photo+girth-calibrated · Δ×3 amplified</text>
  </svg>`;
}

/* ── radarSVG (v1.5): 15-axis girth radar, current vs target.
   Direction-aware: waist/abdomen plot target/current (inside 100 = still over
   target); all others current/target. 100% ring = target. ── */
function radarSVG(cur, tgt){
  const N=GIRTHS.length, S=330, c=S/2, Rmax=c-46;
  const pctOf=g=>{ const cv=cur?cur[g.id]:null, tv=tgt?tgt[g.id]:null;
    if(cv==null||tv==null||tv===0) return null;
    const down=(g.id==="waist"||g.id==="abdomen");
    return Math.round((down? tv/cv : cv/tv)*100); };
  const rOf=p=>{ const cl=Math.min(112,Math.max(78,p)); return Rmax*((cl-78)/(112-78))*0.82+Rmax*0.18; };
  const r100=rOf(100);
  const ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,r)=>[c+r*Math.cos(ang(i)), c+r*Math.sin(ang(i))];
  const rings=[85,92,100,108].map(p=>{ const r=rOf(p);
    return `<circle cx="${c}" cy="${c}" r="${fmt(r,1)}" fill="none" stroke="${p===100?C.amber:"var(--contour)"}" stroke-width="${p===100?1.4:0.6}" ${p===100?`stroke-dasharray="5 4"`:""} opacity="${p===100?0.9:0.6}"/>`; }).join("");
  const spokes=GIRTHS.map((g,i)=>{ const [x,y]=pt(i,Rmax); const [lx,ly]=pt(i,Rmax+18);
    const short=g.name.replace("Upper Thigh","U.Thigh").replace("Lower Thigh","L.Thigh").replace("Forearm","F.arm").replace("Bicep ","Bi ");
    return `<line x1="${c}" y1="${c}" x2="${fmt(x,1)}" y2="${fmt(y,1)}" stroke="var(--contour)" stroke-width="0.5" opacity="0.5"/>
      <text x="${fmt(lx,1)}" y="${fmt(ly,1)}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="var(--mist)" font-family="var(--mono)">${esc(short)}</text>`; }).join("");
  const pts=GIRTHS.map((g,i)=>{ const p=pctOf(g); return p==null?null:pt(i,rOf(p)); });
  const have=pts.filter(Boolean).length;
  const poly = have>=3 ? "M"+pts.map((p,i)=>p?fmt(p[0],1)+","+fmt(p[1],1):null).filter(Boolean).join(" L ")+" Z" : null;
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="max-width:100%">
    ${rings}${spokes}
    ${poly?`<path d="${poly}" fill="rgba(94,234,212,.14)" stroke="${C.teal}" stroke-width="1.8" stroke-linejoin="round"/>`:""}
    <text x="${c}" y="${S-4}" text-anchor="middle" font-size="8.5" fill="var(--dim)" font-family="var(--mono)">amber ring = target (100%) · teal = current · waist/abdomen inverted</text>
  </svg>`;
}

function bodySVG(vals, ref, selected, opts){
  const o=opts||{}; const W=200, H=316, AMP=4;
  let g=`<circle cx="100" cy="26" r="15" fill="none" stroke="${C.contour}" stroke-width="1.5"/>`;
  SEGMENTS.forEach(s=>{
    let w=s.w, fill="none", stroke=C.contour, dash=' stroke-dasharray="4 3"', op=1;
    if(vals && vals[s.id]!=null){
      dash=""; const base=ref&&ref[s.id]!=null?ref[s.id]:vals[s.id];
      const r=Math.sqrt(Math.max(0.01,vals[s.id]/base));
      w=s.w*Math.min(1.4,Math.max(0.75,1+AMP*(r-1)));
      const d=vals[s.id]-base;
      fill=Math.abs(d)<0.05?C.slate:d>0?C.teal:C.rose; op=0.55;
      stroke=s.id===selected?C.chalk:"none";
    } else if(s.id===selected){ stroke=C.chalk; }
    g+=`<rect data-seg="${s.id}" x="${(s.cx-w).toFixed(1)}" y="${s.y}" width="${(2*w).toFixed(1)}" height="${s.h}" rx="${Math.min(10,w)}" fill="${fill}" fill-opacity="${op}" stroke="${stroke}" stroke-width="1.5"${dash} style="cursor:pointer"></rect>`;
  });
  if(o.label) g+=`<text x="100" y="${H-2}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="${C.mist}">${esc(o.label)}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="150" style="display:block;margin:0 auto">${g}</svg>`;
}

/* ── Performance radar (Overview tab): 6 axes from scorecard data ── */
function perfRadarSVG(sc){
  const S=260, c=S/2, Rmax=c-52;
  const axes=[
    {id:"adh",  label:"Run adherence",  v:sc.adh==null?null:Math.min(sc.adh,120)/100},
    {id:"runW", label:"Run this wk",    v:sc.runOK},
    {id:"gymW", label:"Gym this wk",    v:sc.gymOK},
    {id:"prot", label:"Protein days",   v:sc.protOK},
    {id:"hlth", label:"Health",         v:sc.seen?(1-(sc.seen>0?sc.flags/sc.seen:0)):null},
    {id:"mind", label:"Mind",           v:sc.mind==null?null:sc.mind/100},
  ];
  const N=axes.length;
  const ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,r)=>[c+r*Math.cos(ang(i)), c+r*Math.sin(ang(i))];
  // rings
  let rings="";
  [0.5,0.75,1.0].forEach(f=>{
    const r=Rmax*f;
    rings+=`<circle cx="${c}" cy="${c}" r="${fmt(r,1)}" fill="none" stroke="var(--contour)" stroke-width="${f===1?1.2:0.5}" opacity="${f===1?0.7:0.4}"/>`;
  });
  // spokes + labels
  let spokes=axes.map((a,i)=>{
    const [x,y]=pt(i,Rmax), [lx,ly]=pt(i,Rmax+20);
    return `<line x1="${c}" y1="${c}" x2="${fmt(x,1)}" y2="${fmt(y,1)}" stroke="var(--contour)" stroke-width="0.5" opacity="0.5"/>
      <text x="${fmt(lx,1)}" y="${fmt(ly,1)}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="var(--mist)" font-family="var(--mono)">${esc(a.label)}</text>`;
  }).join("");
  // polygon
  const pts=axes.map((a,i)=>{ const r=Rmax*(a.v==null?0:Math.min(1,Math.max(0,a.v))); return pt(i,r); });
  const poly="M"+pts.map(p=>fmt(p[0],1)+","+fmt(p[1],1)).join(" L ")+" Z";
  // dots
  const dots=axes.map((a,i)=>{
    const v=a.v==null?0:Math.min(1,Math.max(0,a.v));
    const r=Rmax*v, [x,y]=pt(i,r);
    const col=v>=0.85?C.teal:v>=0.6?C.amber:C.rose;
    return a.v==null?"":`<circle cx="${fmt(x,1)}" cy="${fmt(y,1)}" r="3" fill="${col}" stroke="var(--night)" stroke-width="0.8"/>`;
  }).join("");
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="max-width:100%;display:block">
    ${rings}${spokes}
    <path d="${poly}" fill="rgba(94,234,212,.12)" stroke="${C.teal}" stroke-width="1.6" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

/* ── HERO: the plan chart ── */
function overviewSVG(wStart, wEnd){
  /* Four stacked panels sharing one x-axis:
     1. Plan (top): plan area/line + historic run volume (bar-style solid).
     2. Fitness/Fatigue: CTL (teal) + ATL (rose) lines, own y-axis.
     3. Form: TSB (violet) line + readiness bands, own y-axis.
     4. Weight: kg line from state.body, own y-axis.
     wStart may be negative (pre-plan). wEnd capped at 46. */
  if(wStart==null) wStart=1; if(wEnd==null) wEnd=46;
  wEnd=Math.min(49,wEnd);
  const unit=App.unit, pk=unit, ak=unit==="km"?"akm":"ah";

  // ── Plan data ────────────────────────────────────────────────────────────
  const planData=PLAN.map(p=>{ const a=App.state.actualWeeks[p.w];
    return {...p, akm:a&&a.km!=null?a.km:null, ah:a&&a.h!=null?a.h:null}; });

  const runsByWeek={};
  const W1d=new Date(2026,5,29);
  (App.state.sessions.runs||[]).forEach(r=>{
    if(!r.d) return;
    const delta=Math.floor((new Date(r.d+"T00:00:00")-W1d)/864e5);
    const w=Math.floor(delta/7)+1;
    if(!runsByWeek[w]) runsByWeek[w]={km:0,h:0,n:0};
    if(r.km!=null) runsByWeek[w].km+=r.km;
    if(r.h!=null)  runsByWeek[w].h +=r.h;
    runsByWeek[w].n++;
  });

  const data=planData.map(p=>{
    const rb=runsByWeek[p.w];
    return {...p,
      akm:p.akm!=null?p.akm:(rb&&rb.km>0?Math.round(rb.km*10)/10:null),
      ah: p.ah!=null ?p.ah :(rb&&rb.h >0?Math.round(rb.h*100)/100:null)};
  });
  const hasActual=data.some(d=>d.akm!=null);

  const preWeeks=Object.keys(runsByWeek).map(Number).filter(w=>w<1).sort((a,b)=>a-b);
  const hasHist=preWeeks.length>0;

  // ── FFF data ─────────────────────────────────────────────────────────────
  const dateToW=iso=>{const d=new Date(iso+"T00:00:00");return Math.floor((d-W1d)/864e5/7)+1;};
  const fff=(App.state.fff||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const byWeek={};
  fff.forEach(r=>{const w=dateToW(r.date);if(w>=wStart&&w<=wEnd)byWeek[w]=r;});
  const fffWeeks=Object.keys(byWeek).map(Number).sort((a,b)=>a-b);
  const hasFFF=fffWeeks.length>0;
  // ── FFF projection by week (FFF_PROJ constant, plan-derived) ─────────────
  const projByWeek={};
  for(let w=Math.max(1,wStart);w<=Math.min(49,wEnd);w++){
    if(FFF_PROJ.byWeek[w]) projByWeek[w]=FFF_PROJ.byWeek[w];
  }
  const projWeeks=Object.keys(projByWeek).map(Number).sort((a,b)=>a-b);
  const hasProj=projWeeks.length>0;

  // ── Weight data (from state.body — same series as the Body tab) ───────────
  const bodyByWeek={};
  (App.state.body||[]).forEach(b=>{
    if(!b.d||b.kg==null) return;
    const w=dateToW(b.d);
    if(w>=wStart&&w<=wEnd) bodyByWeek[w]=b.kg; // last reading in the week wins
  });
  const wtWeeks=Object.keys(bodyByWeek).map(Number).sort((a,b)=>a-b);
  const hasWt=wtWeeks.length>0;

  // ── Layout: four panels + shared x-axis ──────────────────────────────────
  const W=920, Pl=52, Pr=14, Pt=24, Pb=52;
  const iw=W-Pl-Pr;
  // Panel heights (px) — plan biggest, then load, form, weight
  const hPlan=150, hLoad=90, hForm=100, hWt=64, gap=16;
  const H = Pt + hPlan + gap + hLoad + gap + hForm + gap + hWt + Pb;
  const xAxisY = H - Pb;
  // Panel y-bounds
  const planT=Pt,               planB=planT+hPlan;
  const loadT=planB+gap,        loadB=loadT+hLoad;
  const formT=loadB+gap,        formB=formT+hForm;
  const wtT  =formB+gap,        wtB  =wtT+hWt;

  const span=wEnd-wStart; if(span<=0) return "";
  const sx=w=>Pl+((w-wStart)/span)*iw;
  const cw=todayWeek();

  // ── Y-scales ─────────────────────────────────────────────────────────────
  // Plan panel
  const planVals=data.filter(d=>d.w>=Math.max(1,wStart)&&d.w<=wEnd).map(d=>Math.max(d[pk]||0,d[ak]||0));
  if(hasHist) preWeeks.filter(w=>w>=wStart).forEach(w=>{const v=unit==="km"?runsByWeek[w].km:runsByWeek[w].h; if(v>0) planVals.push(v);});
  const planHi=niceMax(Math.max(1,...planVals)*1.06);
  const syPlan=v=>planB-(v/planHi)*hPlan;

  // Load panel (CTL + ATL) — y-scale includes projection values so both fit
  let loadLo=0, loadHi=1;
  {
    const lv=[];
    if(hasFFF) fffWeeks.forEach(w=>{ if(byWeek[w].ctl!=null) lv.push(byWeek[w].ctl); if(byWeek[w].atl!=null) lv.push(byWeek[w].atl); });
    if(hasProj) projWeeks.forEach(w=>{ lv.push(projByWeek[w].ctl, projByWeek[w].atl); });
    if(lv.length){ loadHi=Math.max(...lv)*1.08; loadLo=Math.max(0,Math.min(...lv)-3); }
  }
  const syLoad=v=>loadB-((v-loadLo)/(loadHi-loadLo))*hLoad;

  // Form panel (TSB) — y-scale includes projection
  let formLo=-10, formHi=10;
  {
    const tv=[];
    if(hasFFF) fffWeeks.forEach(w=>{ if(byWeek[w].tsb!=null) tv.push(byWeek[w].tsb); });
    if(hasProj) projWeeks.forEach(w=>{ tv.push(projByWeek[w].tsb); });
    if(tv.length){ formHi=Math.max(...tv)+4; formLo=Math.min(...tv)-Math.max(3,(Math.max(...tv)-Math.min(...tv))*0.05); }
  }
  const syForm=v=>formB-((v-formLo)/(formHi-formLo))*hForm;

  // Weight panel
  let wtLo=60, wtHi=75;
  if(hasWt){
    const wv=wtWeeks.map(w=>bodyByWeek[w]);
    wtLo=Math.floor(Math.min(...wv))-1; wtHi=Math.ceil(Math.max(...wv))+1;
    if(wtLo===wtHi){wtLo-=2;wtHi+=2;}
  }
  const syWt=v=>wtB-((v-wtLo)/(wtHi-wtLo))*hWt;

  let g=`<defs><linearGradient id="pf2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${C.teal}" stop-opacity="0.18"/><stop offset="100%" stop-color="${C.teal}" stop-opacity="0.02"/></linearGradient></defs>`;

  // ── Phase bands — span all four panels ───────────────────────────────────
  PHASES.forEach(p=>{
    const x1=sx(Math.max(p.w1-0.5,Math.max(1,wStart)-0.5)),x2=sx(Math.min(p.w2+0.5,wEnd+0.5));
    if(x2<=x1)return;
    g+=`<rect x="${x1}" y="${planT}" width="${x2-x1}" height="${wtB-planT}" fill="${LEAD_COLOR[p.lead]}" opacity="0.05"/>`;
    g+=`<rect x="${x1+1}" y="${planT-11}" width="${Math.max(0,x2-x1-2)}" height="4" rx="2" fill="${LEAD_COLOR[p.lead]}" opacity="0.85"><title>${esc(p.name)}</title></rect>`;});

  // Plan-start marker
  if(wStart<1){const px1=sx(1);
    g+=`<line x1="${px1}" x2="${px1}" y1="${planT}" y2="${wtB}" stroke="${C.violet}" stroke-opacity="0.18" stroke-dasharray="3 3"/>`;
    g+=`<text x="${px1+3}" y="${planT+10}" font-family="var(--mono)" font-size="8" fill="${C.violet}" opacity="0.6">plan↑</text>`;}

  // Panel divider lines
  [[planB,loadT],[loadB,formT],[formB,wtT]].forEach(([b,t])=>{
    const my=(b+t)/2;
    g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${my}" y2="${my}" stroke="${C.contour}" stroke-opacity="0.35"/>`;});

  // ═══ PANEL 1: PLAN ═══════════════════════════════════════════════════════
  for(let i=0;i<=2;i++){const v=planHi*i/2,y=syPlan(v);
    g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.contour}" stroke-opacity="0.2"/>`;
    g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${fmt(v,0)}</text>`;}
  g+=`<text x="14" y="${planT+hPlan/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${planT+hPlan/2})" text-anchor="middle">${unit==="km"?"km/wk":"h/wk"}</text>`;

  // Historic run volume — connected solid line (dim, no markers).
  // Reads as continuous volume history; zero weeks anchor the line to baseline
  // so peaks like UTK2025 don't appear to spring from nothing.
  if(hasHist){
    const histStart=Math.max(wStart, Math.min(...preWeeks));
    const histEnd=Math.min(0,wEnd);
    // build point array covering every week in window (zero for missing weeks)
    const hPts=[];
    for(let w=histStart;w<=histEnd;w++){
      const rb=runsByWeek[w];
      const v=rb?(unit==="km"?rb.km:rb.h):0;
      hPts.push({w,v});
    }
    if(hPts.length>1){
      let path="";
      hPts.forEach((p,i)=>{ const x=sx(p.w), y=syPlan(p.v); path+=(i?"L":"M")+x+" "+y; });
      g+=`<path d="${path}" fill="none" stroke="${C.slate}" stroke-width="1.5" opacity="0.65"/>`;
    } else if(hPts.length===1){
      // single point — just a dot
      const p=hPts[0];
      g+=`<circle cx="${sx(p.w)}" cy="${syPlan(p.v)}" r="2" fill="${C.slate}" opacity="0.65"/>`;
    }
  }

  // Plan area + lines
  const vdata=data.filter(d=>d.w>=Math.max(1,wStart)&&d.w<=wEnd);
  if(vdata.length){
    const planStartX=sx(Math.max(1,wStart));
    let area=`M ${planStartX} ${syPlan(0)}`;
    vdata.forEach(d=>{area+=` L ${sx(d.w)} ${syPlan(d[pk])}`;});
    area+=` L ${sx(Math.min(wEnd,49))} ${syPlan(0)} Z`;
    g+=`<path d="${area}" fill="url(#pf2)"/>`;
    const pastPlan=vdata.filter(d=>d.w<=cw), futurePlan=vdata.filter(d=>d.w>=cw);
    if(pastPlan.length){let pp="";pastPlan.forEach((d,i)=>{pp+=(i?"L":"M")+sx(d.w)+" "+syPlan(d[pk]);});
      g+=`<path d="${pp}" fill="none" stroke="${C.teal}" stroke-width="1.8" opacity="0.85"/>`;}
    if(futurePlan.length){let fp="";futurePlan.forEach((d,i)=>{fp+=(i?"L":"M")+sx(d.w)+" "+syPlan(d[pk]);});
      g+=`<path d="${fp}" fill="none" stroke="${C.teal}" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.7"/>`;}
    if(hasActual){let ep="",st=false;
      vdata.forEach(d=>{if(d[ak]==null)return;ep+=(st?"L":"M")+sx(d.w)+" "+syPlan(d[ak]);st=true;});
      g+=`<path d="${ep}" fill="none" stroke="${C.chalk}" stroke-width="1.8"/>`;
      vdata.forEach(d=>{if(d[ak]!=null)g+=`<circle cx="${sx(d.w)}" cy="${syPlan(d[ak])}" r="2.2" fill="${C.chalk}"/>`;});}
  }
  // Race markers (plan panel)
  RACES.forEach(r=>{if(r.w<Math.max(1,wStart)||r.w>wEnd)return;
    const row=data[r.w-1],x=sx(r.w),y=syPlan(row[pk]);
    g+=`<circle cx="${x}" cy="${y}" r="3" fill="${C.rose}" stroke="${C.night}"/>`;
    const anc=r.w>40?"end":"middle";
    g+=`<text x="${x}" y="${y-8}" text-anchor="${anc}" font-family="var(--mono)" font-size="8.5" fill="${C.rose}">▲ ${esc(r.name)}</text>`;});

  // ═══ PANEL 2: FITNESS / FATIGUE (CTL + ATL) ══════════════════════════════
  for(let i=0;i<=2;i++){const v=loadLo+(loadHi-loadLo)*i/2,y=syLoad(v);
    g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.contour}" stroke-opacity="0.18"/>`;
    g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${Math.round(v)}</text>`;}
  const fv=App.fffViz||{ctl:true,atl:true,tsb:true,proj:true};
  // Bias-correct the projection so it starts from the last real data point
  // (eliminates the visual step-change at the real→projected join).
  // The offset is purely a display shift — FFF_PROJ constant is unchanged.
  const lastRealW = hasFFF ? Math.max(...fffWeeks) : null;
  const joinOffset = {};
  if(hasFFF && hasProj && lastRealW!=null && projByWeek[lastRealW]){
    const real=byWeek[lastRealW], proj=projByWeek[lastRealW];
    joinOffset.ctl = (real.ctl!=null&&proj.ctl!=null) ? real.ctl-proj.ctl : 0;
    joinOffset.atl = (real.atl!=null&&proj.atl!=null) ? real.atl-proj.atl : 0;
    joinOffset.tsb = (real.tsb!=null&&proj.tsb!=null) ? real.tsb-proj.tsb : 0;
  } else {
    joinOffset.ctl=0; joinOffset.atl=0; joinOffset.tsb=0;
  }
  const adjProj=(w,key)=>{
    const v=projByWeek[w]?projByWeek[w][key]:null; if(v==null) return null;
    // apply offset only for weeks beyond last real data
    return (hasFFF&&lastRealW!=null&&w>lastRealW) ? v+(joinOffset[key]||0) : v;
  };
  // Projection dashed lines (drawn first so real lines sit on top)
  if(hasProj&&fv.proj){
    const drawProj=(key,col)=>{let p="",ok=false;
      projWeeks.forEach(w=>{const v=adjProj(w,key);if(v==null)return;const x=sx(w+0.5),y=syLoad(v);p+=(ok?"L":"M")+x+" "+y;ok=true;});
      if(p)g+=`<path d="${p}" fill="none" stroke="${col}" stroke-width="1.1" stroke-dasharray="5 4" opacity="0.45"/>`;};
    if(fv.atl) drawProj("atl",C.rose);
    if(fv.ctl) drawProj("ctl",C.teal);
  }
  // Real FFF lines (solid, on top)
  if(hasFFF){
    const drawL=(vals,col)=>{let p="",ok=false;
      fffWeeks.forEach((w,i)=>{if(vals[i]==null)return;const x=sx(w+0.5),y=syLoad(vals[i]);p+=(ok?"L":"M")+x+" "+y;ok=true;});
      if(p)g+=`<path d="${p}" fill="none" stroke="${col}" stroke-width="1.7" opacity="0.9"/>`;};
    if(fv.atl) drawL(fffWeeks.map(w=>byWeek[w].atl),C.rose);
    if(fv.ctl) drawL(fffWeeks.map(w=>byWeek[w].ctl),C.teal);
  }
  if(!hasFFF&&!hasProj){
    g+=`<text x="${Pl+iw/2}" y="${loadT+hLoad/2}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${C.dim}">import wellness JSON (Data tab) for live Fitness/Fatigue</text>`;

  // ═══ PANEL 3: FORM (TSB + readiness bands) ═══════════════════════════════
  const tsbBands=[
    {lo:-67.8, hi:-30, color:"#8B0000", label:"High Risk", lc:"#e07070"},
    {lo:-30,   hi:-10, color:"#4A7C59", label:"Optimal",   lc:"#6fbf8a"},
    {lo:-10,   hi:5,   color:"#2A3A2A", label:"Grey Zone", lc:"#8a9a8a"},

  ];
  tsbBands.forEach(b=>{

    const midY=(y1+y2)/2;
    if(midY>formT&&midY<formB)
      g+=`<text x="${W-Pr-3}" y="${midY+3}" text-anchor="end" font-family="var(--mono)" font-size="7.5" fill="${b.lc}" opacity="0.8">${b.label}</text>`;
  });
  for(let i=0;i<=2;i++){const v=formLo+(formHi-formLo)*i/2,y=syForm(v);
    g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${Math.round(v)}</text>`;}
  if(formLo<=0&&formHi>=0)g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${syForm(0)}" y2="${syForm(0)}" stroke="${C.chalk}" stroke-dasharray="3 3" opacity="0.3"/>`;
  // Race TSB gate bands — optimal freshness window shown only in taper weeks for each race
  // [{race, taperW1, taperW2, tsbFloor, tsbCeil}]

    {name:"Sydney",  tw1:8,  tw2:9,  lo:5,  hi:20, col:C.rose},
    {name:"UTK",     tw1:21, tw2:22, lo:10, hi:25, col:C.amber},
    {name:"UTA",     tw1:44, tw2:46, lo:10, hi:30, col:C.teal},
  ];
  raceTaperGates.forEach(g2=>{
    const x1=sx(Math.max(g2.tw1-0.5,Math.max(1,wStart)-0.5));
    const x2=sx(Math.min(g2.tw2+0.5,wEnd+0.5));
    if(x2<=x1) return;
    const yLo=syForm(Math.min(g2.hi,formHi)), yHi=syForm(Math.max(g2.lo,formLo));
    if(yHi<=yLo) return;
    g+=`<rect x="${x1}" y="${yLo}" width="${x2-x1}" height="${yHi-yLo}" fill="${g2.col}" opacity="0.12"/>`;
    // floor and ceiling dashed lines

      g+=`<line x1="${x1}" x2="${x2}" y1="${syForm(g2.lo)}" y2="${syForm(g2.lo)}" stroke="${g2.col}" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;
    if(g2.hi>=formLo&&g2.hi<=formHi)
      g+=`<line x1="${x1}" x2="${x2}" y1="${syForm(g2.hi)}" y2="${syForm(g2.hi)}" stroke="${g2.col}" stroke-width="1" stroke-dasharray="3 3" opacity="0.35"/>`;

    const labelY=Math.min(Math.max(syForm((g2.lo+g2.hi)/2),formT+8),formB-4);

    if(p)g+=`<path d="${p}" fill="none" stroke="${C.violet}" stroke-width="1.1" stroke-dasharray="5 4" opacity="0.45"/>`;
  }
  // Real TSB solid line (on top)
  if(hasFFF&&fv.tsb){
    let p="",ok=false;
    fffWeeks.forEach(w=>{const v=byWeek[w].tsb;if(v==null)return;const x=sx(w+0.5),y=syForm(v);p+=(ok?"L":"M")+x+" "+y;ok=true;});
    if(p)g+=`<path d="${p}" fill="none" stroke="${C.violet}" stroke-width="1.7" opacity="0.95"/>`;

  if(!hasFFF&&!hasProj){
    g+=`<text x="${Pl+iw/2}" y="${formT+hForm/2}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${C.dim}">import wellness JSON for live Form</text>`;
  }
  g+=`<text x="14" y="${formT+hForm/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${formT+hForm/2})" text-anchor="middle">Form</text>`;

  // ═══ PANEL 4: WEIGHT ═════════════════════════════════════════════════════
  if(hasWt){
    for(let i=0;i<=1;i++){const v=wtLo+(wtHi-wtLo)*i,y=syWt(v);
      g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.contour}" stroke-opacity="0.15"/>`;

    // Raw weight line — dim amber, thin

    if(p)g+=`<path d="${p}" fill="none" stroke="${C.amber}" stroke-width="1" opacity="0.4"/>`;

    // EWMA trend line — MacroFactor-style smoothing (α=0.1, linear interp for gaps)
    // Built from daily state.body entries, then sampled at each week in the window.
    const bodyByDay={};
    (App.state.body||[]).forEach(b=>{ if(b.d&&b.kg!=null) bodyByDay[b.d]=b.kg; });
    const bodyDays=Object.keys(bodyByDay).sort();
    if(bodyDays.length>=2){
      // Build daily series with linear interpolation for gaps
      const allDays=[];
      for(let i=0;i<bodyDays.length-1;i++){
        const d0=new Date(bodyDays[i]+"T00:00:00"), d1=new Date(bodyDays[i+1]+"T00:00:00");
        const v0=bodyByDay[bodyDays[i]], v1=bodyByDay[bodyDays[i+1]];
        const nDays=Math.round((d1-d0)/864e5);
        for(let j=0;j<nDays;j++){
          const dd=new Date(d0.getTime()+j*864e5);
          const iso=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
          allDays.push({iso, kg:v0+(v1-v0)*(j/nDays)});
        }
      }
      allDays.push({iso:bodyDays[bodyDays.length-1], kg:bodyByDay[bodyDays[bodyDays.length-1]]});
      // EWMA pass (α=0.1)
      const alpha=0.1;
      let ewma=allDays[0].kg;
      const ewmaByDay={};
      allDays.forEach(pt=>{ ewma=alpha*pt.kg+(1-alpha)*ewma; ewmaByDay[pt.iso]=ewma; });
      // Sample at each week in window and draw
      let tp="",tok=false;
      for(let w=wStart;w<=wEnd;w++){
        // pick the last EWMA value within this week
        const wDate=new Date(W1d.getTime()+(w-1)*7*864e5);
        let bestV=null;
        for(let d=0;d<7;d++){
          const dd=new Date(wDate.getTime()+d*864e5);
          const iso=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
          if(ewmaByDay[iso]!=null) bestV=ewmaByDay[iso];
        }
        if(bestV==null){tok=false;continue;}
        const x=sx(w),y=syWt(bestV);
        tp+=(tok?"L":"M")+x+" "+y; tok=true;
      }
      if(tp)g+=`<path d="${tp}" fill="none" stroke="${C.amber}" stroke-width="2" opacity="0.95"/>`;
    }
  } else {
    g+=`<text x="${Pl+iw/2}" y="${wtT+hWt/2}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${C.dim}">add weight points in the Body tab</text>`;
  }
  g+=`<text x="14" y="${wtT+hWt/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${wtT+hWt/2})" text-anchor="middle">Weight</text>`;

  const nwx=sx(cw);
  g+=`<line x1="${nwx}" x2="${nwx}" y1="${planT-4}" y2="${wtB}" stroke="${C.chalk}" stroke-opacity="0.3" stroke-dasharray="2 3"/>`;
  g+=`<text x="${nwx}" y="${planT-10}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="${C.mist}">now</text>`;

  // ── X-axis ────────────────────────────────────────────────────────────────
  g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${xAxisY}" y2="${xAxisY}" stroke="${C.contour}" stroke-opacity="0.5"/>`;
  const stepLabel=span>100?6:span>60?4:span>30?2:1;
  let tickCount=0;
  for(let w=wStart;w<=wEnd;w++){
    if((w-wStart)%stepLabel!==0) continue;
    const x=sx(w); if(x<Pl||x>W-Pr+2){tickCount++;continue;}
    const isPlanW=w>=1&&w<=49;
    g+=`<text x="${x}" y="${xAxisY+12}" text-anchor="middle" font-family="var(--mono)" font-size="8.5" fill="${isPlanW?C.mist:C.slate}">W${w}</text>`;
    if(tickCount%2===0){
      const d=new Date(W1d.getTime()+(w-1)*7*864e5);
      const lbl=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
      g+=`<text transform="rotate(-90,${x},${xAxisY+40})" x="${x}" y="${xAxisY+40}" text-anchor="start" font-family="var(--mono)" font-size="8" fill="${C.dim}">${lbl}</text>`;
    }
    tickCount++;
  }

  // ── Hit zones (full height) + crosshair ──────────────────────────────────
  for(let w=wStart;w<=wEnd;w++){
    const isPlan=w>=1&&w<=49;
    g+=`<rect data-w="${w}" data-plan="${isPlan?1:0}" x="${sx(w-0.5)}" y="${planT}" width="${Math.max(2,iw/span)}" height="${wtB-planT}" fill="transparent" style="cursor:${isPlan?"pointer":"default"}" pointer-events="all"/>`;
  }
  g+=`<line id="overviewX" x1="-999" x2="-999" y1="${planT}" y2="${wtB}" stroke="${C.chalk}" stroke-opacity="0.5" stroke-width="1" pointer-events="none"/>`;

  return `<svg id="overviewSvg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}</svg>`;
}

/* ── Week Lens (v1.4) — linked weekly↔daily strip, run + gym ──
   Plan chips come from the locked WEEK_TEMPLATES/WEEK_OVERRIDES (keyword-
   classified, no new plan data). Done-state comes ONLY from imported
   sessions (runs.json / MacroFactor-derived gym JSON) — never manual. */
const dayISO = (w,i) => { const d=new Date(2026,5,29+(w-1)*7+i);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
function classifyRun(s){ if(!s||s==="—") return "rest"; const t=s.toLowerCase();
  if(/\brace\b|race —|race week/.test(t)&&!t.includes("race-sim")) return "race";
  if(/shakeout/.test(t)) return "easy";
  if(/^rest|^walk|travel|kit check|nothing/.test(t)) return "rest";
  if(/long|b2b|race-sim|benchmark/.test(t)) return "long";
  if(/\btt\b|threshold|drift test|touches|descent reps|me carry|mp touch|mp power|steady/.test(t)) return "quality";
  return "easy"; }
function classifyGym(s){ if(!s) return null; const t=s.toLowerCase();
  if(t.includes("upper")) return "Upper"; if(t.includes("lower")) return "Lower";
  if(t.includes("push")) return "Push"; if(t.includes("pull")) return "Pull";
  if(t.includes("leg")) return "Legs"; if(t.includes("full")) return "Full"; return "Gym"; }
const RUN_STYLE = {

  quality:{bg:C.violet,fg:"#1b1f24", solid:1, lab:"Quality"},

function plannedDay(w,i){ const ph=phaseOf(w), tpl=(WEEK_TEMPLATES[ph.id]||[])[i]||{}, o=(WEEK_OVERRIDES[w]||{})[i]||{};
  return { r:o.r||tpl.r||"—", g:o.g||tpl.g||null, L:tpl.L||o.L, H:tpl.H||o.H }; }
function sessionMaps(){ const R={},G={};
  (App.state.sessions.runs||[]).forEach(s=>{ if(s&&s.d) R[s.d]=s; });
  (App.state.sessions.gym||[]).forEach(s=>{ if(s&&s.d) G[s.d]=s; });
  return {R,G}; }

    const now=new Date(), todayIso=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");

/* ── trend card ── */
function trendCard(title,unit,series,goodUp,target,invite){
  const last = series.length ? series[series.length-1].v : null;
  const base = series.length>1 ? series.slice(0,-1).reduce((s,p)=>s+p.v,0)/(series.length-1) : null;
  const delta = (last!=null&&base) ? ((last-base)/base)*100 : null;
  let dHtml = `<span style="color:var(--dim)">—</span>`;
  if(delta!=null){ const up=delta>=0, good=goodUp?up:!up;
    dHtml = `<span style="font-family:var(--mono);font-size:12px;color:${good?C.teal:C.rose}">${up?"▲":"▼"} ${fmt(Math.abs(delta))}%</span>`; }
  return `<div class="card">
    <div class="eyebrow">${esc(title)}</div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-top:8px">
      <span style="font-family:var(--mono);font-size:22px;color:${last!=null?"var(--chalk)":"var(--dim)"}">${last!=null?fmt(last):"—"}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--dim)">${esc(unit)}</span>${dHtml}
    </div>
    <div style="height:42px;margin-top:6px">${series.length>1 ? sparkSVG(series,C.teal) :
      `<div style="border-bottom:1px dashed var(--contour);height:100%;display:flex;align-items:flex-end"><span class="note" style="padding-bottom:4px">${esc(invite)}</span></div>`}</div>
    ${target?`<div class="note" style="margin-top:8px">gate · ${esc(target)}</div>`:""}
  </div>`;
}

/* ── DEMO MODE (v1.5) — synthetic preview state through W18, for layout
   evaluation only. Deterministic (seeded PRNG). NEVER persisted, NEVER
   exported, banner-labelled while active. "No demo data" invariant amended
   for this explicit feature with Andre's sign-off 04/07/26. Numbers are
   plausible-per-plan fabrications — they carry zero informational value. ── */
function makeDemo(){
  let seed=20260704; const rnd=()=>{ seed|=0; seed=(seed+0x6D2B79F5)|0;
    let t=Math.imul(seed^(seed>>>15),1|seed); t=(t+Math.imul(t^(t>>>7),61|t))^t;
    return ((t^(t>>>14))>>>0)/4294967296; };
  const st=JSON.parse(JSON.stringify(EMPTY));
  st.sessions={runs:[],gym:[]};
  // per-week actuals + daily sessions W1–W18
  const longMap={1:1.0,2:1.25,3:1.5,4:2.0,5:2.5,6:2.0,7:3.0,8:1.2,9:3.55,10:0,11:1.0,12:1.5,13:2.0,14:2.5,15:2.5,16:3.0,17:3.5,18:4.0};
  for(let w=1;w<=18;w++){
    const plan=PLAN[w-1]; if(!plan) break;
    const adherence=0.93+rnd()*0.1;
    const km=w===9?plan.km:Math.round(plan.km*adherence*10)/10;
    const h=w===9?plan.h:Math.round(plan.h*adherence*10)/10;
    const longH=longMap[w]||0;
    const a={km,h,longH:longH||null,vert:Math.round(h*(w>=11?230:120)),
      z12:Math.min(92,Math.round(68+w*1.3+rnd()*3)),
      ef:Math.round((1.90+w*0.016+rnd()*0.02)*100)/100,
      decoup:longH>=2?Math.round((12.5-(w*0.45)+rnd()*1.2)*10)/10:null};
    st.actualWeeks[w]=a;
    // daily sessions from the plan pattern
    let easyDays=[]; for(let i=0;i<7;i++){ const p=plannedDay(w,i), cat=classifyRun(p.r);
      if(cat!=="rest") easyDays.push({i,cat}); if(classifyGym(p.g)&&rnd()<0.93) st.sessions.gym.push({d:dayISO(w,i),name:p.g}); }
    const shares={long:0.40,quality:0.20,race:1};
    const nEasy=easyDays.filter(x=>x.cat==="easy").length||1;
    const fixed=easyDays.filter(x=>x.cat!=="easy").reduce((t,x)=>t+(shares[x.cat]||0.25),0);
    easyDays.forEach(x=>{ if(rnd()<0.04) return; // occasional missed run
      const share=x.cat==="easy"?Math.max(0.05,(1-Math.min(fixed,0.85))/nEasy):(shares[x.cat]||0.25);
      const dkm=Math.round(km*share*10)/10;
      st.sessions.runs.push({d:dayISO(w,x.i),type:x.cat,km:dkm,h:Math.round(dkm*0.105*10)/10}); });
  }
  // bodyweight: weekly Thu, hypertrophy drift + post-marathon dip
  let kg=65.0;
  for(let w=1;w<=18;w++){ const lead=phaseOf(w).lead;
    kg+= (lead==="hyp"?0.12:lead==="rec"?0.05:0.02) + (rnd()-0.5)*0.1;
    if(w===10) kg-=0.5;
    st.body.push({d:dayISO(w,3),kg:Math.round(kg*10)/10,bf:Math.round((20-w*0.06)*10)/10}); }
  // girths: real seed + 3 synthetic monthly entries
  const drift={shoulder:.2,chest:.15,waist:-.15,abdomen:-.15,hip:.05,bicepL:.15,bicepR:.15,forearmL:.1,forearmR:.1,upThighL:.25,upThighR:.2,loThighL:.15,loThighR:.15,calfL:.1,calfR:.15};
  ["2026-08-04","2026-09-04","2026-10-04"].forEach((d,mi)=>{ const e={d};
    GIRTHS.forEach(g=>{ const b=GIRTH_SEED[g.id]; if(b==null) return;
      e[g.id]=Math.round((b+(drift[g.id]||0)*(mi+1)+(rnd()-0.5)*0.1)*10)/10; });
    st.girths.push(e); });
  // labs: one mid-Oct panel, values mid-range except CRP deliberately flagged
  const pick=["ferritin","hb","crp","alt","creat","vitd"];
  MARKERS.filter(m=>pick.includes(m.id)).forEach(m=>{
    let v; if(m.id==="crp"&&m.hi!=null) v=Math.round(m.hi*1.15*10)/10;
    else if(m.lo!=null&&m.hi!=null) v=Math.round((m.lo+(m.hi-m.lo)*0.45)*10)/10;
    else if(m.hi!=null) v=Math.round(m.hi*0.6*10)/10;
    else v=m.lo!=null?Math.round(m.lo*1.4*10)/10:1;
    st.labs.push({d:"2026-10-15",marker:m.id,value:v}); });
  // key lifts: two monthly points, rising (lifting resumes W11)
  (typeof KEY_LIFTS!=="undefined"?KEY_LIFTS:[]).slice(0,5).forEach((l,li)=>{
    const base=[80,45,90,55,70][li]||60;
    st.lifts.push({d:"2026-09-30",lift:l,e1rm:base});
    st.lifts.push({d:"2026-10-28",lift:l,e1rm:Math.round(base*1.035*10)/10}); });
  // protein: last 10 real-calendar days so the scorecard 7-day window populates
  for(let k=0;k<10;k++){ const d=new Date(Date.now()-k*864e5);
    st.protein.push({d:d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"),
      g:Math.round(112+rnd()*32)}); }
  // check-ins: weekly Sundays
  for(let w=1;w<=17;w++) st.checkins.push({d:dayISO(w,6),sleep:3+Math.round(rnd()*2),stress:2+Math.round(rnd()*2),mot:4+Math.round(rnd())});
  // protocol demo entries
  st.protocol.push({d:"2026-08-15",change:"[DEMO] carb periodisation around long runs",reason:"synthetic example",by:"nutritionist"});
  st.protocol.push({d:"2026-10-01",change:"[DEMO] intra-run CHO stepped to 75 g/h",reason:"synthetic example",by:"coach"});
  return st;
}

  viewFFF(){
    /* Fitness/Fatigue/Form panel — sourced from intervals.icu Wellness CSV
       or live Sync. Trailing 90-day window shown in chart; current readiness card.

    const fff = (this.state.fff||[]).slice().sort((a,b)=>a.date<b.date?-1:1);

      <div class="empty">◦ Paste the intervals.icu Wellness CSV export into the FFF import box in the Data tab (or use Sync if the Worker is configured).<br>CTL = chronic training load (42-day; fitness) · ATL = acute training load (7-day; fatigue) · TSB = CTL−ATL (form/freshness).</div></div>`;
    // trailing 90 days
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-90);
    const cutStr = cutoff.toISOString().slice(0,10);
    const recent = fff.filter(r=>r.date>=cutStr);
    const cats = recent.map(r=>r.date.slice(5)); // MM-DD
    const ctls = recent.map(r=>r.ctl);
    const atls = recent.map(r=>r.atl);
    const tsbs = recent.map(r=>r.tsb);
    // current values (latest entry)
    const cur = fff[fff.length-1];
    const tsbColor = cur.tsb==null?C.dim:cur.tsb>5?C.teal:cur.tsb<-10?C.rose:C.amber;
    const tsbLabel = cur.tsb==null?"—":cur.tsb>5?"Fresh (positive form)":cur.tsb<-10?"Fatigued (accumulated load)":"Neutral";
    const stepLabel = (v,lo,hi,labels) => v==null?"—":v<lo?labels[0]:v<hi?labels[1]:labels[2];
    const rampLabel = cur.rampRate==null?"—":cur.rampRate>8?"⚠ high ramp":cur.rampRate<0?"tapering / declining":cur.rampRate>5?"building fast":"building steady";
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div class="eyebrow" style="color:${C.violet}">Fitness · Fatigue · Form (intervals.icu) — trailing 90 days</div>

    <div class="cols4" style="margin-top:14px">
      <div style="text-align:center"><div class="eyebrow">CTL · Fitness</div><div style="font-family:var(--mono);font-size:28px;color:${C.teal};margin-top:6px">${fmt(cur.ctl,1)}</div><div class="note">42-day load</div></div>
      <div style="text-align:center"><div class="eyebrow">ATL · Fatigue</div><div style="font-family:var(--mono);font-size:28px;color:${C.rose};margin-top:6px">${fmt(cur.atl,1)}</div><div class="note">7-day load</div></div>

      <div style="text-align:center"><div class="eyebrow">Ramp rate</div><div style="font-family:var(--mono);font-size:16px;color:${C.amber};margin-top:12px">${fmt(cur.rampRate,1)}</div><div class="note">${rampLabel}</div></div>
    </div>
    <div style="margin-top:14px">${(()=>{
      // Build projection series aligned to the same 90-day date cats
      const projCTL=cats.map(mm=>{
        const yr=mm.length===5?"2026":recent[0].date.slice(0,4);
        const fullDate=yr+"-"+mm; const r=FFF_PROJ.idx[fullDate]; return r?r.ctl:null;});
      const projATL=cats.map(mm=>{
        const yr=mm.length===5?"2026":recent[0].date.slice(0,4);
        const fullDate=yr+"-"+mm; const r=FFF_PROJ.idx[fullDate]; return r?r.atl:null;});
      const projTSB=cats.map(mm=>{
        const yr=mm.length===5?"2026":recent[0].date.slice(0,4);
        const fullDate=yr+"-"+mm; const r=FFF_PROJ.idx[fullDate]; return r?r.tsb:null;});
      // Rebuild cats with full year prefix for projection lookup
      const fullCats=recent.map(r=>r.date);
      const rawPCTL=fullCats.map(d=>{const r=FFF_PROJ.idx[d];return r?r.ctl:null;});
      const rawPATL=fullCats.map(d=>{const r=FFF_PROJ.idx[d];return r?r.atl:null;});
      const rawPTSB=fullCats.map(d=>{const r=FFF_PROJ.idx[d];return r?r.tsb:null;});
      const hasProjInWindow=rawPCTL.some(v=>v!=null);
      // Bias-correct projection: shift future values so they start from the last real point
      // (eliminates step-change at the real→projected join; shape/trajectory unchanged)
      let offCTL=0,offATL=0,offTSB=0;
      const lastRealIdx=ctls.reduceRight((acc,v,i)=>acc===-1&&v!=null?i:acc,-1);
      if(lastRealIdx>=0&&rawPCTL[lastRealIdx]!=null){
        offCTL=(ctls[lastRealIdx]??0)-(rawPCTL[lastRealIdx]??0);
        offATL=(atls[lastRealIdx]??0)-(rawPATL[lastRealIdx]??0);
        offTSB=(tsbs[lastRealIdx]??0)-(rawPTSB[lastRealIdx]??0);
      }
      const pCTL=rawPCTL.map((v,i)=>v==null?null:(i>lastRealIdx?v+offCTL:v));
      const pATL=rawPATL.map((v,i)=>v==null?null:(i>lastRealIdx?v+offATL:v));
      const pTSB=rawPTSB.map((v,i)=>v==null?null:(i>lastRealIdx?v+offTSB:v));
      const series=[
        {name:"CTL (live)",color:C.teal,data:ctls},
        {name:"ATL (live)",color:C.rose,data:atls},
        {name:"TSB (live)",color:C.violet,data:tsbs},
      ];
      if(hasProjInWindow){
        series.push({name:"CTL proj",color:C.teal,data:pCTL,dash:"5 4",opacity:0.4,width:1.1});
        series.push({name:"ATL proj",color:C.rose,data:pATL,dash:"5 4",opacity:0.4,width:1.1});
        series.push({name:"TSB proj",color:C.violet,data:pTSB,dash:"5 4",opacity:0.4,width:1.1});
      }
      return chartSVGdash({w:860,h:180,cats,series,refs:[{y:0,label:"TSB=0",color:C.dim}]});
    })()}</div>
    <div class="note" style="margin-top:8px">Solid = live (intervals.icu computed) · dashed = plan projection (05/07/26 baseline, Bannister τ CTL=42/ATL=7), bias-corrected to join seamlessly at the last real data point. Divergence shape = calibration signal — log deltas in FFF_PROJECTION_BASELINE.md §4. Wrist HR pre-2026-07-03 inflates load scores; chest-strap series begins 3 Jul 2026.</div></div>`;
  },

  girthSorted(){ return [...(this.state.girths||[])].sort((a,b)=>a.d.localeCompare(b.d)); },

  girthCard(){
    const entries=this.girthSorted();
    const first=entries[0]||null;
    const last=entries[entries.length-1]||null;
    const tgt=this.state.target||{kg:73,bf:15};
    const sel=this.selSeg||GIRTHS[0].id;
    const selDef=GIRTHS.find(g=>g.id===sel)||GIRTHS[0];

    // target girths from λ-blend model: girth ∝ √(λ·lean_ratio·1.193 + (1-λ)·fat_ratio·0.842)
    const baseLean=52, baseFat=13;
    const tLean=tgt.kg*(1-tgt.bf/100), tFat=tgt.kg*tgt.bf/100;
    function modelTarget(g, baseGirth){
      if(baseGirth==null) return null;
      const lr=tLean/baseLean, fr=tFat/baseFat;
      const scale=Math.sqrt(g.λ*lr*1.193 + (1-g.λ)*fr*0.842);
      return parseFloat((baseGirth*scale).toFixed(1));
    }
    const targetG={};
    GIRTHS.forEach(g=>{
      const base=g.target!=null?g.target:( GIRTH_SEED[g.id]!=null?modelTarget(g,GIRTH_SEED[g.id]):null );
      targetG[g.id]=base;
    });

    // radar % helper (direction-aware, mirrors radarSVG)
    const pctOf=g=>{ const cv=last?last[g.id]:null, tv=targetG[g.id];
      if(cv==null||tv==null||tv===0) return null;
      return Math.round(((g.id==="waist"||g.id==="abdomen")? tv/cv : cv/tv)*100); };

    const pills=GIRTHS.map(g=>`<button class="pill ${g.id===sel?"on":""}" data-act="seg" data-v="${g.id}">${esc(g.name)}</button>`).join("");
    const sitePts=entries.filter(e=>e[sel]!=null);
    const siteTarget=targetG[sel];
    const trend = sitePts.length>1 ? `<div style="margin-top:10px">${chartSVG({
      cats:sitePts.map(e=>e.d.slice(5)), yUnit:"cm", h:160,
      series:[{name:esc(selDef.name),color:C.teal,data:sitePts.map(e=>e[sel])}],
      refs:siteTarget!=null?[{y:siteTarget,label:"target "+fmt(siteTarget,1)+" cm",color:C.amber}]:[]
    })}</div>` : `<div class="note" style="margin-top:8px">◦ ${esc(selDef.name)}: trend starts at the second monthly measure${last&&last[sel]!=null?` — current ${fmt(last[sel],1)} cm${siteTarget!=null?` · target ${fmt(siteTarget,1)}`:""}`:""}.</div>`;

    const pctChips=GIRTHS.map(g=>{ const p=pctOf(g);
      const col=p==null?C.dim:(p>=98?C.teal:p>=92?C.amber:C.rose);
      return `<button class="pill" data-act="seg" data-v="${g.id}" style="border-color:${col};color:${col}">${esc(g.name.replace("Upper Thigh","U.Th").replace("Lower Thigh","L.Th"))} ${p==null?"—":p+"%"}</button>`; }).join("");

    return `<div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div class="eyebrow" style="color:${C.teal}">Body Map — girths vs target · silhouette + radar</div>
        <span class="note">tape: Renpho protocol · monthly · targets: λ-blend to ${fmt(tgt.kg,0)} kg @ ${fmt(tgt.bf,0)}%</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:flex-start;margin-top:8px">
        <div>${girthSVG(last, targetG)}
          <div class="note" style="text-align:center;margin-top:4px">silhouette calibrated from the 04/07/26 baseline photos —<br>waist/shoulder + leg line photo-measured; other widths girth-proportioned</div></div>
        <div>${radarSVG(last, targetG)}
          <div class="note" style="text-align:center;margin-top:4px">100% = at target · direction-aware<br>(waist/abdomen: lower is better)</div></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">${pctChips}</div>
      <div style="margin-top:14px"><div class="eyebrow">Site trend — ${esc(selDef.name)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${pills}</div>${trend}</div>
      <div class="note" style="margin-top:10px">Tape is same-conditions monthly (AM, cold muscles, same anatomical landmarks). L/R kept separate on purpose — the right-side history makes asymmetry a signal, not noise.</div>
    </div>`;
  },

  wellnessSection(){
    /* Daily device-wellness block — RHR / HRV / readiness / sleep from
       intervals.icu Sync. Distinct from the clinical labs below (point-in-time
       blood panel). Lives in the Health tab (Wellness zone) per Andre's call
       06/07/26 (option A). Screen-only — kept out of the clinical print view,
       which stays lab-only for the physician. Depth is provisional. */
    const CH=[
      {id:"rhr",       name:"Resting HR",  unit:"bpm", color:C.rose,   lower:true,  why:"recovery / overreach — vs own baseline"},
      {id:"hrv",       name:"HRV",         unit:"ms",  color:C.teal,   lower:false, why:"overnight rMSSD — vs own rolling baseline only"},
      {id:"readiness", name:"Readiness",   unit:"",    color:C.violet, lower:false, why:"intervals.icu composite 0–100"},
      {id:"sleepHrs",  name:"Sleep",       unit:"h",   color:C.amber,  lower:false, why:"nightly hours"},
    ];
    const fff=(this.state.fff||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
    const anyWell=CH.some(c=>fff.some(r=>r[c.id]!=null));
    if(!anyWell){
      return `<div class="card"><div class="eyebrow" style="color:${C.violet}">Wellness · daily device data</div>
        <div class="empty">◦ No daily wellness data yet (RHR · HRV · readiness · sleep). Populated by Sync from intervals.icu. Distinct from the blood-panel labs below. History depth is a reveal at the first 2-year sync — these channels only go back as far as your device wrote them, which may be far shallower than CTL/ATL/TSB.</div></div>
        <div class="note" style="color:${C.dim};margin:4px 0 14px">— clinical labs below —</div>`;
    }
    const sel=CH.find(c=>c.id===this.wellMetric)||CH[0];
    const view=this.wellView;
    let src=fff;
    if(view==="day"){ const c=new Date(); c.setDate(c.getDate()-120); const cs=c.toISOString().slice(0,10); src=fff.filter(r=>r.date>=cs); }
    const {cats,data}=aggregateWellness(src,sel.id,view);
    // current + 7-day baseline for each channel (baseline = mean of last 7 non-null)
    const stat=id=>{ const pts=fff.filter(r=>r[id]!=null); if(!pts.length) return {cur:null,base:null};
      const cur=pts[pts.length-1][id];
      const last7=pts.slice(-7).map(r=>r[id]); const base=last7.reduce((s,v)=>s+v,0)/last7.length;
      return {cur,base:+base.toFixed(1)}; };
    const pills=CH.map(c=>`<button class="pill ${c.id===sel.id?"on":""}" data-act="wellMetric" data-v="${c.id}">${esc(c.name)}</button>`).join("");
    const cards=CH.map(c=>{ const s=stat(c.id); const have=s.cur!=null;
      const dir=have&&s.base!=null?(c.lower?(s.cur<s.base?C.teal:s.cur>s.base?C.rose:C.dim):(s.cur>s.base?C.teal:s.cur<s.base?C.rose:C.dim)):C.dim;
      return `<div style="text-align:center">
        <div class="eyebrow">${esc(c.name)}</div>
        <div style="font-family:var(--mono);font-size:22px;color:${have?dir:C.dim};margin-top:6px">${have?fmt(s.cur,c.id==="sleepHrs"?1:0):"—"}${have&&c.unit?`<span style="font-size:11px;color:${C.dim}"> ${esc(c.unit)}</span>`:""}</div>
        <div class="note">${have&&s.base!=null?`7-day base ${fmt(s.base,c.id==="sleepHrs"?1:0)}`:"no data"}</div></div>`; }).join("");
    const toggle=`<div style="display:flex;gap:6px">
      <button class="pill ${view==="day"?"on":""}" data-act="wellView" data-v="day">DAY</button>
      <button class="pill ${view==="week"?"on":""}" data-act="wellView" data-v="week">WEEK</button></div>`;
    const yOpt = sel.id==="readiness"?{yMin:0,yMax:100}:(sel.id==="sleepHrs"?{yMin:0}:{});
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div><div class="eyebrow" style="color:${C.violet}">Wellness · daily device data (intervals.icu)</div>
          <div class="note" style="margin-top:3px">RHR · HRV · readiness · sleep — separate from the blood labs below</div></div>
        ${toggle}
      </div>
      <div class="cols4" style="margin-top:14px">${cards}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:14px">${pills}</div>
      <div class="note" style="margin-top:8px;color:${C.dim}">${esc(sel.name)}${sel.unit?` (${esc(sel.unit)})`:""} · ${esc(sel.why)} · ${view==="day"?"trailing 120 days":"macro-week means (axis matches the plan)"}</div>
      <div style="margin-top:8px">${chartSVG(Object.assign({w:860,h:180,cats,yUnit:sel.unit||"",
        series:[{name:sel.name,color:sel.color,data}]},yOpt))}</div>
      <div class="note" style="margin-top:8px">Trend-vs-own-baseline only — HRV/RHR absolute numbers aren't comparable between people, and none of this is trended across the 3 Jul chest-strap break. Depth is provisional: these channels reach back only as far as intervals.icu stored them.</div></div>
      <div class="note" style="color:${C.dim};margin:4px 0 14px">— clinical labs below —</div>`;
  },

  healthHTML(clin){
    const m=MARKERS.find(x=>x.id===this.selMarker)||MARKERS[0];
    const pts=this.state.labs.filter(l=>l.marker===m.id).sort((a,b)=>a.d.localeCompare(b.d));
    const line = clin?C.paperline:C.contour, sub=clin?C.papersub:C.dim, ink=clin?C.ink:C.chalk, ac=clin?C.ink:C.teal;
    const pills=MARKERS.map(mk=>`<button class="pill ${mk.id===this.selMarker?"on":""}" data-act="marker" data-v="${mk.id}"
      style="${mk.id===this.selMarker&&clin?`background:${C.ink};border-color:${C.ink};color:#fff`:""}">${esc(mk.name)}</button>`).join("");
    let band=null; const refs=[];
    if(m.lo!=null&&m.hi!=null) band={lo:m.lo,hi:m.hi,color:clin?"#8FBF9F":C.teal};
    else if(m.hi!=null) refs.push({y:m.hi,label:"upper ref",color:C.rose});
    else if(m.lo!=null) refs.push({y:m.lo,label:"lower ref",color:C.rose});
    const chart = pts.length ? chartSVG({cats:pts.map(p=>p.d.slice(2)),yUnit:m.unit,h:210,
        series:[{name:m.name,color:ac,data:pts.map(p=>p.value)}], band, refs, line, sub})
      : `<div class="empty" style="color:${sub}">◦ No entries for this marker yet. Planned draws: mid-Oct (pre-UTK, ferritin priority) · Feb–Mar (peak load). Log results here and in HEALTH_EXAMS.md.</div>`;
    const tbl = this.state.labs.length ? `<table style="margin-top:10px"><tbody>${[...this.state.labs].sort((a,b)=>b.d.localeCompare(a.d)).map(l=>{
        const mk=MARKERS.find(x=>x.id===l.marker);
        const out=mk&&((mk.lo!=null&&l.value<mk.lo)||(mk.hi!=null&&l.value>mk.hi));
        return `<tr><td style="font-family:var(--mono);font-size:11px;color:${sub};padding:7px 0;width:90px">${esc(l.d)}</td>
        <td style="font-size:12.5px;color:${ink};padding:7px 0">${esc(mk?mk.name:l.marker)}</td>
        <td style="font-family:var(--mono);font-size:12px;color:${out?C.rose:ink};padding:7px 0;text-align:right">${l.value} ${mk?mk.unit:""}${out?" ⚑":""}</td></tr>`;
      }).join("")}</tbody></table>`
      : `<div class="note" style="padding-top:10px;color:${sub}">◦ Empty — no exams logged yet. Baseline was deliberately skipped (Jul 2026).</div>`;
    return `
    <div class="card"><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${pills}</div>
      <div class="note" style="color:${sub}">${esc(m.name)}${refText(m)} · ${esc(m.why)}</div>
      <div style="margin-top:10px">${chart}</div></div>
    <div class="card"><div class="eyebrow">All entries</div>${tbl}</div>
    <div class="note" style="color:${sub}">Self-tracked records prepared for consultation. Reference ranges are general endurance-athlete starting points — defer to the reporting lab's ranges and the treating physician. Not a medical document.</div>`;
  },

    <div class="card"><div class="eyebrow" style="color:var(--teal)">Import sessions (feeds the Week Lens ✓)</div>
      <textarea id="sess_io" rows="4" style="width:100%;margin-top:10px" placeholder='Paste runs.json (whole file or {"runs":[…]}) and/or {"gym":[{"d":"2026-07-04","name":"Upper (strength)"}]} — merges by date'></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap">

    <div class="card"><div class="eyebrow">Method notes</div>
      <div style="font-size:12.5px;color:var(--mist);line-height:1.8;margin-top:8px">W1 = week commencing Mon 29/06/26. Planned km are derived from the hours-native plan at assumed blended paces (road ≈6:15/km, trail ≈8:00/km) and get recalibrated each block against executed pace — a derived estimate, flagged as such. Race weeks include race distance. Trends outrank points everywhere: rolling means on body data, deltas vs baseline on site cards. Device rule: one device per metric trend — Withings weekly total weight · Renpho monthly tape girths (cm) · Garmin chest strap + power throughout. Girth target model: girth ∝ √(λ·lean_scale·1.193 + (1−λ)·fat_scale·0.842), heuristic v1, replaces itself with measured slopes at ≥3 entries. Long-horizon physique goal: 73 kg @ 15% BF (formally adopted 04/07/26); UTA taper milestone: +0.7–1.2 kg lean. Extending the dashboard = adding one entry to a registry (GIRTHS, MARKERS, KEY_LIFTS) — built to grow. Storage mode: <b>${Store.mode}</b>.</div></div>`;
  },

  /* ── actions ── */
  addWeek(){
    const w=parseInt(qs("wk_w").value); if(!w||w<1||w>46) return this.flash("Week must be 1–46");
    const map={km:"wk_km",h:"wk_h",vert:"wk_vert",desc:"wk_desc",longH:"wk_long",decoup:"wk_dec",ef:"wk_ef",z12:"wk_z"};
    const entry={}; Object.keys(map).forEach(k=>{ const v=num(qs(map[k]).value); if(v!=null) entry[k]=v; });
    this.state.actualWeeks[w]={...(this.state.actualWeeks[w]||{}),...entry};
    this.persist(); this.render(); this.flash("W"+w+" saved");
  },
  addBody(){ const d=qs("bd_d").value.trim(), kg=num(qs("bd_kg").value); if(!d||kg==null) return this.flash("Need date + kg");
    this.state.body.push({d,kg,bf:num(qs("bd_bf").value)}); this.persist(); this.render(); this.flash("Body point saved"); },
  addLab(){ const d=qs("lb_d").value.trim(), v=num(qs("lb_v").value); if(!d||v==null) return this.flash("Need date + value");
    this.state.labs.push({d,marker:qs("lb_m").value,value:v}); this.persist(); this.render(); this.flash("Lab saved"); },
  addLift(){ const d=qs("lf_d").value.trim(), v=num(qs("lf_v").value); if(!d||v==null) return this.flash("Need date + kg");
    this.state.lifts.push({d,lift:qs("lf_l").value,e1rm:v}); this.persist(); this.render(); this.flash("Lift point saved"); },
  addSeg(){
    // back-compat: kept for any imported states with old segmental data
    const d=qs("sg_d")&&qs("sg_d").value.trim();
    if(!d) return;
    const vals={la:num(qs("sg_la")&&qs("sg_la").value),ra:num(qs("sg_ra")&&qs("sg_ra").value),
      tr:num(qs("sg_tr")&&qs("sg_tr").value),ll:num(qs("sg_ll")&&qs("sg_ll").value),rl:num(qs("sg_rl")&&qs("sg_rl").value)};
    if(Object.values(vals).some(v=>v==null)) return this.flash("Need date + all 5 areas");
    this.state.segmental.push({d,...vals}); this.persist(); this.render(); this.flash("Segmental entry saved");
  },
  addGirth(){
    const d=qs("gr_d")&&qs("gr_d").value.trim();
    if(!d) return this.flash("Need a date");
    const entry={d};
    let hasAny=false;
    GIRTHS.forEach(g=>{ const v=num(qs("gr_"+g.id)&&qs("gr_"+g.id).value); if(v!=null){ entry[g.id]=v; hasAny=true; } });
    if(!hasAny) return this.flash("Enter at least one girth measurement");
    // merge with existing entry on same date if present
    const existing=this.state.girths.find(e=>e.d===d);
    if(existing){ Object.assign(existing, entry); }
    else { this.state.girths.push(entry); }
    this.persist(); this.render(); this.flash("Girth entry saved");
  },
  segSorted(){ return [...(this.state.segmental||[])].sort((a,b)=>a.d.localeCompare(b.d)); },
  addProt(){
    const d=qs("pr_d").value.trim(), c=qs("pr_c").value.trim();
    if(!d||!c) return this.flash("Need date + change");
    const r=qs("pr_r").value.trim();
    this.state.protocol.push({d,by:qs("pr_by").value,change:c,...(r?{reason:r}:{})});
    this.persist(); this.render(); this.flash("Protocol change saved");
  },
  setTarget(){
    const kg=num(qs("tg_kg").value), bf=num(qs("tg_bf").value);
    if(kg==null||bf==null) return this.flash("Need both target kg and bf %");
