  /* ── DESIGN TOKENS (v1.31 — single source of colour truth) ──────────────────
     Every colour lives here. The JS `C` object (and LEAD_COLOR / LIFT_COLORS)
     read these at render time via getComputedStyle, so charts + inline styles
     re-theme automatically when [data-theme] flips. Do NOT reintroduce hardcoded
     hex in JS — add the colour here and reference C.<name>.
     Naming: surfaces --c-night/ridge/ridge2/contour/chalk/mist/dim ·
     accents --c-teal/amber/violet/slate/rose · paper set --c-paper/ink/paperline/papersub.
     #14 chart tokens: --fs-axis, --fs-ref (numeric px, read by chart helpers),
     --c-axis, --c-line. ── */
  :root, :root[data-theme="dark"]{
    /* surfaces (dark default — G8) */
    --c-night:#0C1116; --c-ridge:#151C23; --c-ridge2:#1B242D; --c-contour:#2A3540;
    --c-chalk:#E8EDF1; --c-mist:#93A4B1; --c-dim:#5C6B77;
    /* accents */
    --c-teal:#5FA8A0; --c-amber:#DCA95C; --c-violet:#8E86C3; --c-slate:#4A5866; --c-rose:#D0708B;
    /* paper set (used by clinical view + light accents) */
    --c-paper:#FAF9F5; --c-ink:#1B1F24; --c-paperline:#D8D5CC; --c-papersub:#5A6470;
    /* #14 chart tokens */
    --fs-axis:9; --fs-ref:8.5; --c-axis:var(--c-dim); --c-line:var(--c-contour);
    /* type */
    --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    --sans:ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,sans-serif;
    /* semantic surface roles (theme-swapped) */
    --bg:var(--c-night); --fg:var(--c-chalk); --card:var(--c-ridge); --cardline:var(--c-contour);
    --field:var(--c-night); --fieldline:var(--c-contour);
  }
  /* ── LIGHT THEME (#16 / G8) — paper surfaces + darker accents so charts read
     crisply on light. Accents deepened vs dark (washed-out teal/amber on paper
     was the reason for palette-b). Clinical view is a separate axis (print) and
     forces its own light surfaces regardless of this toggle. ── */
  :root[data-theme="light"]{
    --c-night:#FAF9F5; --c-ridge:#FFFFFF; --c-ridge2:#F1EFE8; --c-contour:#D8D5CC;
    --c-chalk:#1B1F24; --c-mist:#5A6470; --c-dim:#8A8578;
    --c-teal:#3E7A73; --c-amber:#B07C28; --c-violet:#6B62A8; --c-slate:#6B7580; --c-rose:#B24E6B;
    --c-axis:#8A8578; --c-line:#CFCBBE;
    --bg:var(--c-night); --fg:var(--c-chalk); --card:var(--c-ridge); --cardline:var(--c-contour);
    --field:#FFFFFF; --fieldline:var(--c-contour);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--c-night);color:var(--c-chalk);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1120px;margin:0 auto;padding:22px 16px 70px}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--c-dim)}
  .card{background:var(--c-ridge);border:1px solid var(--c-contour);border-radius:10px;padding:16px}
  .grid{display:grid;gap:14px}
  .cols2{display:grid;gap:14px;grid-template-columns:1fr}
  .cols3{display:grid;gap:14px;grid-template-columns:1fr}
  .cols4{display:grid;gap:14px;grid-template-columns:1fr 1fr}
  @media(min-width:760px){.cols2{grid-template-columns:1fr 1fr}.cols3{grid-template-columns:1fr 1fr 1fr}.cols4{grid-template-columns:repeat(4,1fr)}}
  .empty{font-family:var(--mono);font-size:11px;color:var(--c-dim);padding:14px 0;line-height:1.7}
  button{font-family:var(--mono);cursor:pointer}
  .btn{font-size:11px;letter-spacing:.06em;padding:7px 12px;border-radius:7px;background:transparent;color:var(--c-mist);border:1px solid var(--c-contour)}
  .btn.solid{background:var(--c-teal);color:var(--c-night);border-color:var(--c-teal)}
  .btn.danger{color:var(--c-rose);border-color:var(--c-rose)}
  .btn:disabled{opacity:.4;cursor:default}
  .pill{display:inline-flex;align-items:center;justify-content:center;line-height:1;font-size:10px;letter-spacing:.1em;padding:4px 10px;border-radius:999px;border:1px solid var(--c-contour);background:transparent;color:var(--c-mist)}
  .pill.on{background:var(--c-teal);color:var(--c-night);border-color:var(--c-teal)}
  .pill.badge{min-width:34px}   /* v1.32 — stadium not circle for short run-type ids (MP/ME) */
  .pill.info{min-width:24px;padding:2px 7px}   /* #R1 (v1.39) — compact ? button, scoped like .pill.badge */
  .tabbar{display:flex;gap:2px;margin:20px 0 16px;border-bottom:1px solid var(--c-contour);overflow-x:auto}
  .tab{font-size:11px;letter-spacing:.08em;padding:9px 14px;background:transparent;border:none;color:var(--c-dim);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase}
  .tab.on{color:var(--c-chalk);border-bottom-color:var(--c-teal)}
  input,select,textarea{background:var(--c-night);border:1px solid var(--c-contour);border-radius:6px;color:var(--c-chalk);font-family:var(--mono);font-size:12px;padding:6px 8px;outline:none}
  input[type=number]{-moz-appearance:textfield}

  /* #C2 (v1.40): custom range slider — reset the boxed input styling + appearance:none
     track/thumb so the thumb travels the full track (native accent-color left the thumb
     clipped short of both ends on Android). Applies to both Overview sliders. */
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;border:none;padding:0;height:22px;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:var(--c-contour)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;margin-top:-6px;border-radius:50%;background:var(--c-teal);border:none}
  input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:var(--c-contour)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--c-teal)}
  input[type=range]:focus-visible{outline:2px solid var(--c-teal);outline-offset:3px}
  label.f{display:flex;flex-direction:column;gap:4px}
  label.f span{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--c-dim);text-transform:uppercase}

  .scroll{overflow-x:auto}

  .flash{font-family:var(--mono);font-size:11px;color:var(--c-teal);min-height:16px}
  .tip{position:absolute;pointer-events:none;background:var(--c-ridge2);border:1px solid var(--c-contour);border-radius:8px;padding:10px 12px;max-width:240px;z-index:9;display:none}

  td{border-bottom:1px solid var(--c-contour);padding:7px 0}
  a{color:var(--c-teal)}
  body.clinical{background:var(--c-paper);color:var(--c-ink)}

  .lens-day{border:1px solid var(--c-contour);border-radius:8px;padding:6px 5px;display:flex;flex-direction:column;gap:5px;min-width:0}
  .lens-dh{font-family:var(--mono);font-size:10px;color:var(--c-mist);display:flex;align-items:center;gap:4px}
  .lens-chip{font-family:var(--mono);font-size:9.5px;line-height:1.25;padding:4px 5px;border-radius:5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .lens-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:auto}
  @media(max-width:560px){.lens-grid{grid-template-columns:repeat(7,minmax(56px,1fr));overflow-x:auto}.lens-chip{font-size:8.5px}}
  /* ── #15 RESPONSIVE (G7 — S25 Ultra portrait ~412px & landscape ~915px;
     DeX / split-screen out of scope). Portrait: tighter gutters, single-col
     cards so nothing is cramped 2-wide; charts already viewBox+max-width:100%
     so they reflow. Landscape reuses the ≥760px multi-col grid below. ── */
  @media(max-width:480px){
    /* #C1 (v1.40) → #C4 (v1.41): contain the app container's horizontal overflow on mobile.
       v1.40 used overflow-x:clip, which stops layout-viewport expansion but AMPUTATES any
       residual overflow at paint level — the clipped strip is unreachable at ANY zoom level,
       which presented as "right side cut off" AND "pinch zoom broken" (one bug, two symptoms).
       v1.41 = auto: still a scroll container (same anti-shrink-to-fit property), but any
       residue pans by swipe instead of vanishing. With the #C4 guards below there should be
       no residue at all; auto is the honest fallback. */
    .wrap{padding:16px 10px 64px;overflow-x:auto}
    /* #C4 (v1.41): min-content guard — the actual root cause CLASS. Grid tracks (1fr/auto)
       refuse to shrink below a child's min-content width, so one unbreakable element quietly
       widens the whole app a few px past the viewport. Invisible to static width audits
       (computed-layout phenomenon, not a declared width — why the v1.40 audit found "no
       offender"). min-width:0 restores shrinkability on every track child + card; long
       tokens in notes/eyebrows become breakable. */
    .grid>*,.cols2>*,.cols3>*,.cols4>*,.card{min-width:0}
    .note,.eyebrow{overflow-wrap:anywhere}
    .cols4{grid-template-columns:1fr}   /* stop forcing 2-wide on narrow portrait */
    .card{padding:13px}
    h1{font-size:20px!important}
    /* #R17 (v1.38): tab bar wraps to 2 rows of 4 instead of horizontal scroll. */
    .tabbar{flex-wrap:wrap;row-gap:0;overflow-x:visible}
    .tab{flex:1 1 25%;min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:8px 6px}
    .row{gap:8px}
    /* #8 (Phase 4, v1.49): gym exercise table stacks to per-exercise blocks
       instead of a 4-col table — CSS-only, no fixed widths, wrap not scroll,
       fits 412px with no horizontal scroll. */
    .gym-tbl,.gym-tbl tbody,.gym-tbl tr{display:block;width:100%}
    .gym-tbl tr{padding:6px 0;border-bottom:1px solid var(--c-contour)}
    .gym-tbl tr:last-child{border-bottom:none}
    .gym-tbl td{text-align:left!important;padding:1px 0!important;white-space:normal;overflow-wrap:anywhere}
    .gym-tbl td.gt-name{display:block;font-size:12px;color:var(--c-chalk);font-weight:600}
    .gym-tbl td.gt-sr,.gym-tbl td.gt-rpe,.gym-tbl td.gt-rest{display:inline;font-size:11px;color:var(--c-mist);font-family:var(--mono)}
    .gym-tbl td.gt-rpe::before,.gym-tbl td.gt-rest::before{content:" · "}
    /* #15: bump chart-text tokens so viewBox-downscaled SVG text stays legible on
       narrow portrait. The chart helpers read these via cssvNum() at render time,
       and the resize/orientation listener (bindResize) re-renders so the new value
       actually takes — this is why the 860-unit wide charts don't shrink to ~4px. */
    :root, :root[data-theme="dark"], :root[data-theme="light"]{ --fs-axis:12; --fs-ref:11; }
    .btn, .pill{min-height:40px}   /* touch targets */
  }
  /* landscape phones (short height, wide-ish): keep 2-col where it fits, trim vertical padding */
  @media(max-height:520px) and (orientation:landscape){
    .wrap{padding:12px 14px 48px}
    .cols2{grid-template-columns:1fr 1fr}
  }
</style>

/* ── Phase 7 (v1.44): Events tab — GPX → compact elevation profile ─────────
   parseGPX: trkpt lat/lon/ele → cumulative haversine distance. downsampleProfile:
   even-by-distance resample to ≤N points (linear-interp ele), so a stored profile
   is ~4 KB regardless of source-file size. Nothing else from the GPX is kept. ── */
function parseGPX(txt){
  const pts=[]; const re=/<trkpt[^>]*lat="([-\d.]+)"[^>]*lon="([-\d.]+)"[^>]*>([\s\S]*?)<\/trkpt>/g;
  let m;
  while((m=re.exec(txt))){
    const em=/<ele>\s*([-\d.]+)\s*<\/ele>/.exec(m[3]);
    pts.push({lat:+m[1],lon:+m[2],ele:em?+em[1]:null});
  }
  if(!pts.length) return null;
  const R=6371, rad=x=>x*Math.PI/180;
  let dist=0; const distKm=[0], ele=[pts[0].ele], lat=[pts[0].lat], lon=[pts[0].lon];
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1],b=pts[i];
    const dLat=rad(b.lat-a.lat), dLon=rad(b.lon-a.lon);
    const h=Math.sin(dLat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLon/2)**2;
    dist+=2*R*Math.asin(Math.sqrt(h));
    distKm.push(dist); ele.push(pts[i].ele); lat.push(pts[i].lat); lon.push(pts[i].lon);
  }
  return {distKm, ele:ele.some(e=>e!=null)?ele:null, lat, lon, totalKm:dist};
}
function downsampleProfile(distKm, ele, N=200, lat=null, lon=null){
  const n=distKm.length;
  const r5=x=>Math.round(x*1e5)/1e5;
  if(n<=N) return {distKm:distKm.map(x=>Math.round(x*100)/100),
    ele:ele?ele.map(e=>e==null?null:Math.round(e)):null,
    lat:lat?lat.map(r5):null, lon:lon?lon.map(r5):null};
  const total=distKm[n-1]; const oD=[], oE=[], oLa=[], oLo=[]; let j=0;
  for(let i=0;i<N;i++){
    const target=total*i/(N-1);
    while(j<n-1 && distKm[j+1]<target) j++;
    const d0=distKm[j], d1=distKm[Math.min(j+1,n-1)];
    const t=d1>d0?(target-d0)/(d1-d0):0;
    const k=Math.min(j+1,n-1);
    oD.push(Math.round(target*100)/100);
    if(ele){ const e0=ele[j], e1=ele[k];
      oE.push((e0==null||e1==null)?(e0!=null?Math.round(e0):(e1!=null?Math.round(e1):null)):Math.round(e0+t*(e1-e0))); }
    if(lat){ oLa.push(r5(lat[j]+t*(lat[k]-lat[j]))); oLo.push(r5(lon[j]+t*(lon[k]-lon[j]))); }
  }
  return {distKm:oD, ele:ele?oE:null, lat:lat?oLa:null, lon:lon?oLo:null};
}
/* v1.45: route-map thumbnail — equirectangular polyline of the stored lat/lon track.
   Profiles imported before v1.45 have no lat/lon → card shows a re-import hint. */
function evRouteSVG(profile){
  if(!profile||!profile.lat||!profile.lat.length) return `<div class="note" style="align-self:center">re-import the GPX to add the route map</div>`;
  const la=profile.lat, lo=profile.lon;
  const laMin=Math.min(...la), laMax=Math.max(...la), loMin=Math.min(...lo), loMax=Math.max(...lo);
  const cosM=Math.cos((laMin+laMax)/2*Math.PI/180);
  const w=(loMax-loMin)*cosM, hgt=(laMax-laMin);
  const S=120,P=6, span=Math.max(w,hgt)||1e-9, sc=(S-2*P)/span;
  const ox=P+((S-2*P)-w*sc)/2, oy=P+((S-2*P)-hgt*sc)/2;
  let p="";
  la.forEach((v,i)=>{ const x=ox+(lo[i]-loMin)*cosM*sc, y=oy+(laMax-v)*sc;
    p+=(p?"L":"M")+x.toFixed(1)+" "+y.toFixed(1); });
  const x0=ox+(lo[0]-loMin)*cosM*sc, y0=oy+(laMax-la[0])*sc;
  const xn=ox+(lo[lo.length-1]-loMin)*cosM*sc, yn=oy+(laMax-la[la.length-1])*sc;
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="flex:0 0 ${S}px;border:1px solid var(--c-contour);border-radius:8px">
    <path d="${p}" fill="none" stroke="var(--c-teal)" stroke-width="1.4" stroke-linejoin="round"/>
    <circle cx="${x0.toFixed(1)}" cy="${y0.toFixed(1)}" r="2.6" fill="var(--c-teal)"/>
    <circle cx="${xn.toFixed(1)}" cy="${yn.toFixed(1)}" r="2.6" fill="var(--c-amber)"/></svg>`;
}

/* anatomySVG — one tappable figure. counts = the chip recurrence map
   (region+side → n); heat mirrors the chip thresholds exactly (amber ×2, red ×3). */
function anatomySVG(view,counts,selId){
  const vb=ANATOMY_VB[view];
  const polys=ANATOMY_ZONES.filter(z=>z.view===view).map(z=>{
    const k=z.region+(z.side&&z.side!=="central"?" "+z.side:"");
    const c=(counts&&counts[k])||0;
    const heat=c>=3?"rgba(224,112,112,0.42)":c===2?"rgba(230,180,80,0.38)":"rgba(95,168,160,0.10)";
    const sel=selId===z.id;
    return `<polygon points="${z.pts}" fill="${sel?"rgba(95,168,160,0.55)":heat}" stroke="${sel?"#5FA8A0":"rgba(255,255,255,0.28)"}" stroke-width="${sel?2:0.8}" style="cursor:pointer" data-act="mapPick" data-v="${z.id}"><title>${esc(z.zone)}${z.side!=="central"?" ("+z.side+")":""}${c?` · ×${c} logged`:""}</title></polygon>`;
  }).join("");
  /* side captions: front view is mirrored (figure-R = viewer-left); rear is direct */
  const cap = view==="front"
    ? `<text x="18" y="30" font-family="var(--mono)" font-size="16" fill="var(--c-dim)">R</text><text x="${vb[0]-30}" y="30" font-family="var(--mono)" font-size="16" fill="var(--c-dim)">L</text>`
    : `<text x="18" y="30" font-family="var(--mono)" font-size="16" fill="var(--c-dim)">L</text><text x="${vb[0]-30}" y="30" font-family="var(--mono)" font-size="16" fill="var(--c-dim)">R</text>`;
  return `<svg viewBox="0 0 ${vb[0]} ${vb[1]}" style="width:100%;max-width:${view==="front"?"210px":"190px"};display:block" role="img" aria-label="${view} body map">
    <image href="${ANATOMY_IMG[view]}" x="0" y="0" width="${vb[0]}" height="${vb[1]}"/>${polys}${cap}</svg>`;
}
/* parseNiggleExtract — validates the Claude reply into a niggle draft.
   Enum-strict: anything outside the locked D026 lists comes back null and is
   surfaced in `missing` for the confirmation card. Never silently defaults
   (date excepted: defaults today, stated on the card). */
function parseNiggleExtract(txt){
  if(!txt) return null;
  const clean=String(txt).replace(/```json|```/g,"").trim();
  const m=clean.match(/\{[\s\S]*\}/); if(!m) return null;
  let o; try{ o=JSON.parse(m[0]); }catch(e){ return null; }
  const pick=(v,list)=>list.includes(v)?v:null;
  const sev=(o.severity!=null&&+o.severity>=1&&+o.severity<=10)?Math.round(+o.severity):null;
  const obj={
    d:/^\d{4}-\d{2}-\d{2}$/.test(o.date||"")?o.date:new Date().toISOString().slice(0,10),
    dateDefaulted:!/^\d{4}-\d{2}-\d{2}$/.test(o.date||""),
    region:pick(o.region,NIGGLE_REGIONS),
    zone:typeof o.zone==="string"?o.zone.slice(0,60):"",
    side:pick(o.side,NIGGLE_SIDE),
    struct:pick(o.structure,NIGGLE_STRUCT),
    sev,
    timing:pick(o.timing,NIGGLE_TIMING),
    warmup:pick(o.warmup,NIGGLE_WARMUP),
    ref:typeof o.sessionRef==="string"?o.sessionRef.slice(0,80):"",
    note:typeof o.note==="string"?o.note.slice(0,300):""
  };
  const missing=["region","side","struct","sev","timing","warmup"].filter(k=>obj[k]==null);
  return {obj,missing};
}
/* System prompt for the Worker /claude extraction — enums injected from the
   locked consts (single source of truth, no drift). Sentinel first line is
   enforced server-side so the relay can't be repurposed as a general proxy. */
function niggleExtractSystem(){
  return "ATHLETE_OS_NIGGLE_EXTRACT\n"
   +"You convert a trail runner's spoken description of a niggle (minor pain/issue) into strict JSON. "
   +"Respond with ONLY one JSON object — no prose, no markdown fences. Fields (omit any field you cannot infer; NEVER guess left vs right):\n"
   +"date: YYYY-MM-DD only if explicitly stated.\n"
   +"region: exactly one of "+JSON.stringify(NIGGLE_REGIONS)+".\n"
   +"zone: short anatomical label if more specific than region.\n"
   +"side: one of "+JSON.stringify(NIGGLE_SIDE)+".\n"
   +"structure: one of "+JSON.stringify(NIGGLE_STRUCT)+".\n"
   +"severity: integer 1-10.\n"
   +"timing: one of "+JSON.stringify(NIGGLE_TIMING)+".\n"
   +"warmup: one of "+JSON.stringify(NIGGLE_WARMUP)+".\n"
   +"sessionRef: short reference to the session if mentioned (e.g. \"Tue threshold\").\n"
   +"note: one short line capturing anything else relevant, in the athlete's own words.";
}

function evSparkSVG(profile){
  if(!profile||!profile.ele||!profile.ele.some(e=>e!=null)) return `<div class="note">no elevation data in this GPX</div>`;
  const D=profile.distKm, E=profile.ele;
  const W=300,H=64,P=4;
  const vals=E.filter(e=>e!=null);
  const emin=Math.min(...vals), emax=Math.max(...vals);
  const span=Math.max(1,emax-emin), total=D[D.length-1]||1;
  let p="";
  D.forEach((dk,i)=>{ if(E[i]==null) return;
    const x=P+(dk/total)*(W-2*P), y=H-P-((E[i]-emin)/span)*(H-2*P);
    p+=(p?"L":"M")+x.toFixed(1)+" "+y.toFixed(1); });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block"><path d="${p}" fill="none" stroke="var(--c-teal)" stroke-width="1.6"/></svg>
    <div class="note" style="display:flex;justify-content:space-between"><span>${Math.round(emin)} m</span><span>${fmt(total,1)} km · ${Math.round(emax)} m max</span></div>`;
}

/* ── BUILD 2 — Dynamic km-derivation pace engine (v1.35, 10/07/26) ──────────
   derivePace(surface) reads App.state.sessions.runs[] and computes a weighted
   rolling average GAP-pace (grade-adjusted) for the given surface, then blends
   with static fallback constants when the window is sparse.

   Locked decisions (signed off 9 Jul 2026):
   D1 — GAP primary, raw avg_pace fallback per run.
   D2 — Blend: n<3 → 100% static; 3≤n<6 → linear blend w=(n−3)/3; n≥6 → 100% rolling.
   D3 — Exclude quarantined + run_type:test; keep race at 0.5× weight; terrain:null excluded.
        backfill rows (run_type:null) → weight 1.0×.
   D4 — Recompute every render (pure reduce, no cache).
   Windows: road 8 wk, trail 12 wk. Floor ≥3 effective-n (Σ wt_i).
   Static fallback: road 375 s/km (6:15), trail 480 s/km (8:00). ── */
const PACE_STATIC = {road:375, trail:480};
const PACE_WINDOW_WK = {road:8, trail:12};
/* #R8 (v1.39): HRV baseline tolerance band — rolling N-day mean ±1 SD, Garmin-style corridor. */
const HRV_BASE_N = 7;
/* Phase terrain: lead type → dominant surface for km derivation.
   end/taper phases are trail-dominant; hyp/rec are road-dominant. */
const PHASE_TERRAIN = {end:"trail", taper:"trail", hyp:"road", rec:"road"};

function parsePaceStr(s){
  /* "M:SS" → seconds/km. Returns null if unparseable. */
  if(!s||typeof s!=="string") return null;
  const m=s.match(/^(\d+):(\d{2})$/);
  if(!m) return null;
  return parseInt(m[1],10)*60+parseInt(m[2],10);
}

function derivePace(surface){
  /* Returns {pace_sec_per_km, source, n, window_wk}.
     source: 'static' | 'blend' | 'rolling'. n = effective-n (Σ wt_i). */
  if(surface!=="road"&&surface!=="trail") return {pace_sec_per_km:PACE_STATIC.road,source:"static",n:0,window_wk:PACE_WINDOW_WK.road};
  const STATIC=PACE_STATIC[surface];
  const WIN_WK=PACE_WINDOW_WK[surface];
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-WIN_WK*7);
  const cutStr=cutoff.toISOString().slice(0,10);
  const runs=(App&&App.state&&App.state.sessions&&App.state.sessions.runs)||[];
  let sumPaceWt=0, sumWt=0;
  runs.forEach(r=>{
    // Exclusions (D3)
    if(!r.d||r.d<cutStr) return;               // outside window
    if(r.quarantined) return;                   // quarantine flag
    if(r.run_type==="test") return;             // test runs
    if(!r.terrain||r.terrain!==surface) return; // wrong surface or null terrain
    // Weight (D3 race 0.5×, backfill null 1.0×, normal 1.0×)
    const wt = r.run_type==="race" ? 0.5 : 1.0;
    // Pace: GAP primary (D1), raw avg_pace fallback
    const paceS = parsePaceStr(r.gap_s_str||null) || parsePaceStr(r.avg_pace);
    if(!paceS||paceS<=0||paceS>1800) return;   // sanity guard (>30 min/km = garbage)
    sumPaceWt += paceS * wt;
    sumWt     += wt;
  });
  const effN = sumWt; // Σ wt_i
  if(effN < 3) return {pace_sec_per_km:STATIC, source:"static", n:effN, window_wk:WIN_WK};
  const rolling = sumPaceWt / sumWt;
  if(effN >= 6) return {pace_sec_per_km:rolling, source:"rolling", n:effN, window_wk:WIN_WK};
  // Blend (D2): 3 ≤ n < 6 → w=(n−3)/3
  const w = (effN - 3) / 3;
  const blended = STATIC * (1 - w) + rolling * w;
  return {pace_sec_per_km:blended, source:"blend", n:effN, window_wk:WIN_WK};
}

function planKm(p){
  /* Returns the dynamic km for a plan row. Race weeks keep their explicit km
     (actual race distance). All other weeks: h × 3600 / derivePace(surface). */
  if(p.race&&p.race.km!=null) return p.race.km;
  const ph = phaseOf(p.w);
  const surface = (ph && PHASE_TERRAIN[ph.lead]) || "road";
  const dp = derivePace(surface);
  if(!p.h||p.h<=0) return 0;
  return Math.round(p.h * 3600 / dp.pace_sec_per_km * 10) / 10;
}

/* Derive a human-readable note for the km-derivation mode shown in-app. */
function derivePaceNote(surface){
  const dp = derivePace(surface);
  const minSec = dp.pace_sec_per_km;
  const m = Math.floor(minSec/60), s = Math.round(minSec%60);
  const pStr = m+":"+(s<10?"0"+s:s)+"/km";
  if(dp.source==="static")  return "km derived · static "+pStr+" ("+surface+", n="+Math.round(dp.n*10)/10+"&lt;3)";
  if(dp.source==="blend")   return "km derived · blend "+pStr+" ("+surface+", n="+Math.round(dp.n*10)/10+", "+dp.window_wk+"wk)";
  return "km derived · rolling "+pStr+" ("+surface+", n="+Math.round(dp.n*10)/10+", "+dp.window_wk+"wk)";
}
/* ── end Build 2 ── */

/* ── FFF_PROJ — plan-derived CTL/ATL/TSB projection (Bannister impulse-response)
   Method v2 (05/07/26): TSS/day derived from PLAN hours × per-week IF. Every down
   week, race-sim, and recovery week in PLAN is reflected automatically. Race weeks:
   pre-race days 32 TSS/day, race day = explicit race TSS, post-race days 5/day.
   STATIC — never synced, never persisted. Divergence from state.fff = calibration
   signal; log monthly in FFF_PROJECTION_BASELINE.md §4.
   Extend only with Andre's explicit sign-off on RUNNING_PLAN.md. ── */
const FFF_PROJ = (()=>{
  const W1proj=new Date(2026,5,29);
  const IF_W={
    1:0.65,2:0.65,3:0.65,
    4:0.72,5:0.72,6:0.72,7:0.72,
    8:0.48,
    10:0.50,11:0.55,
    12:0.65,13:0.67,14:0.67,15:0.65,16:0.68,17:0.68,
    18:0.78,19:0.78,20:0.75,
    21:0.58,
    23:0.45,24:0.50,25:0.52,
    /* Ph9 (D041, 17/07/26): PLAN hours raised to the 8–10 h floor; iF here is a
       CURVE-CALIBRATION factor (h×iF×100/7 = daily TSS), re-fit so the projection
       tracks FFF_PROJECTION_BASELINE §5 Revision 1 (55→60 TSS/d, down-dip W30) —
       lower iF = honest for all-easy Z2 volume at higher hours. */
    26:0.48,27:0.46,28:0.45,29:0.44,30:0.48,31:0.42,
    32:0.75,33:0.77,34:0.77,
    35:0.80,36:0.70,37:0.78,38:0.80,39:0.70,
    40:0.80,41:0.82,42:0.82,43:0.76,
    44:0.72,45:0.68,
    47:0.45,48:0.50,49:0.55,
    /* Ph13 Season-2 base-hold — maintenance easy distribution (~Ph9 level).
       PLAN ASSUMPTION (far-out Jun–Sep 2027); calibration log corrects on real data. */
    50:0.58,51:0.60,52:0.62,53:0.55,54:0.60,55:0.62,56:0.62,
    57:0.60,58:0.55,59:0.60,60:0.62,61:0.62,62:0.60,
  };
  const RACE_TSS={9:120,22:420,46:800};
  const RACE_DATE={9:"2026-08-30",22:"2026-11-27",46:"2027-05-15"};
  const daily={};
  PLAN.forEach(p=>{
    const w=p.w,h=p.h;
    const isRace=RACE_TSS[w]!=null;
    if(isRace){
      const rdStr=RACE_DATE[w];
      const rd=new Date(rdStr+"T00:00:00");
      for(let d=0;d<7;d++){
        const dt=new Date(W1proj.getTime()+(w-1)*7*864e5+d*864e5);
        const iso=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
        daily[iso]=iso===rdStr?RACE_TSS[w]:dt<rd?32:5;
      }
    } else {
      const iF=IF_W[w]||0.70;
      const dTSS=Math.round(h*iF*100/7*10)/10;
      for(let d=0;d<7;d++){
        const dt=new Date(W1proj.getTime()+(w-1)*7*864e5+d*864e5);
        const iso=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
        daily[iso]=dTSS;
      }
    }
  });
  const kCTL=1-Math.exp(-1/42),kATL=1-Math.exp(-1/7);
  let ctl=14.6,atl=4.2;
  const rows=[];
  Object.keys(daily).sort().forEach(iso=>{
    const tss=daily[iso];
    ctl=ctl+kCTL*(tss-ctl); atl=atl+kATL*(tss-atl);
    rows.push({date:iso,tss:Math.round(tss*10)/10,ctl:Math.round(ctl*10)/10,atl:Math.round(atl*10)/10,tsb:Math.round((ctl-atl)*10)/10});
  });
  const idx={};
  rows.forEach(r=>{ idx[r.date]=r; });
  const byWeek={};
  rows.forEach(r=>{
    const d=new Date(r.date+"T00:00:00");
    const w=Math.floor((d-W1proj)/864e5/7)+1;
    if(w>=1&&w<=62) byWeek[w]=r;
  });
  return {rows,idx,byWeek};
})();

/* resolveRX(w,i) — same merge logic as plannedDay: template + week override. */
function resolveRX(w,i){ const ph=phaseOf(w);
  const tpl=(RX_TEMPLATES[ph&&ph.id]||[])[i]||{t:"rest"};
  const o=((RX_OVERRIDES[w]||{})[i])||null;
  return o?Object.assign({},tpl,o):tpl; }
/* RX type-class groups (§3 matcher, D023/D043) */
const RX_CLASS = {
  LONG:["longE","sim","b2b","t_bm"],
  QUALITY:["thr","mp","touch","hill","desc","me","steady","t_aet","t_tt"],
  EASY:["easy","rec"],
  RACE:["race"],
};
function rxClassOf(t){ if(!t) return null;
  for(const k in RX_CLASS){ if(RX_CLASS[k].includes(t)) return k; } return null; }
/* runClassOf(r,rxT) → {cls, authoritative}. Authoritative from runs.json
   run_type vocabulary (long/quality/race/test/easy) — a mismatch here ALWAYS
   blocks the match, same-day included. Non-authoritative (live-sync rows,
   activity-type strings, no run_type) degrades to duration-class inference
   (h≥1.75→LONG; else non-restrictive/null) — a mismatch here blocks only
   non-same-day candidates; same-day is never blocked. */
function runClassOf(r,rxT){
  const rt=r.run_type;
  if(rt==="long") return {cls:"LONG",authoritative:true};
  if(rt==="quality") return {cls:"QUALITY",authoritative:true};
  if(rt==="race") return {cls:"RACE",authoritative:true};
  if(rt==="test") return {cls:(rxT==="t_bm"?"LONG":"QUALITY"),authoritative:true};
  if(rt==="easy") return {cls:"EASY",authoritative:true};
  // live-sync / unlabelled: duration-class inference, non-authoritative
  return {cls:(r.h!=null&&r.h>=1.75)?"LONG":null, authoritative:false};
}
/* matchRX(w) — pure function, computed at render. Returns Map keyed "i" (plan day
   index 0-6) → matched run row (or null), plus an "unplanned" list of run rows on
   the visible week's dates that didn't match any plan day. No stored match state
   except the additive optional rx_d override field on the run row itself. */
function matchRX(w){
  const dates=[]; for(let i=0;i<7;i++) dates.push(dayISO(w,i));
  const {R}=sessionMaps();
  // gather candidate runs within the visible week ± spill from adjacent weeks (±2d window)
  const win=new Set();
  for(let i=0;i<7;i++){ const iso=dayISO(w,i);
    const base=new Date(iso); for(let dd=-2;dd<=2;dd++){ const dt=new Date(base); dt.setDate(dt.getDate()+dd);
      win.add(dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")); } }
  let cands=[]; win.forEach(iso=>{ (R[iso]||[]).forEach(r=>{ if(!r.quarantined) cands.push(r); }); });
  const rxDay=i=>resolveRX(w,i);
  const matched={}; const usedRunIds=new Set();
  const rowKey=r=>r.id!=null?("id:"+r.id):("d:"+r.d);
  // 1. manual overrides first (win over everything)
  for(let i=0;i<7;i++){ const rx=rxDay(i); if(rx.t==="rest") continue;
    const pinned=cands.find(r=>r.rx_d===dates[i] && !usedRunIds.has(rowKey(r)));
    if(pinned){ matched[i]=pinned; usedRunIds.add(rowKey(pinned)); } }
  // build scoreable day list (excluding already-pinned + rest)
  const openDays=[]; for(let i=0;i<7;i++){ if(matched[i]!=null) continue; const rx=rxDay(i); if(rx.t==="rest") continue; openDays.push(i); }
  // candidate pool minus force-unmatched (rx_d==="x") and used
  let pool=cands.filter(r=>r.rx_d!=="x" && !usedRunIds.has(rowKey(r)));
  // build (day,run,Δd) pairs respecting type binding + race same-day-only
  const pairs=[];
  openDays.forEach(i=>{ const rx=rxDay(i); const cls=rxClassOf(rx.t); const pdIso=dates[i]; const pd=new Date(pdIso);
    pool.forEach(r=>{ const rd=new Date(r.d); const dd=Math.round((rd-pd)/86400000);
      const win2=cls==="RACE" ? (dd===0) : (Math.abs(dd)<=2);
      if(!win2) return;
      const rc=runClassOf(r,rx.t);
      if(rc.cls!==null && rc.cls!==cls){
        if(rc.authoritative) return;             // authoritative mismatch: always blocks, same-day included
        if(dd!==0) return;                        // inferred mismatch: blocks only non-same-day
      }
      pairs.push({i,r,dd:Math.abs(dd),dd0:dd}); }); });
  // 4. nearest-first: sort by |Δd| asc, tie → Δd=0 first, then earlier plan day
  pairs.sort((a,b)=> (a.dd-b.dd) || ((a.dd0===0?0:1)-(b.dd0===0?0:1)) || (a.i-b.i));
  const dayTaken=new Set(Object.keys(matched).map(Number));
  pairs.forEach(p=>{ if(dayTaken.has(p.i)) return; const k=rowKey(p.r); if(usedRunIds.has(k)) return;
    matched[p.i]=p.r; usedRunIds.add(k); dayTaken.add(p.i); });
  const unplanned=cands.filter(r=>!usedRunIds.has(rowKey(r)));
  return {matched, unplanned};
}

/* §4 scorer (D043). INTENSITY_SCORED=false until post-W6 TT + AeT re-probe
   confirmation — one const flip, no rebuild. While false, intensity renders
   as a ⚑ flag line only, never a score. */
const INTENSITY_SCORED = false;
/* §A3 (D044, v1.50). DESCENT_SCORED=false — desc channel scaffolded, weight 0.2
   inside the existing renorm, but inactive at ship. Promotion = one const flip
   on ~2 wk of synced descent actuals. Pre-flip: renorm over active channels
   reproduces vol 0.6 / vert 0.2 / intensity 0.2 exactly (bit-identical to D043). */
const DESCENT_SCORED = false;
function fieldDev(lo,hi,actual){
  if(actual==null) return null;
  return actual<lo ? (lo-actual)/lo : actual>hi ? (actual-hi)/hi : 0;
}
function fieldScore(dev){
  if(dev==null) return null;
  return dev<=0.20 ? 100 : dev>=0.50 ? 0 : Math.round(100*(0.50-dev)/0.30);
}
/* scoreRun(rx,run) → {score, channels:[{k,label,dev,score,lo,hi,actual}], coverage:"n/m", flags:[]}
   or null when the RX is a race (never scored) or rest. */
function scoreRun(rx,run){
  if(!rx||rx.t==="rest"||rx.t==="race") return null;
  const channels=[]; const flags=[];
  // primary volume field = whichever RX prescribes (dur or km); both → mean of the two
  const volChans=[];
  if(rx.dur){ const dev=fieldDev(rx.dur[0],rx.dur[1],run.h); if(dev!=null) volChans.push({k:"dur",label:"Duration",dev,score:fieldScore(dev),lo:rx.dur[0],hi:rx.dur[1],actual:run.h}); }
  if(rx.km){ const dev=fieldDev(rx.km[0],rx.km[1],run.km); if(dev!=null) volChans.push({k:"km",label:"Distance",dev,score:fieldScore(dev),lo:rx.km[0],hi:rx.km[1],actual:run.km}); }
  let primaryScore=null;
  if(volChans.length){ primaryScore=Math.round(volChans.reduce((s,c)=>s+c.score,0)/volChans.length);
    channels.push({k:"vol",label:volChans.map(c=>c.label).join(" + "),dev:volChans[0].dev,score:primaryScore,
      lo:volChans[0].lo,hi:volChans[0].hi,actual:volChans[0].actual}); }
  // vert
  if(rx.vert){ const dev=fieldDev(rx.vert[0],rx.vert[1],run.gain); if(dev!=null) channels.push({k:"vert",label:"Vert",dev,score:fieldScore(dev),lo:rx.vert[0],hi:rx.vert[1],actual:run.gain}); }
  // descent — gated behind DESCENT_SCORED (§A3, D044); inactive at ship, weight 0.2 when live
  if(rx.desc && DESCENT_SCORED){ const dev=fieldDev(rx.desc[0],rx.desc[1],run.desc); if(dev!=null) channels.push({k:"desc",label:"Descent",dev,score:fieldScore(dev),lo:rx.desc[0],hi:rx.desc[1],actual:run.desc}); }
  // intensity — flag-only while INTENSITY_SCORED is false
  if(rx.pw || rx.z){
    let breach=false;
    if(rx.pw && run.np!=null){ /* power-primary; no numeric cap parsed from pw string at v1 — presence-only flag suppressed */ }
    if(rx.z && run.avg_hr!=null){
      const ZCEIL={Z1:142,Z2:152,Z3:173,Z4:999};
      const ceil=ZCEIL[rx.z]; if(ceil && run.avg_hr>ceil+3) breach=true;
    }
    if(breach) flags.push(`intensity — avg HR ${run.avg_hr} bpm vs ${rx.z} ceiling`);
    if(INTENSITY_SCORED){ /* promotion path: add an "intensity" channel here, one const flip */ }
  }
  const weights={vol:0.6,vert:0.2,intensity:0.2,desc:0.2};
  const avail=channels.filter(c=>c.score!=null);
  const total=avail.length? avail.reduce((s,c)=>s+(weights[c.k]||0),0) : 0;
  const score = avail.length ? Math.round(avail.reduce((s,c)=>s+c.score*(weights[c.k]||0),0)/(total||1)) : null;
  const m = (rx.vert?1:0) + (INTENSITY_SCORED?1:0) + (DESCENT_SCORED?1:0) + 1; // denominator: vol always counts as 1 channel; desc counts only when DESCENT_SCORED
  return {score, channels, coverage:`${avail.length}/${m}`, flags};
}

/* planWeekOf(iso) — which macro week (W1 = w/c Mon 29/06/26) a date falls in.
   Used to aggregate daily wellness to a weekly x-axis that lines up with the
   plan / FFF charts. Returns integer ≥1 (can exceed 49 for far-future dates). */
const planWeekOf = iso => {
  const w1=new Date(2026,5,29).getTime();
  const t=new Date(iso+"T00:00:00").getTime();
  return Math.floor((t-w1)/(7*864e5))+1;
};
/* weekStartISO(w) — inverse of planWeekOf: the w/c Monday ISO date for macro-week w.
   #41 (v1.39): lets week-indexed data (actualWeeks) feed the date-based applyCtl pipeline. */
const weekStartISO = w => { const w1=new Date(2026,5,29); const d=new Date(w1.getTime()+(w-1)*7*864e5); return d.toISOString().slice(0,10); };

/* aggregateWellness(rows, key, view) — from fff rows [{date, <key>, …}] build
   {cats:[label…], data:[value|null…]} at daily or weekly resolution.
   - "day":  one point per row, label = MM-DD, value = the raw channel.
   - "week": one point per macro week present in the data, label = "W#",
             value = mean of that week's non-null values (null if none).
   Weekly means align the x-axis to the plan/FFF charts (both W#-indexed). */
function aggregateWellness(rows, key, view){
  const pts=rows.filter(r=>r&&r.date&&r[key]!=null);
  if(view==="week"){
    const byW={};
    pts.forEach(r=>{ const w=planWeekOf(r.date); (byW[w]=byW[w]||[]).push(+r[key]); });
    const ws=Object.keys(byW).map(Number).sort((a,b)=>a-b);
    return { cats:ws.map(w=>"W"+w),
             data:ws.map(w=>{ const a=byW[w]; return a.length?+(a.reduce((s,v)=>s+v,0)/a.length).toFixed(2):null; }) };
  }
  return { cats:pts.map(r=>fmtDshort(r.date)), data:pts.map(r=>+r[key]) };
}

/* ── SVG chart helpers ── */
function niceMax(v){ if(v<=0) return 1; const p=Math.pow(10,Math.floor(Math.log10(v))); const n=v/p; const m=n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10; return m*p; }

/* #R4d (v1.38): best-fit y-domain. vals = visible numeric values only (nulls pre-filtered).
   opts: {yMin,yMax} hard bounds from the call site (respected verbatim). */
function yDomain(vals, opts){
  opts=opts||{};
  if(!vals.length) vals=[0,1];
  let lo=Math.min(...vals), hi=Math.max(...vals);
  if(lo===hi){ lo-=1; hi+=1; }
  const pad=(hi-lo)*0.12;
  if(opts.yMin==null) lo-=pad; else lo=opts.yMin;
  if(opts.yMax==null) hi+=pad; else hi=opts.yMax;
  // nice-number snap (only on the free sides): step from ~3 intervals
  const nice=v=>{const p=Math.pow(10,Math.floor(Math.log10(Math.max(1e-9,v))));const n=v/p;return (n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10)*p;};
  const step=nice((hi-lo)/3);
  if(opts.yMin==null) lo=Math.floor(lo/step)*step;
  if(opts.yMax==null) hi=Math.ceil(hi/step)*step;
  if(lo===hi) hi=lo+step;
  return {lo,hi};
}
/* #41 (v1.39): applyCtl(rows, dateKey, ctl, aggSpec) — filter rows to [ctl.from,ctl.to]
   (inclusive, ISO string compare), then bucket per ctl.per ("D"|"W"|"M"|"Q"|"Y") and
   aggregate per-field per aggSpec ("mean"|"sum"). Empty bucket → null (never fabricated).
   D = one point per row (no bucketing). W buckets are w/c Monday, labelled fmtDshort.
   M = "MM/YY", Q = "Qn/YY", Y = the 4-digit year. Returns {cats, <field>:[...]}. */
function applyCtl(rows, dateKey, ctl, aggSpec){
  ctl = ctl || {};
  const inRange = r => { const d=r[dateKey]; if(!d) return false;
    if(ctl.from && d<ctl.from) return false;
    if(ctl.to && d>ctl.to) return false;
    return true; };
  const filtered = rows.filter(inRange);
  const fields = Object.keys(aggSpec||{});
  if(!ctl.per || ctl.per==="D"){
    const cats = filtered.map(r=>fmtDshort(r[dateKey]));
    const out = {cats};
    fields.forEach(f=>{ out[f]=filtered.map(r=>r[f]==null?null:r[f]); });
    return out;
  }
  const mondayOf = iso => { const dt=new Date(iso+"T00:00:00Z"); const day=dt.getUTCDay();
    const diff=(day===0?-6:1-day); dt.setUTCDate(dt.getUTCDate()+diff); return dt.toISOString().slice(0,10); };
  const bucketKey = iso => {
    if(ctl.per==="W") return mondayOf(iso);
    if(ctl.per==="M") return iso.slice(0,7);

function sparkSVG(series,color){

  const W=160,H=42,vals=series.map(p=>p.v);
  let lo=Math.min(...vals),hi=Math.max(...vals); if(lo===hi){lo-=1;hi+=1;}

/* photoOverlaySVG (v1.28): baseline photo + dual contour.
   Teal solid = today's contour (photo-traced). Amber dashed = target
   proportions: the SAME contour warped per scanline about its own centreline
   by r(y) = target girth ÷ current girth, piecewise-linear between measured
   landmark heights. TRUE SCALE — no amplification (unlike girthSVG's Δ×3).
   Same-centre scaling ⇒ the target line is a proportional offset of Andre's
   real curvature and cannot cross it except where r passes through 1 (blend
   endpoints — zero-delta points by construction). Current girths come from
   the latest monthly Renpho entry, so the warp updates as data lands. */
function photoOverlaySVG(todayG, targetG, photoUrl){
  const PC=PHOTO_CONTOUR, L=PC.landmarks, IW=PC.img.w, IH=PC.img.h;
  const rOf=id=>{ const cv=todayG?todayG[id]:null, tv=targetG?targetG[id]:null;
    if(cv==null||tv==null||cv===0) return 1;
    return Math.min(1.35,Math.max(0.75,tv/cv)); };
  /* v1.32 — SCHED.upper continuity fix. The `upper` region is a single
     whole-body envelope; its image-left edge IS the subject's right outer
     arm and its image-right edge IS the subject's left outer arm. Warping
     the whole envelope about the body midline by one averaged bicep ratio
     stepped the amber (target) line at the armpit split, because below the
     split the same physical arm edge is warped about the ARM's own (much
     nearer) centre by a much smaller half-width. Fix: give `upper` two
     independent EDGE schedules — outer-left tracks bicepR, outer-right
     tracks bicepL — and warp each edge by its own ratio (rL/rR) about the
     region centre. Interior landmarks (neck/shoulder/chest) ramp identically
     on both edges. This makes the split RATIOS match by construction; the
     residual warp-BASIS jump is then closed by a short outer-edge anchor
     blend on the arm regions (below). rBicAvg is gone — no averaging. */
  const SCHED={
    upperL:[[L.neck,1],[L.sho,rOf("shoulder")],[L.chest,rOf("chest")],[L.split,rOf("bicepR")]],
    upperR:[[L.neck,1],[L.sho,rOf("shoulder")],[L.chest,rOf("chest")],[L.split,rOf("bicepL")]],
    torso:[[L.chest,rOf("chest")],[L.waist,rOf("waist")],[L.abd,rOf("abdomen")],[L.hip,rOf("hip")],[L.crotch,rOf("hip")]],
    armR:[[L.split,rOf("bicepR")],[L.armBicep+40,rOf("bicepR")],[L.armForearm,rOf("forearmR")],[L.armWrist,1]],
    armL:[[L.split,rOf("bicepL")],[L.armBicep+40,rOf("bicepL")],[L.armForearm,rOf("forearmL")],[L.armWrist,1]],
    legR:[[L.crotch,rOf("upThighR")],[L.upTh+45,rOf("upThighR")],[L.loTh,rOf("loThighR")],[L.calf,rOf("calfR")],[L.ankle,1]],
    legL:[[L.crotch,rOf("upThighL")],[L.upTh+45,rOf("upThighL")],[L.loTh,rOf("loThighL")],[L.calf,rOf("calfL")],[L.ankle,1]],
  };
  const evalR=(sch,y)=>{
    if(y<=sch[0][0]) return sch[0][1];
    if(y>=sch[sch.length-1][0]) return sch[sch.length-1][1];
    for(let i=1;i<sch.length;i++){ if(y<=sch[i][0]){
      const t=(y-sch[i-1][0])/(sch[i][0]-sch[i-1][0]);
      return sch[i-1][1]+t*(sch[i][1]-sch[i-1][1]); } }
    return 1;
  };
  const poly=pts=>"M"+pts.map(p=>fmt(p[0],1)+","+fmt(p[1],1)).join(" L ");
  /* v1.32 — outer-edge anchor for the arms. At the split, the upper envelope's
     outer edge lands at (centre_up − half_up · rBic); the arm region, warped
     about its own nearer centre, would place the same edge at (centre_arm −
     half_arm · rBic) — a jump of Δ even though the ratios agree. We carry that
     Δ across the seam and relax it linearly to zero over [split, armBicep], so
     the outer arm edge leaves the split C0-continuous with the upper envelope
     and returns to the pure arm-centre warp by the bicep landmark. Inner
     (armpit-facing) edges are untouched. armR's outer edge is its xl (left);
     armL's outer edge is its xr (right). */
  const upRows=PC.regions.upper, upSplit=upRows[upRows.length-1];
  const upC=(upSplit[1]+upSplit[2])/2, upH=(upSplit[2]-upSplit[1])/2;
  const rBicR=rOf("bicepR"), rBicL=rOf("bicepL");
  const armAnchor={};
  ["armR","armL"].forEach(k=>{
    const f=PC.regions[k][0], cA=(f[1]+f[2])/2, hA=(f[2]-f[1])/2;
    if(k==="armR"){ const upEdge=upC-upH*rBicR, armEdge=cA-hA*rBicR; armAnchor[k]=upEdge-armEdge; }
    else          { const upEdge=upC+upH*rBicL, armEdge=cA+hA*rBicL; armAnchor[k]=upEdge-armEdge; }
  });
  const anchorEnd=L.armBicep;   // Δ relaxes to zero by the bicep landmark
  let cur="", tgt="";
  Object.keys(PC.regions).forEach(k=>{
    const rows=PC.regions[k];
    const cl=[],cr=[],tl=[],tr=[];
    if(k==="upper"){
      /* per-edge ratios: left edge (subj right arm) → upperL, right edge → upperR */
      rows.forEach(p=>{ const y=p[0], xl=p[1], xr=p[2], c=(xl+xr)/2, h=(xr-xl)/2,
        rL=evalR(SCHED.upperL,y), rR=evalR(SCHED.upperR,y);
        cl.push([xl,y]); cr.push([xr,y]); tl.push([c-h*rL,y]); tr.push([c+h*rR,y]); });
    } else if(k==="armR"||k==="armL"){
      const sch=SCHED[k], Δ0=armAnchor[k];
      rows.forEach(p=>{ const y=p[0], xl=p[1], xr=p[2], c=(xl+xr)/2, h=(xr-xl)/2, r=evalR(sch,y);
        /* anchor blend fades from Δ0 at the split to 0 at anchorEnd */
        const w = y>=anchorEnd ? 0 : (anchorEnd-y)/(anchorEnd-L.split);
        const off = Δ0*Math.max(0,Math.min(1,w));
        cl.push([xl,y]); cr.push([xr,y]);
        if(k==="armR"){ tl.push([c-h*r+off,y]); tr.push([c+h*r,y]); }   // outer = left (xl)
        else          { tl.push([c-h*r,y]);     tr.push([c+h*r+off,y]); } // outer = right (xr)
      });
    } else {
      const sch=SCHED[k];
      rows.forEach(p=>{ const y=p[0], xl=p[1], xr=p[2], c=(xl+xr)/2, h=(xr-xl)/2, r=evalR(sch,y);
        cl.push([xl,y]); cr.push([xr,y]); tl.push([c-h*r,y]); tr.push([c+h*r,y]); });
    }
    cur+=`<path d="${poly(cl)}"/><path d="${poly(cr)}"/>`;
    tgt+=`<path d="${poly(tl)}"/><path d="${poly(tr)}"/>`;
  });
  const hasPhoto=!!photoUrl;
  const vb=hasPhoto?`0 0 ${IW} ${IH}`:`0 0 410 ${IH}`;   // crop to front figure when no photo
  const img=hasPhoto?`<image href="${photoUrl}" x="0" y="0" width="${IW}" height="${IH}"/>
    <rect x="0" y="0" width="${IW}" height="${IH}" fill="var(--c-night)" opacity="0.14"/>`
   :`<text x="205" y="120" text-anchor="middle" font-family="var(--mono)" font-size="15" fill="var(--c-dim)">no photo on this device</text>
     <text x="205" y="142" text-anchor="middle" font-family="var(--mono)" font-size="11" fill="var(--c-dim)">contours still true — load the 06/07/26 baseline photo below</text>`;
  return `<svg viewBox="${vb}" style="width:100%;max-width:${hasPhoto?460:220}px;display:block;margin:0 auto" preserveAspectRatio="xMidYMid meet">
    ${img}
    <g fill="none" stroke="${C.teal}" stroke-width="2.5" opacity="0.85">${cur}</g>
    <g fill="none" stroke="${C.amber}" stroke-width="3" stroke-dasharray="9 7" opacity="0.95">${tgt}</g>
  </svg>`;
}

/* ── radarSVG (v1.5): 15-axis girth radar, current vs target.
   Direction-aware: waist/abdomen plot target/current (inside 100 = still over
   target); all others current/target. 100% ring = target. ── */
function radarSVG(cur, tgt){
  const N=GIRTHS.length, S=330, c=S/2, Rmax=c-46;
  const pctOf=g=>{ const cv=cur?cur[g.id]:null, tv=tgt?tgt[g.id]:null;
    if(cv==null||tv==null||tv===0) return null;
    const down=(g.id==="waist"||g.id==="abdomen");
    return Math.round((down? tv/cv : cv/tv)*100); };
  const rOf=p=>{ const cl=Math.min(112,Math.max(78,p)); return Rmax*((cl-78)/(112-78))*0.82+Rmax*0.18; };
  const r100=rOf(100);
  const ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,r)=>[c+r*Math.cos(ang(i)), c+r*Math.sin(ang(i))];
  const rings=[85,92,100,108].map(p=>{ const r=rOf(p);
    return `<circle cx="${c}" cy="${c}" r="${fmt(r,1)}" fill="none" stroke="${p===100?C.amber:"var(--c-contour)"}" stroke-width="${p===100?1.4:0.6}" ${p===100?`stroke-dasharray="5 4"`:""} opacity="${p===100?0.9:0.6}"/>`; }).join("");
  const spokes=GIRTHS.map((g,i)=>{ const [x,y]=pt(i,Rmax); const [lx,ly]=pt(i,Rmax+18);
    const short=g.name.replace("Upper Thigh","U.Thigh").replace("Lower Thigh","L.Thigh").replace("Forearm","F.arm").replace("Bicep ","Bi ");
    return `<line x1="${c}" y1="${c}" x2="${fmt(x,1)}" y2="${fmt(y,1)}" stroke="var(--c-contour)" stroke-width="0.5" opacity="0.5"/>
      <text x="${fmt(lx,1)}" y="${fmt(ly,1)}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="var(--c-mist)" font-family="var(--mono)">${esc(short)}</text>`; }).join("");
  const pts=GIRTHS.map((g,i)=>{ const p=pctOf(g); return p==null?null:pt(i,rOf(p)); });
  const have=pts.filter(Boolean).length;
  const poly = have>=3 ? "M"+pts.map((p,i)=>p?fmt(p[0],1)+","+fmt(p[1],1):null).filter(Boolean).join(" L ")+" Z" : null;
  /* v1.29 — interactive vertices: visible dot per measured site + a larger
     invisible hit circle carrying the site card data (hover/tap → #radarTip;
     click selects the site trend). Sites without data get a hit circle on the
     100% ring so every axis is inspectable. */
  const dots=GIRTHS.map((g,i)=>{
    const p=pctOf(g); const [hx,hy]=p==null?pt(i,r100):pts[i];
    const cv=cur?cur[g.id]:null, tv=tgt?tgt[g.id]:null;
    const down=(g.id==="waist"||g.id==="abdomen");
    const col=p==null?C.dim:(p>=98?C.teal:p>=92?C.amber:C.rose);
    const dv=(cv!=null&&tv!=null)?tv-cv:null;
    const dTxt=dv==null?"—":`${dv>0?"+":""}${fmt(dv,1)} cm ${down?(dv<0?"to lose":"over"):(dv>0?"to gain":"met")}`;
    return `${p==null?"":`<circle data-dot="${g.id}" cx="${fmt(hx,1)}" cy="${fmt(hy,1)}" r="3.5" fill="${col}" stroke="var(--c-night)" stroke-width="0.8"/>`}
      <circle data-site="${g.id}" data-name="${esc(g.name)}" data-cur="${cv==null?"—":fmt(cv,1)+" cm"}" data-tgt="${tv==null?"—":fmt(tv,1)+" cm"}" data-delta="${esc(dTxt)}" data-pct="${p==null?"—":p+"%"}" data-lam="${g.λ}" cx="${fmt(hx,1)}" cy="${fmt(hy,1)}" r="13" fill="transparent" style="cursor:pointer"/>`;
  }).join("");
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="max-width:100%">
    ${rings}${spokes}
    ${poly?`<path d="${poly}" fill="rgba(94,234,212,.14)" stroke="${C.teal}" stroke-width="1.8" stroke-linejoin="round"/>`:""}
    ${dots}
    <text x="${c}" y="${S-4}" text-anchor="middle" font-size="8.5" fill="var(--c-dim)" font-family="var(--mono)">amber ring = target (100%) · teal = current · waist/abdomen inverted</text>
  </svg>`;
}

function bodySVG(vals, ref, selected, opts){
  const o=opts||{}; const W=200, H=316, AMP=4;
  let g=`<circle cx="100" cy="26" r="15" fill="none" stroke="${C.contour}" stroke-width="1.5"/>`;
  SEGMENTS.forEach(s=>{
    let w=s.w, fill="none", stroke=C.contour, dash=' stroke-dasharray="4 3"', op=1;
    if(vals && vals[s.id]!=null){
      dash=""; const base=ref&&ref[s.id]!=null?ref[s.id]:vals[s.id];
      const r=Math.sqrt(Math.max(0.01,vals[s.id]/base));
      w=s.w*Math.min(1.4,Math.max(0.75,1+AMP*(r-1)));
      const d=vals[s.id]-base;
      fill=Math.abs(d)<0.05?C.slate:d>0?C.teal:C.rose; op=0.55;
      stroke=s.id===selected?C.chalk:"none";
    } else if(s.id===selected){ stroke=C.chalk; }
    g+=`<rect data-seg="${s.id}" x="${(s.cx-w).toFixed(1)}" y="${s.y}" width="${(2*w).toFixed(1)}" height="${s.h}" rx="${Math.min(10,w)}" fill="${fill}" fill-opacity="${op}" stroke="${stroke}" stroke-width="1.5"${dash} style="cursor:pointer"></rect>`;
  });
  if(o.label) g+=`<text x="100" y="${H-2}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="${C.mist}">${esc(o.label)}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="150" style="display:block;margin:0 auto">${g}</svg>`;
}

/* ── Performance radar (Overview tab): 6 axes from scorecard data ── */
function perfRadarSVG(sc){
  const S=260, c=S/2, Rmax=c-52;
  const axes=[
    {id:"adh",  label:"Run adherence",  v:sc.adh==null?null:Math.min(sc.adh,120)/100},
    {id:"runW", label:"Run this wk",    v:sc.runOK},
    {id:"gymW", label:"Gym this wk",    v:sc.gymOK},
    {id:"prot", label:"Protein days",   v:sc.protOK},
    {id:"hlth", label:"Health",         v:sc.seen?(1-(sc.seen>0?sc.flags/sc.seen:0)):null},
    {id:"mind", label:"Mind",           v:sc.mind==null?null:sc.mind/100},
  ];
  const N=axes.length;
  const ang=i=>(-90+i*360/N)*Math.PI/180;
  const pt=(i,r)=>[c+r*Math.cos(ang(i)), c+r*Math.sin(ang(i))];
  // rings
  let rings="";
  [0.5,0.75,1.0].forEach(f=>{
    const r=Rmax*f;
    rings+=`<circle cx="${c}" cy="${c}" r="${fmt(r,1)}" fill="none" stroke="var(--c-contour)" stroke-width="${f===1?1.2:0.5}" opacity="${f===1?0.7:0.4}"/>`;
  });
  // spokes + labels
  let spokes=axes.map((a,i)=>{
    const [x,y]=pt(i,Rmax), [lx,ly]=pt(i,Rmax+20);
    return `<line x1="${c}" y1="${c}" x2="${fmt(x,1)}" y2="${fmt(y,1)}" stroke="var(--c-contour)" stroke-width="0.5" opacity="0.5"/>
      <text x="${fmt(lx,1)}" y="${fmt(ly,1)}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="var(--c-mist)" font-family="var(--mono)">${esc(a.label)}</text>`;
  }).join("");
  // polygon
  const pts=axes.map((a,i)=>{ const r=Rmax*(a.v==null?0:Math.min(1,Math.max(0,a.v))); return pt(i,r); });
  const poly="M"+pts.map(p=>fmt(p[0],1)+","+fmt(p[1],1)).join(" L ")+" Z";
  // dots
  const dots=axes.map((a,i)=>{
    const v=a.v==null?0:Math.min(1,Math.max(0,a.v));
    const r=Rmax*v, [x,y]=pt(i,r);
    const col=v>=0.85?C.teal:v>=0.6?C.amber:C.rose;
    return a.v==null?"":`<circle cx="${fmt(x,1)}" cy="${fmt(y,1)}" r="3" fill="${col}" stroke="var(--c-night)" stroke-width="0.8"/>`;
  }).join("");
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}" style="max-width:100%;display:block">
    ${rings}${spokes}
    <path d="${poly}" fill="rgba(94,234,212,.12)" stroke="${C.teal}" stroke-width="1.6" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

/* ── HERO: the plan chart ── */
function overviewSVG(wStart, wEnd){
  /* Four stacked panels sharing one x-axis:
     1. Plan (top): plan area/line + historic run volume (bar-style solid).
     2. Fitness/Fatigue: CTL (teal) + ATL (rose) lines, own y-axis.
     3. Form: TSB (violet) line + readiness bands, own y-axis.
     4. Weight: kg line from state.body, own y-axis.
     wStart may be negative (pre-plan). wEnd capped at 46. */
  if(wStart==null) wStart=1; if(wEnd==null) wEnd=46;
  wEnd=Math.min(62,wEnd);
  const unit=App.unit, pk=unit, ak=unit==="km"?"akm":"ah";

  // ── Plan data ────────────────────────────────────────────────────────────
  // Build 2 (v1.35): km field replaced by derivePace-based planKm() at render time.
  const planData=PLAN.map(p=>{ const a=App.state.actualWeeks[p.w];
    return {...p, km:planKm(p), akm:a&&a.km!=null?a.km:null, ah:a&&a.h!=null?a.h:null}; });

  const runsByWeek={};
  const W1d=new Date(2026,5,29);
  (App.state.sessions.runs||[]).forEach(r=>{
    if(!r.d) return;
    const delta=Math.floor((new Date(r.d+"T00:00:00")-W1d)/864e5);
    const w=Math.floor(delta/7)+1;
    if(!runsByWeek[w]) runsByWeek[w]={km:0,h:0,n:0};
    if(r.km!=null) runsByWeek[w].km+=r.km;
    if(r.h!=null)  runsByWeek[w].h +=r.h;
    runsByWeek[w].n++;
  });

  const data=planData.map(p=>{
    const rb=runsByWeek[p.w];
    return {...p,
      akm:p.akm!=null?p.akm:(rb&&rb.km>0?Math.round(rb.km*10)/10:null),
      ah: p.ah!=null ?p.ah :(rb&&rb.h >0?Math.round(rb.h*100)/100:null)};
  });
  const hasActual=data.some(d=>d.akm!=null);

  const preWeeks=Object.keys(runsByWeek).map(Number).filter(w=>w<1).sort((a,b)=>a-b);
  const hasHist=preWeeks.length>0;

  // ── FFF data ─────────────────────────────────────────────────────────────
  const dateToW=iso=>{const d=new Date(iso+"T00:00:00");return Math.floor((d-W1d)/864e5/7)+1;};
  const fff=(App.state.fff||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const byWeek={};
  fff.forEach(r=>{const w=dateToW(r.date);if(w>=wStart&&w<=wEnd)byWeek[w]=r;});
  const fffWeeks=Object.keys(byWeek).map(Number).sort((a,b)=>a-b);
  const hasFFF=fffWeeks.length>0;
  // ── FFF projection by week (FFF_PROJ constant, plan-derived) ─────────────
  const projByWeek={};
  for(let w=Math.max(1,wStart);w<=Math.min(62,wEnd);w++){
    if(FFF_PROJ.byWeek[w]) projByWeek[w]=FFF_PROJ.byWeek[w];
  }
  const projWeeks=Object.keys(projByWeek).map(Number).sort((a,b)=>a-b);
  const hasProj=projWeeks.length>0;

  // ── Weight data (from state.body — same series as the Body tab) ───────────
  const bodyByWeek={};
  (App.state.body||[]).forEach(b=>{
    if(!b.d||b.kg==null) return;
    const w=dateToW(b.d);
    if(w>=wStart&&w<=wEnd) bodyByWeek[w]=b.kg; // last reading in the week wins
  });
  const wtWeeks=Object.keys(bodyByWeek).map(Number).sort((a,b)=>a-b);
  const hasWt=wtWeeks.length>0;

  // ── Layout: four panels + shared x-axis ──────────────────────────────────
  const W=920, Pl=52, Pr=14, Pt=24, Pb=52;
  const iw=W-Pl-Pr;
  // Panel heights (px) — plan biggest, then load, form, weight
  const hPlan=150, hLoad=90, hForm=100, hWt=64, gap=16;
  const H = Pt + hPlan + gap + hLoad + gap + hForm + gap + hWt + Pb;
  const xAxisY = H - Pb;
  // Panel y-bounds
  const planT=Pt,               planB=planT+hPlan;
  const loadT=planB+gap,        loadB=loadT+hLoad;
  const formT=loadB+gap,        formB=formT+hForm;
  const wtT  =formB+gap,        wtB  =wtT+hWt;

  const span=wEnd-wStart; if(span<=0) return "";
  const sx=w=>Pl+((w-wStart)/span)*iw;
  const cw=todayWeek();

  // ── Y-scales ─────────────────────────────────────────────────────────────
  // Plan panel
  const planVals=data.filter(d=>d.w>=Math.max(1,wStart)&&d.w<=wEnd).map(d=>Math.max(d[pk]||0,d[ak]||0));
  if(hasHist) preWeeks.filter(w=>w>=wStart).forEach(w=>{const v=unit==="km"?runsByWeek[w].km:runsByWeek[w].h; if(v>0) planVals.push(v);});
  const planHi=niceMax(Math.max(1,...planVals)*1.06);
  const syPlan=v=>planB-(v/planHi)*hPlan;

  // Load panel (CTL + ATL) — y-scale includes projection values so both fit
  let loadLo=0, loadHi=1;
  {
    const lv=[];
    if(hasFFF) fffWeeks.forEach(w=>{ if(byWeek[w].ctl!=null) lv.push(byWeek[w].ctl); if(byWeek[w].atl!=null) lv.push(byWeek[w].atl); });
    if(hasProj) projWeeks.forEach(w=>{ lv.push(projByWeek[w].ctl, projByWeek[w].atl); });
    if(lv.length){ loadHi=Math.max(...lv)*1.08; loadLo=Math.max(0,Math.min(...lv)-3); }
  }
  const syLoad=v=>loadB-((v-loadLo)/(loadHi-loadLo))*hLoad;

  // Form panel (TSB) — y-scale includes projection
  let formLo=-10, formHi=10;
  {
    const tv=[];
    if(hasFFF) fffWeeks.forEach(w=>{ if(byWeek[w].tsb!=null) tv.push(byWeek[w].tsb); });
    if(hasProj) projWeeks.forEach(w=>{ tv.push(projByWeek[w].tsb); });
    if(tv.length){ formHi=Math.max(...tv)+4; formLo=Math.min(...tv)-Math.max(3,(Math.max(...tv)-Math.min(...tv))*0.05); }
  }
  const syForm=v=>formB-((v-formLo)/(formHi-formLo))*hForm;

  // Weight panel
  let wtLo=60, wtHi=75;
  if(hasWt){
    const wv=wtWeeks.map(w=>bodyByWeek[w]);
    wtLo=Math.floor(Math.min(...wv))-1; wtHi=Math.ceil(Math.max(...wv))+1;
    if(wtLo===wtHi){wtLo-=2;wtHi+=2;}
  }
  const syWt=v=>wtB-((v-wtLo)/(wtHi-wtLo))*hWt;

  let g=`<defs><linearGradient id="pf2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${C.teal}" stop-opacity="0.18"/><stop offset="100%" stop-color="${C.teal}" stop-opacity="0.02"/></linearGradient></defs>`;

  // ── Phase bands — span all four panels ───────────────────────────────────
  PHASES.forEach(p=>{
    const x1=sx(Math.max(p.w1-0.5,Math.max(1,wStart)-0.5)),x2=sx(Math.min(p.w2+0.5,wEnd+0.5));
    if(x2<=x1)return;
    g+=`<rect x="${x1}" y="${planT}" width="${x2-x1}" height="${wtB-planT}" fill="${LEAD_COLOR[p.lead]}" opacity="0.12"/>`;
    g+=`<line x1="${x2}" x2="${x2}" y1="${planT}" y2="${wtB}" stroke="${LEAD_COLOR[p.lead]}" stroke-opacity="0.25" stroke-width="1"/>`;
    g+=`<rect x="${x1+1}" y="${planT-11}" width="${Math.max(0,x2-x1-2)}" height="4" rx="2" fill="${LEAD_COLOR[p.lead]}" opacity="0.85"><title>${esc(p.name)}</title></rect>`;});

  // Plan-start marker
  if(wStart<1){const px1=sx(1);
    g+=`<line x1="${px1}" x2="${px1}" y1="${planT}" y2="${wtB}" stroke="${C.violet}" stroke-opacity="0.18" stroke-dasharray="3 3"/>`;
    g+=`<text x="${px1+3}" y="${planT+10}" font-family="var(--mono)" font-size="8" fill="${C.violet}" opacity="0.6">plan↑</text>`;}

  // Panel divider lines
  [[planB,loadT],[loadB,formT],[formB,wtT]].forEach(([b,t])=>{
    const my=(b+t)/2;
    g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${my}" y2="${my}" stroke="${C.contour}" stroke-opacity="0.35"/>`;});

  // ═══ PANEL 1: PLAN ═══════════════════════════════════════════════════════
  for(let i=0;i<=2;i++){const v=planHi*i/2,y=syPlan(v);
    g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.contour}" stroke-opacity="0.2"/>`;
    g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${fmt(v,0)}</text>`;}
  g+=`<text x="14" y="${planT+hPlan/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${planT+hPlan/2})" text-anchor="middle">${unit==="km"?"km/wk":"h/wk"}</text>`;

  // Historic run volume — connected solid line (dim, no markers).
  // Reads as continuous volume history; zero weeks anchor the line to baseline
  // so peaks like UTK2025 don't appear to spring from nothing.
  if(hasHist){
    const histStart=Math.max(wStart, Math.min(...preWeeks));
    const histEnd=Math.min(0,wEnd);
    // build point array covering every week in window (zero for missing weeks)
    const hPts=[];
    for(let w=histStart;w<=histEnd;w++){
      const rb=runsByWeek[w];
      const v=rb?(unit==="km"?rb.km:rb.h):0;
      hPts.push({w,v});
    }
    if(hPts.length>1){
      let path="";
      hPts.forEach((p,i)=>{ const x=sx(p.w), y=syPlan(p.v); path+=(i?"L":"M")+x+" "+y; });
      g+=`<path d="${path}" fill="none" stroke="${C.slate}" stroke-width="1.5" opacity="0.65"/>`;
    } else if(hPts.length===1){
      // single point — just a dot
      const p=hPts[0];
      g+=`<circle cx="${sx(p.w)}" cy="${syPlan(p.v)}" r="2" fill="${C.slate}" opacity="0.65"/>`;
    }
  }

  // Plan area + lines
  const vdata=data.filter(d=>d.w>=Math.max(1,wStart)&&d.w<=wEnd);
  if(vdata.length){
    const planStartX=sx(Math.max(1,wStart));
    let area=`M ${planStartX} ${syPlan(0)}`;
    vdata.forEach(d=>{area+=` L ${sx(d.w)} ${syPlan(d[pk])}`;});
    area+=` L ${sx(Math.min(wEnd,62))} ${syPlan(0)} Z`;
    g+=`<path d="${area}" fill="url(#pf2)"/>`;
    const pastPlan=vdata.filter(d=>d.w<=cw), futurePlan=vdata.filter(d=>d.w>=cw);
    if(pastPlan.length){let pp="";pastPlan.forEach((d,i)=>{pp+=(i?"L":"M")+sx(d.w)+" "+syPlan(d[pk]);});
      g+=`<path d="${pp}" fill="none" stroke="${C.teal}" stroke-width="1.8" opacity="0.85"/>`;}
    if(futurePlan.length){let fp="";futurePlan.forEach((d,i)=>{fp+=(i?"L":"M")+sx(d.w)+" "+syPlan(d[pk]);});
      g+=`<path d="${fp}" fill="none" stroke="${C.teal}" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.7"/>`;}
    if(hasActual){let ep="",st=false;
      vdata.forEach(d=>{if(d[ak]==null)return;ep+=(st?"L":"M")+sx(d.w)+" "+syPlan(d[ak]);st=true;});
      g+=`<path d="${ep}" fill="none" stroke="${C.chalk}" stroke-width="1.8"/>`;
      vdata.forEach(d=>{if(d[ak]!=null)g+=`<circle cx="${sx(d.w)}" cy="${syPlan(d[ak])}" r="2.2" fill="${C.chalk}"/>`;});}
  }
  // Race markers (plan panel)
  RACES.forEach(r=>{if(r.w<Math.max(1,wStart)||r.w>wEnd)return;
    const row=data[r.w-1],x=sx(r.w),y=syPlan(row[pk]);
    g+=`<circle cx="${x}" cy="${y}" r="3" fill="${C.rose}" stroke="${C.night}"/>`;
    const anc=r.w>40?"end":"middle";
    g+=`<text x="${x}" y="${y-8}" text-anchor="${anc}" font-family="var(--mono)" font-size="8.5" fill="${C.rose}">▲ ${esc(r.name)}</text>`;});

  // ═══ PANEL 2: FITNESS / FATIGUE (CTL + ATL) ══════════════════════════════
  for(let i=0;i<=2;i++){const v=loadLo+(loadHi-loadLo)*i/2,y=syLoad(v);
    g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.contour}" stroke-opacity="0.18"/>`;
    g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${Math.round(v)}</text>`;}
  const fv=App.fffViz||{ctl:true,atl:true,tsb:true,proj:true};
  // Bias-correct the projection so it starts from the last real data point
  // (eliminates the visual step-change at the real→projected join).
  // The offset is purely a display shift — FFF_PROJ constant is unchanged.
  const lastRealW = hasFFF ? Math.max(...fffWeeks) : null;
  const joinOffset = {};
  if(hasFFF && hasProj && lastRealW!=null && projByWeek[lastRealW]){
    const real=byWeek[lastRealW], proj=projByWeek[lastRealW];
    joinOffset.ctl = (real.ctl!=null&&proj.ctl!=null) ? real.ctl-proj.ctl : 0;
    joinOffset.atl = (real.atl!=null&&proj.atl!=null) ? real.atl-proj.atl : 0;
    joinOffset.tsb = (real.tsb!=null&&proj.tsb!=null) ? real.tsb-proj.tsb : 0;
  } else {
    joinOffset.ctl=0; joinOffset.atl=0; joinOffset.tsb=0;
  }
  const adjProj=(w,key)=>{
    const v=projByWeek[w]?projByWeek[w][key]:null; if(v==null) return null;
    // apply offset only for weeks beyond last real data
    return (hasFFF&&lastRealW!=null&&w>lastRealW) ? v+(joinOffset[key]||0) : v;
  };
  // Projection dashed lines (drawn first so real lines sit on top)
  if(hasProj&&fv.proj){
    const drawProj=(key,col)=>{let p="",ok=false;
      projWeeks.forEach(w=>{const v=adjProj(w,key);if(v==null)return;const x=sx(w+0.5),y=syLoad(v);p+=(ok?"L":"M")+x+" "+y;ok=true;});
      if(p)g+=`<path d="${p}" fill="none" stroke="${col}" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.75"/>`;};
    if(fv.atl) drawProj("atl",C.rose);
    if(fv.ctl) drawProj("ctl",C.teal);
  }
  // Real FFF lines (solid, on top)
  if(hasFFF){
    const drawL=(vals,col)=>{let p="",ok=false;
      fffWeeks.forEach((w,i)=>{if(vals[i]==null)return;const x=sx(w+0.5),y=syLoad(vals[i]);p+=(ok?"L":"M")+x+" "+y;ok=true;});
      if(p)g+=`<path d="${p}" fill="none" stroke="${col}" stroke-width="1.7" opacity="0.9"/>`;};
    if(fv.atl) drawL(fffWeeks.map(w=>byWeek[w].atl),C.rose);
    if(fv.ctl) drawL(fffWeeks.map(w=>byWeek[w].ctl),C.teal);
  }
  if(!hasFFF&&!hasProj){
    g+=`<text x="${Pl+iw/2}" y="${loadT+hLoad/2}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${C.dim}">import wellness JSON (Data tab) for live Fitness/Fatigue</text>`;
  }
  g+=`<text x="14" y="${loadT+hLoad/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${loadT+hLoad/2})" text-anchor="middle">load/day</text>`;

  // ═══ PANEL 3: FORM (TSB + readiness bands) ═══════════════════════════════
  const tsbBands=[
    {lo:-67.8, hi:-30, color:"#FFB3B3", label:"High Risk", lc:"#e07070", op:0.18},
    {lo:-30,   hi:-10, color:"#4A7C59", label:"Optimal",   lc:"#6fbf8a"},
    {lo:-10,   hi:5,   color:"#2A3A2A", label:"Grey Zone", lc:"#8a9a8a"},
    {lo:5,     hi:25,  color:"#0A2535", label:"Fresh",     lc:"#5BB8D4"},
    {lo:25,    hi:50,  color:"#2A2A1A", label:"Transition",lc:"#c0b060"},
  ];
  tsbBands.forEach(b=>{
    if(b.hi<formLo||b.lo>formHi) return;
    const y1=syForm(Math.min(b.hi,formHi)), y2=syForm(Math.max(b.lo,formLo));
    if(y2<=y1) return;
    g+=`<rect x="${Pl}" y="${y1}" width="${iw}" height="${y2-y1}" fill="${b.color}" opacity="${b.op!=null?b.op:0.5}"/>`;
    const midY=(y1+y2)/2;
    if(midY>formT&&midY<formB)
      g+=`<text x="${W-Pr-3}" y="${midY+3}" text-anchor="end" font-family="var(--mono)" font-size="7.5" fill="${b.lc}" opacity="0.8">${b.label}</text>`;
  });
  for(let i=0;i<=2;i++){const v=formLo+(formHi-formLo)*i/2,y=syForm(v);
    g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${Math.round(v)}</text>`;}
  if(formLo<=0&&formHi>=0)g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${syForm(0)}" y2="${syForm(0)}" stroke="${C.chalk}" stroke-dasharray="3 3" opacity="0.3"/>`;
  // Race TSB gate bands removed per G3 ruling (06/07/26) — keep RACES array as data source
  // Projection TSB dashed line (bias-corrected to join real data seamlessly)
  if(hasProj&&fv.proj&&fv.tsb){
    let p="",ok=false;
    projWeeks.forEach(w=>{const v=adjProj(w,"tsb");if(v==null)return;const x=sx(w+0.5),y=syForm(v);p+=(ok?"L":"M")+x+" "+y;ok=true;});
    if(p)g+=`<path d="${p}" fill="none" stroke="${C.violet}" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.75"/>`;
  }
  // Real TSB solid line (on top)
  if(hasFFF&&fv.tsb){
    let p="",ok=false;
    fffWeeks.forEach(w=>{const v=byWeek[w].tsb;if(v==null)return;const x=sx(w+0.5),y=syForm(v);p+=(ok?"L":"M")+x+" "+y;ok=true;});
    if(p)g+=`<path d="${p}" fill="none" stroke="${C.violet}" stroke-width="1.7" opacity="0.95"/>`;
  }
  if(!hasFFF&&!hasProj){
    g+=`<text x="${Pl+iw/2}" y="${formT+hForm/2}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${C.dim}">import wellness JSON for live Form</text>`;
  }
  g+=`<text x="14" y="${formT+hForm/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${formT+hForm/2})" text-anchor="middle">Form</text>`;

  // ═══ PANEL 4: WEIGHT ═════════════════════════════════════════════════════
  if(hasWt){
    for(let i=0;i<=1;i++){const v=wtLo+(wtHi-wtLo)*i,y=syWt(v);
      g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.contour}" stroke-opacity="0.15"/>`;
      g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="8.5" fill="${C.dim}">${fmt(v,0)}</text>`;}
    // Raw weight line — dim amber, thin
    let p="",ok=false;
    wtWeeks.forEach(w=>{const x=sx(w),y=syWt(bodyByWeek[w]);p+=(ok?"L":"M")+x+" "+y;ok=true;});
    if(p)g+=`<path d="${p}" fill="none" stroke="${C.amber}" stroke-width="1" opacity="0.4"/>`;

    // EWMA trend line — MacroFactor-style smoothing (α=0.1, linear interp for gaps)
    // Built from daily state.body entries, then sampled at each week in the window.
    const bodyByDay={};
    (App.state.body||[]).forEach(b=>{ if(b.d&&b.kg!=null) bodyByDay[b.d]=b.kg; });
    const bodyDays=Object.keys(bodyByDay).sort();
    if(bodyDays.length>=2){
      // Build daily series with linear interpolation for gaps
      const allDays=[];
      for(let i=0;i<bodyDays.length-1;i++){
        const d0=new Date(bodyDays[i]+"T00:00:00"), d1=new Date(bodyDays[i+1]+"T00:00:00");
        const v0=bodyByDay[bodyDays[i]], v1=bodyByDay[bodyDays[i+1]];
        const nDays=Math.round((d1-d0)/864e5);
        for(let j=0;j<nDays;j++){
          const dd=new Date(d0.getTime()+j*864e5);
          const iso=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
          allDays.push({iso, kg:v0+(v1-v0)*(j/nDays)});

      allDays.push({iso:bodyDays[bodyDays.length-1], kg:bodyByDay[bodyDays[bodyDays.length-1]]});
      // EWMA pass (α=0.1)
      const alpha=0.1;
      let ewma=allDays[0].kg;
      const ewmaByDay={};
      allDays.forEach(pt=>{ ewma=alpha*pt.kg+(1-alpha)*ewma; ewmaByDay[pt.iso]=ewma; });
      // Sample at each week in window and draw
      let tp="",tok=false;
      for(let w=wStart;w<=wEnd;w++){
        // pick the last EWMA value within this week
        const wDate=new Date(W1d.getTime()+(w-1)*7*864e5);
        let bestV=null;
        for(let d=0;d<7;d++){
          const dd=new Date(wDate.getTime()+d*864e5);
          const iso=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
          if(ewmaByDay[iso]!=null) bestV=ewmaByDay[iso];
        }
        if(bestV==null){tok=false;continue;}
        const x=sx(w),y=syWt(bestV);
        tp+=(tok?"L":"M")+x+" "+y; tok=true;
      }
      if(tp)g+=`<path d="${tp}" fill="none" stroke="${C.amber}" stroke-width="2" opacity="0.95"/>`;
    }
  } else {
    g+=`<text x="${Pl+iw/2}" y="${wtT+hWt/2}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="${C.dim}">add weight points in the Body tab</text>`;
  }
  g+=`<text x="14" y="${wtT+hWt/2}" font-family="var(--mono)" font-size="8.5" fill="${C.dim}" transform="rotate(-90 14 ${wtT+hWt/2})" text-anchor="middle">Weight</text>`;

  // ── Now marker — full height ─────────────────────────────────────────────
  const nwx=sx(cw);
  g+=`<line x1="${nwx}" x2="${nwx}" y1="${planT-4}" y2="${wtB}" stroke="${C.chalk}" stroke-opacity="0.3" stroke-dasharray="2 3"/>`;
  g+=`<text x="${nwx}" y="${planT-10}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="${C.mist}">now</text>`;

  // ── X-axis ────────────────────────────────────────────────────────────────
  g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${xAxisY}" y2="${xAxisY}" stroke="${C.contour}" stroke-opacity="0.5"/>`;
  const stepLabel=span>100?6:span>60?4:span>30?2:1;
  let tickCount=0;
  for(let w=wStart;w<=wEnd;w++){
    if((w-wStart)%stepLabel!==0) continue;
    const x=sx(w); if(x<Pl||x>W-Pr+2){tickCount++;continue;}
    const isPlanW=w>=1&&w<=62;
    g+=`<text x="${x}" y="${xAxisY+12}" text-anchor="middle" font-family="var(--mono)" font-size="8.5" fill="${isPlanW?C.mist:C.slate}">W${w}</text>`;
    if(tickCount%2===0){
      const d=new Date(W1d.getTime()+(w-1)*7*864e5);
      const lbl=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
      g+=`<text transform="rotate(-90,${x},${xAxisY+40})" x="${x}" y="${xAxisY+40}" text-anchor="start" font-family="var(--mono)" font-size="8" fill="${C.dim}">${lbl}</text>`;
    }
    tickCount++;
  }

  // ── Hit zones (full height) + crosshair ──────────────────────────────────
  for(let w=wStart;w<=wEnd;w++){
    const isPlan=w>=1&&w<=62;
    g+=`<rect data-w="${w}" data-plan="${isPlan?1:0}" x="${sx(w-0.5)}" y="${planT}" width="${Math.max(2,iw/span)}" height="${wtB-planT}" fill="transparent" style="cursor:${isPlan?"pointer":"default"}" pointer-events="all"/>`;
  }

}

/* ── Week Lens (v1.4) — linked weekly↔daily strip, run + gym ──
   Plan chips come from the locked WEEK_TEMPLATES/WEEK_OVERRIDES (keyword-
   classified, no new plan data). Done-state comes ONLY from imported
   sessions (runs.json / MacroFactor-derived gym JSON) — never manual. */
const dayISO = (w,i) => { const d=new Date(2026,5,29+(w-1)*7+i);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
function classifyRun(s){ if(!s||s==="—") return "rest"; const t=s.toLowerCase();
  if(/\brace\b|race —|race week/.test(t)&&!t.includes("race-sim")) return "race";
  if(/shakeout/.test(t)) return "easy";
  if(/^rest|^walk|travel|kit check|nothing/.test(t)) return "rest";
  if(/long|b2b|race-sim|benchmark/.test(t)) return "long";
  if(/\btt\b|threshold|drift test|touches|descent reps|me carry|mp touch|mp power|steady/.test(t)) return "quality";
  return "easy"; }
function classifyGym(s){ if(!s) return null; const t=s.toLowerCase();
  if(t.includes("upper")) return "Upper"; if(t.includes("lower")) return "Lower";
  if(t.includes("push")) return "Push"; if(t.includes("pull")) return "Pull";
  if(t.includes("leg")) return "Legs"; if(t.includes("full")) return "Full"; return "Gym"; }
const RUN_STYLE = {
  race:   {bg:C.rose,  fg:"#1b1f24", solid:1, lab:"RACE"},
  long:   {bg:C.teal,  fg:"#1b1f24", solid:1, lab:"Long"},
  quality:{bg:C.violet,fg:"#1b1f24", solid:1, lab:"Quality"},
  easy:   {bg:C.teal,  fg:C.teal,    solid:0, lab:"Easy"},
  rest:   {bg:"transparent", fg:"var(--c-dim)", solid:0, lab:"Rest"},
};
function plannedDay(w,i){ const ph=phaseOf(w), tpl=(WEEK_TEMPLATES[ph.id]||[])[i]||{}, o=(WEEK_OVERRIDES[w]||{})[i]||{};
  return { r:o.r||tpl.r||"—", g:o.g||tpl.g||null, L:tpl.L||o.L, H:tpl.H||o.H }; }
// v1.37: date → ARRAY of sessions (was one-per-date, which dropped AM+PM
//   doubles on render even after the merge kept both rows). Callers aggregate.
function sessionMaps(){ const R={},G={};
  (App.state.sessions.runs||[]).forEach(s=>{ if(s&&s.d){ (R[s.d]=R[s.d]||[]).push(s); } });
  (App.state.sessions.gym||[]).forEach(s=>{ if(s&&s.d){ (G[s.d]=G[s.d]||[]).push(s); } });
  return {R,G}; }
// aggregate a day's runs into the single summary the week-strip chip shows
function dayRunAgg(list){ if(!list||!list.length) return null;
  let km=0,hasKm=false; list.forEach(r=>{ if(r.km!=null){ km+=r.km; hasKm=true; } });
  const key=list.find(r=>["long","quality","race","test"].includes(r.run_type))||list[0];
  return { n:list.length, km:hasKm?km:null, type:key.type||key.run_type||null,
           run_type:key.run_type||null, multi:list.length>1 }; }
function weekStrip(w){
  const {R,G}=sessionMaps();
  const cells=DAYS.map((d,i)=>{ const p=plannedDay(w,i), iso=dayISO(w,i);
    const cat=classifyRun(p.r), st=RUN_STYLE[cat];
    const run=dayRunAgg(R[iso]); const gymList=G[iso]||[];
    const runDone=!!run, gymDone=gymList.length>0;
    const runMulti=run&&run.multi?` <span style="opacity:.6">×${run.n}</span>`:"";
    const gymMulti=gymList.length>1?` <span style="opacity:.6">×${gymList.length}</span>`:"";
    const gym=gymList[0]||null; // representative for name/classify
    let runChip;

    else if(cat==="rest"&&runDone){ runChip=`<div class="lens-chip" title="unplanned run — ${esc(run.type||"")}${run.km!=null?` ${fmt(run.km)} km`:""}${run.multi?` · ${run.n} runs`:""}" style="background:transparent;color:${C.teal};border:1px solid ${C.teal}">✓ unplanned${run.km!=null?` <span style="opacity:.75">${fmt(run.km)}k</span>`:""}${runMulti}</div>`; }
    else { const tid=typeFor(p.r);
      runChip=`<div class="lens-chip" ${tid?`data-act="runday" data-v="${w}-${i}" style="cursor:pointer;`:`style="`}background:${st.solid?st.bg:"transparent"};color:${st.solid?st.fg:st.bg};border:1px ${st.solid?"solid":"dashed"} ${st.bg}" title="${esc(p.r)}${runDone&&run.km!=null?` — done: ${fmt(run.km)} km`:""}${runDone&&run.multi?` (${run.n} runs)`:""}${tid?" · tap for run detail":""}">
           ${runDone?"✓ ":""}${st.lab}${runDone&&run.km!=null?` <span style="opacity:.75">${fmt(run.km)}k</span>`:""}${runMulti}</div>`; }
    const gLab=classifyGym(p.g);
    const gymChip = gLab
      ? `<div class="lens-chip" data-act="gymday" data-v="${w}-${i}" title="${esc(p.g)}${gymDone?" — done":""}${gymList.length>1?` · ${gymList.length} sessions`:""} · tap for exercises"
           style="cursor:pointer;background:${gymDone?C.amber:"transparent"};color:${gymDone?"#1b1f24":C.amber};border:1px ${gymDone?"solid":"dashed"} ${C.amber}">${gymDone?"✓ ":""}${gLab}${gymMulti}</div>`
      : gymDone
        ? `<div class="lens-chip" data-act="gymday" data-v="${w}-${i}" title="unplanned gym — ${esc(gymList.map(x=>x.name||"").filter(Boolean).join(", "))}" style="cursor:pointer;background:${C.amber};color:#1b1f24;border:1px solid ${C.amber}">✓ ${esc(classifyGym(gym.name)||"Gym")}${gymMulti}</div>`

    const now=new Date(), todayIso=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");

      <div class="lens-dh">${d}<span style="color:var(--c-dim);font-size:8px"> ${fmtDshort(iso)}</span>${dot}</div>
      ${runChip}${gymChip}</div>`; }).join("");
  return `<div class="lens-grid">${cells}</div>
    ${runDayCard(w)}
    ${gymDayCard(w)}
    <div class="note" style="margin-top:8px">✓ = imported session on that date (runs ← runs.json · gym ← MacroFactor dump). Solid = key run (long/quality/race) · dashed = easy/planned · dot = leg-load flag. Tap a run chip for RX + logged detail · tap a gym chip for the session prescription.</div>`;
}

/* ── run day detail (Phase 4, v1.49, §6) — RX + logged detail for a tapped run chip.
   Mirrors gymDayCard's pattern (App.runDay={w,i}, teal border, both cards can be
   open at once). Pre-log: prescribed-field table. Post-log: plan-vs-actual + dots
   + score badge + coverage + intensity flag + re-link control + unplanned list. */
function fmtHM(h){ if(h==null) return "—";
  if(h<1) return Math.round(h*60)+"′";
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return hh+":"+String(mm).padStart(2,"0"); }
function fmtRangeHM(r){ if(!r) return null; return r[0]===r[1]? fmtHM(r[0]) : fmtHM(r[0])+"–"+fmtHM(r[1]); }
function fmtRangeKm(r){ if(!r) return null; return r[0]===r[1]? fmt(r[0],1)+" km" : Math.round(r[0])+"–"+Math.round(r[1])+" km"; }
function fmtRangeVert(r){ if(!r) return null; return r[0]===r[1]? Math.round(r[0])+" m" : Math.round(r[0])+"–"+Math.round(r[1])+" m"; }
function runDayCard(w){
  const rd=App.runDay; if(!rd||rd.w!==w) return "";
