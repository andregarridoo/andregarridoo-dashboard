  const dayUnplanned=unplanned.filter(r=>r.d===iso);
  const dotColor=v=>v==null?C.dim:(v>=85?C.teal:v>=60?C.amber:C.rose);
  let body;
  if(rx.t==="rest"){
    body=`<div class="note">Rest day per plan.${dayUnplanned.length?` Unplanned: ${dayUnplanned.map(r=>`${esc(r.type||"run")}${r.km!=null?` · ${fmt(r.km)} km`:""}`).join(", ")}`:""}</div>`;
  } else {
    const rows=[];
    if(rx.dur) rows.push(["Duration",fmtRangeHM(rx.dur)]);
    if(rx.km) rows.push(["Distance",fmtRangeKm(rx.km)]);
    // §A5 (D044, v1.50): Gain + Descent rows always render (band or "—" —
    // §A1 schema note: null on both = "no target"). Renamed from "Vert" now
    // that the field's semantics (gain) are explicit alongside desc.
    rows.push(["Gain",fmtRangeVert(rx.vert)||"—"]);
    rows.push(["Descent",fmtRangeVert(rx.desc)||"—"]);
    if(rx.z||rx.pw) rows.push(["Intensity",[rx.z,rx.pw].filter(Boolean).join(" · ")]);
    rows.push(["Surface",rx.surf==="any"?"any":rx.surf]);
    const ph=phaseOf(w);
    const rxTable=`<table style="margin-top:8px"><tbody>${rows.map(([k,v])=>
      `<tr><td style="font-size:11px;color:var(--c-dim)">${k}</td><td style="font-family:var(--mono);font-size:12px;color:var(--c-chalk);text-align:right">${esc(v)}</td></tr>`).join("")}
      </tbody></table>`;
    if(!run){
      // pre-log OR skipped-planned (§3: a scoreable RX day ≥2 days past with no match)
      const today=new Date(), planD=new Date(iso), pastBy=Math.round((today-planD)/86400000);
      const skipped = pastBy>=2 && rx.t!=="race";
      body=`${rxTable}
        ${rx.note?`<div class="note" style="margin-top:6px">${esc(rx.note)}</div>`:""}
        <div class="note" style="margin-top:6px">${esc(ph.name)} · wk ${w}</div>
        ${skipped?`<div class="note" style="color:${C.rose};margin-top:6px">not executed</div>`:""}
        ${dayUnplanned.length?`<div class="note" style="margin-top:6px">unplanned — ${dayUnplanned.map(r=>`${fmt(r.km||0)} km · ${fmtHM(r.h||0)}`).join(", ")}</div>`:""}
        <div style="margin-top:8px"><span data-act="runtype" data-v="${rx.t}" style="color:${C.teal};font-size:11px;cursor:pointer">full definition →</span></div>`;
    } else {
      const sc=(rx.t==="race")?null:scoreRun(rx,run);
      const chanRows=(sc?sc.channels:[]).map(c=>{
        const actStr = c.k==="vert"?(c.actual!=null?Math.round(c.actual)+" m":"—")
          : c.k==="vol" ? (run.h!=null&&rx.dur?fmtHM(run.h):(run.km!=null&&rx.km?fmt(run.km,1)+" km":"—"))
          : "—";
        const rxStr = c.k==="vert"?fmtRangeVert(rx.vert):(c.k==="vol"?(rx.dur?fmtRangeHM(rx.dur):fmtRangeKm(rx.km)):"—");
        return `<tr><td style="font-size:11px;color:var(--c-dim)">${esc(c.label)}</td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--c-mist);text-align:center">${esc(rxStr)}</td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--c-chalk);text-align:center">${esc(actStr)}</td>
          <td style="text-align:right"><i class="lens-dot" style="background:${dotColor(c.score)};display:inline-block;width:8px;height:8px;border-radius:50%"></i></td></tr>`; }).join("");
      const scoreBadge = (rx.t==="race") ? `<span class="note">races never scored</span>`

        </div>

    }
  }
  return `<div class="card" style="margin-top:10px;border-color:${C.teal}">

}

/* ── trend card ── */
/* #R9 (v1.40, D040): MacroFactor-style gap-aware EWMA trend over date-sorted weigh-ins.
   alpha = per-day smoothing (0.10 ≈ a ~10-day time constant). Trend seeds at the first
   weigh-in; each step weights the day-gap so sparse weekly points still smooth correctly
   (a 7-day gap → weight ≈ 0.52). Returns one trend value per input point (same order/length).
   Pure + exported for the harness. */
function bwEWMA(pts, alpha){
  const a = (alpha==null?0.10:alpha);
  let t=null, prev=null; const out=[];
  for(const p of pts){
    if(t==null){ t=p.kg; }
    else { const gap=Math.max(1,Math.round((new Date(p.d+"T00:00:00")-new Date(prev+"T00:00:00"))/864e5));
      const w=1-Math.pow(1-a,gap); t=t+w*(p.kg-t); }
    prev=p.d; out.push(+t.toFixed(3));
  }
  return out;
}
const BW_EWMA_ALPHA = 0.10;   // D040 (v1.40): bodyweight EWMA per-day smoothing constant

function trendCard(title,unit,series,goodUp,target,invite){
  const last = series.length ? series[series.length-1].v : null;
  const base = series.length>1 ? series.slice(0,-1).reduce((s,p)=>s+p.v,0)/(series.length-1) : null;
  const delta = (last!=null&&base) ? ((last-base)/base)*100 : null;
  let dHtml = `<span style="color:var(--c-dim)">—</span>`;
  if(delta!=null){ const up=delta>=0, good=goodUp?up:!up;
    dHtml = `<span style="font-family:var(--mono);font-size:12px;color:${good?C.teal:C.rose}">${up?"▲":"▼"} ${fmt(Math.abs(delta))}%</span>`; }
  return `<div class="card">
    <div class="eyebrow">${esc(title)}</div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-top:8px">
      <span style="font-family:var(--mono);font-size:22px;color:${last!=null?"var(--c-chalk)":"var(--c-dim)"}">${last!=null?fmt(last):"—"}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--c-dim)">${esc(unit)}</span>${dHtml}
    </div>
    <div style="height:42px;margin-top:6px">${series.length>1 ? sparkSVG(series,C.teal) :
      `<div style="border-bottom:1px dashed var(--c-contour);height:100%;display:flex;align-items:flex-end"><span class="note" style="padding-bottom:4px">${esc(invite)}</span></div>`}</div>
    ${target?`<div class="note" style="margin-top:8px">gate · ${esc(target)}</div>`:""}
  </div>`;
}

    const dec=rows.filter(r=>r.decoup!=null);
    const vert=rows.filter(r=>r.vert!=null||r.desc!=null);
    const zone=rows.filter(r=>r.z12!=null);
    const anchors = ANCHORS.map(a=>`<div style="display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--c-contour);padding-bottom:8px;flex-wrap:wrap">
      <span style="font-size:12.5px;color:var(--c-mist)">${esc(a.k)}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--c-chalk)">${esc(a.v)}</span>
      <span class="note" style="width:100%;text-align:right">${esc(a.n)}</span></div>`).join("");
    const vertCtl = this.chartCtl.vert || (this.chartCtl.vert={from:null,to:null,per:"W"});
    const vPer = vertCtl.per||"W";
    let vcats=[], vascData=[], vdescData=[];
    if(vert.length){
      if(vPer==="W"){
        const filtered = vert.filter(r=>{ const d=weekStartISO(r.w); return (!vertCtl.from||d>=vertCtl.from)&&(!vertCtl.to||d<=vertCtl.to); });
        vcats=filtered.map(r=>"W"+r.w); vascData=filtered.map(r=>r.vert||0); vdescData=filtered.map(r=>r.desc||0);
      } else {
        const vertRows=vert.map(r=>({_d:weekStartISO(r.w), vert:r.vert||0, desc:r.desc||0}));
        const agg=applyCtl(vertRows,"_d",{from:vertCtl.from,to:vertCtl.to,per:vPer},{vert:"sum",desc:"sum"});
        vcats=agg.cats; vascData=agg.vert; vdescData=agg.desc;
      }
    }
    const zoneCtl = this.chartCtl.zone || (this.chartCtl.zone={from:null,to:null,per:"W"});
    const zPer = zoneCtl.per||"W";
    let zcats=[], z12Data=[], z3Data=[], z45Data=[];
    if(zone.length){
      if(zPer==="W"){
        const filtered = zone.filter(r=>{ const d=weekStartISO(r.w); return (!zoneCtl.from||d>=zoneCtl.from)&&(!zoneCtl.to||d<=zoneCtl.to); });
        zcats=filtered.map(r=>"W"+r.w); z12Data=filtered.map(r=>r.z12); z3Data=filtered.map(r=>r.z3); z45Data=filtered.map(r=>r.z45);
      } else {
        const zoneRows=zone.map(r=>({_d:weekStartISO(r.w), z12:r.z12, z3:r.z3, z45:r.z45}));
        const agg=applyCtl(zoneRows,"_d",{from:zoneCtl.from,to:zoneCtl.to,per:zPer},{z12:"mean",z3:"mean",z45:"mean"});
        zcats=agg.cats; z12Data=agg.z12; z3Data=agg.z3; z45Data=agg.z45;
      }
    }
    const durCtl = this.chartCtl.dur || (this.chartCtl.dur={from:null,to:null,per:null});
    const decFiltered = dec.filter(r=>{ const d=weekStartISO(r.w); return (!durCtl.from||d>=durCtl.from)&&(!durCtl.to||d<=durCtl.to); });
    return `
    ${this.viewFFF()}
    <div class="card"><div class="eyebrow" style="color:var(--c-teal)">Durability — Pw:HR decoupling per long run ${this.infoBtn("dur")}</div>${this.infoPanel("dur")}
      ${this.timeCtl("dur",{periods:["FromTo"]})}
      ${decFiltered.length ? `<div style="margin-top:10px">${chartSVG({cats:decFiltered.map(r=>"W"+r.w),yUnit:"%",series:[{name:"decoupling",color:C.teal,data:decFiltered.map(r=>r.decoup)}],refs:[{y:5,label:"5% frontier",color:C.rose}]})}</div>`
      : `<div class="empty">◦ First long run ≥2 h populates this. The number to move: how long you last before Pw:HR breaches 5%. Race fade reference: UTA 2026 went 199→100 W.</div>`}</div>
    <div class="cols2">
      <div class="card"><div class="eyebrow">Weekly vert (m) ${this.infoBtn("vert")}</div>${this.infoPanel("vert")}
        <div style="display:flex;gap:8px;margin-top:6px">
          <button class="pill ${this.vertShow.asc?"on":""}" data-act="vertShow" data-v="asc" style="opacity:${this.vertShow.asc?1:0.35}">ASCENT</button>
          <button class="pill ${this.vertShow.desc?"on":""}" data-act="vertShow" data-v="desc" style="opacity:${this.vertShow.desc?1:0.35}">DESCENT</button>
        </div>
        ${this.timeCtl("vert",{periods:["W","M","Q"],default:"W"})}
        ${vcats.length && (this.vertShow.asc||this.vertShow.desc) ? `<div style="margin-top:10px">${chartSVG({cats:vcats,yMin:0,cols:2,series:[
          ...(this.vertShow.asc?[{name:"ascent",color:C.teal,type:"bar",data:vascData}]:[]),
          ...(this.vertShow.desc?[{name:"descent",color:C.violet,type:"bar",data:vdescData}]:[])
        ]})}</div>`
        : !vcats.length ? `<div class="empty">◦ Descent metres are tracked separately — the 25-minute lever gets its own bar.</div>`
        : `<div class="empty">◦ Both series hidden — toggle ASCENT or DESCENT above.</div>`}</div>
      <div class="card"><div class="eyebrow">Zone discipline — stacked % time ${this.infoBtn("zone")}</div>${this.infoPanel("zone")}
        ${this.timeCtl("zone",{periods:["W","M","Q"],default:"W"})}
        ${zcats.length ? `<div style="margin-top:10px">${chartSVG({cats:zcats,yMin:0,yMax:100,yUnit:"%",cols:2,stacked:true,series:[
          {name:"Z1+Z2",color:C.teal,type:"bar",data:z12Data},
          {name:"Z3",color:C.amber,type:"bar",data:z3Data},
          {name:"Z4+Z5",color:C.rose,type:"bar",data:z45Data},
          {name:"unsplit",color:"var(--c-contour)",opacity:0.35,type:"bar",data:z12Data.map((v,i)=>(z3Data[i]==null&&z45Data[i]==null&&v!=null)?Math.max(0,100-v):null)}
        ],refs:[{y:85,label:"85% floor",color:C.amber}]})}</div>
        <div class="note" style="margin-top:6px">unsplit = week logged before Z3/Z4-5 capture existed</div>`
        : `<div class="empty">◦ Zones exist after the wk-3 AeT test — then ≥85–90% ≤AeT is the base/hybrid gate.</div>`}</div>
    </div>
    <div class="card"><div class="eyebrow">Reference anchors ${this.infoBtn("anchors")}</div>${this.infoPanel("anchors")}<div style="margin-top:10px;display:grid;gap:8px">${anchors}</div></div>`;
  },

  readyCard(){
    /* Training Readiness — standalone Overview card, its own graph (NOT bundled
       with the plan chart). intervals.icu daily readiness (0-100). Day/week x-axis
       toggle: "week" aggregates to macro-week means so the axis lines up with the
       plan + FFF charts. Depth is provisional — only as far back as intervals.icu
       actually stored readiness (reveal at first sync). */
    const fff=(this.state.fff||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
    const has=fff.some(r=>r.readiness!=null);
    if(!has){
      return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div class="eyebrow" style="color:${C.teal}">Training readiness (intervals.icu) ${this.infoBtn("ready")}</div></div>
        ${this.infoPanel("ready")}
        <div class="empty">◦ No readiness data yet. Populated by Sync once intervals.icu holds a daily readiness score (0–100). How far back it reaches is revealed at the first 2-year sync — CTL/ATL/TSB go back to 2022, but readiness/HRV/RHR only as far as your device wrote them.</div></div>`;
    }
    const ctl = this.chartCtl.ready || (this.chartCtl.ready={from:null,to:null,per:"D"});
    const effFrom = ctl.from || (()=>{ const c=new Date(); c.setDate(c.getDate()-120); return c.toISOString().slice(0,10); })();
    const readyRes=applyCtl(fff,"date",{from:effFrom,to:ctl.to,per:ctl.per||"D"},{readiness:"mean"});
    const cats=readyRes.cats, data=readyRes.readiness;
    const cur=[...fff].reverse().find(r=>r.readiness!=null);
    const curV=cur?cur.readiness:null;
    const curColor=curV==null?C.dim:curV>=70?C.teal:curV>=45?C.amber:C.rose;
    const curLabel=curV==null?"—":curV>=70?"Ready":curV>=45?"Moderate":"Compromised";
    const toggle=this.timeCtl("ready",{periods:["D","W"],default:"D"});
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div><div class="eyebrow" style="color:${C.teal}">Training readiness (intervals.icu) ${this.infoBtn("ready")}</div>${this.infoPanel("ready")}
          <div class="note" style="margin-top:3px">Daily 0–100 · ${(ctl.per||"D")==="D"?"trailing 120 days (default) or your From/To range":"weekly means"}</div></div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          ${toggle}
          <div style="text-align:right"><span style="font-family:var(--mono);font-size:22px;color:${curColor}">${fmt(curV,0)}</span>
            <span class="note">${curLabel}${cur?` · ${esc(cur.date)}`:""}</span></div>
        </div>
      </div>
      <div style="margin-top:12px">${chartSVG({w:860,h:170,cats,yMin:0,yMax:100,
        series:[{name:"readiness",color:C.teal,data}],
        refs:[{y:70,label:"ready ≥70",color:C.teal},{y:45,label:"caution <45",color:C.rose}]})}</div>
      <div class="note" style="margin-top:8px">intervals.icu-computed readiness — a composite (HRV, RHR, recent load, sleep). Read as a daily flag, not a prescription; a red day on a quality-run day is the board's cue to check the session, not auto-cut it.</div></div>`;
  },

  viewFFF(){
    /* Fitness/Fatigue/Form panel — sourced from intervals.icu Wellness CSV
       or live Sync. Trailing 90-day window shown in chart; current readiness card.
       All values intervals.icu computed (CTL/ATL/TSB) — not independently verified. */
    const fff = (this.state.fff||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
    if(!fff.length) return `<div class="card"><div class="eyebrow" style="color:${C.violet}">Fitness · Fatigue · Form (intervals.icu) ${this.infoBtn("fff")}</div>${this.infoPanel("fff")}
      <div class="empty">◦ Paste the intervals.icu Wellness CSV export into the FFF import box in the Data tab (or use Sync if the Worker is configured).<br>CTL = chronic training load (42-day; fitness) · ATL = acute training load (7-day; fatigue) · TSB = CTL−ATL (form/freshness).</div></div>`;
    // #41 (v1.39): ctl-driven window — default trailing 90 days (existing), From/To override when set.
    const ctl = this.chartCtl.fff || (this.chartCtl.fff={from:null,to:null,per:"W"});
    const effFrom = ctl.from || (()=>{ const c=new Date(); c.setDate(c.getDate()-90); return c.toISOString().slice(0,10); })();
    const recent = fff.filter(r=>r.date>=effFrom && (!ctl.to || r.date<=ctl.to));
    const perAgg = ctl.per||"W";
    let cats, ctls, atls, tsbs;
    if(perAgg==="D"){
      cats=recent.map(r=>fmtDshort(r.date)); ctls=recent.map(r=>r.ctl); atls=recent.map(r=>r.atl); tsbs=recent.map(r=>r.tsb);
    } else {
      const agg=applyCtl(recent,"date",{per:perAgg},{ctl:"mean",atl:"mean",tsb:"mean"});
      cats=agg.cats; ctls=agg.ctl; atls=agg.atl; tsbs=agg.tsb;
    }
    // current values (latest entry)
    const cur = fff[fff.length-1];
    const tsbColor = cur.tsb==null?C.dim:cur.tsb>5?C.teal:cur.tsb<-10?C.rose:C.amber;
    const tsbLabel = cur.tsb==null?"—":cur.tsb>5?"Fresh (positive form)":cur.tsb<-10?"Fatigued (accumulated load)":"Neutral";
    const stepLabel = (v,lo,hi,labels) => v==null?"—":v<lo?labels[0]:v<hi?labels[1]:labels[2];
    const rampLabel = cur.rampRate==null?"—":cur.rampRate>8?"⚠ high ramp":cur.rampRate<0?"tapering / declining":cur.rampRate>5?"building fast":"building steady";
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div class="eyebrow" style="color:${C.violet}">Fitness · Fatigue · Form (intervals.icu) ${this.infoBtn("fff")}</div>
      <div class="note" style="text-align:right">${fff.length} days · ${fff[0].date} → ${cur.date}</div></div>
    ${this.infoPanel("fff")}
    <div class="cols4" style="margin-top:14px">
      <div style="text-align:center"><div class="eyebrow">CTL · Fitness</div><div style="font-family:var(--mono);font-size:28px;color:${C.teal};margin-top:6px">${fmt(cur.ctl,1)}</div><div class="note">42-day load</div></div>
      <div style="text-align:center"><div class="eyebrow">ATL · Fatigue</div><div style="font-family:var(--mono);font-size:28px;color:${C.rose};margin-top:6px">${fmt(cur.atl,1)}</div><div class="note">7-day load</div></div>
      <div style="text-align:center"><div class="eyebrow">TSB · Form</div><div style="font-family:var(--mono);font-size:28px;color:${tsbColor};margin-top:6px">${fmt(cur.tsb,1)}</div><div class="note">${tsbLabel}</div></div>
      <div style="text-align:center"><div class="eyebrow">Ramp rate</div><div style="font-family:var(--mono);font-size:16px;color:${C.amber};margin-top:12px">${fmt(cur.rampRate,1)}</div><div class="note">${rampLabel}</div></div>
    </div>
    ${this.timeCtl("fff",{periods:["D","W","M"],default:"W"})}
    <div class="note" style="margin-top:4px">${perAgg==="D"?"Daily · trailing 90 days (default) or your From/To range":"Period means · "+ (ctl.from||ctl.to?"your From/To range":"trailing 90 days")}</div>
    <div style="margin-top:14px">${(()=>{
      if(perAgg!=="D"){
        // Aggregated (W/M) view: live series only — the projection bias-correction below
        // assumes daily alignment with FFF_PROJ.idx, so it's D-mode only (unaggregated).
        const series=[
          {name:"CTL (live)",color:C.teal,data:ctls},
          {name:"ATL (live)",color:C.rose,data:atls},
          {name:"TSB (live)",color:C.violet,data:tsbs},
        ];
        return chartSVGdash({w:860,h:180,cats,series,refs:[{y:0,label:"TSB=0",color:C.dim}]});
      }
      // Build projection series aligned to the same daily date cats
      const projCTL=cats.map(mm=>{
        const yr=mm.length===5?"2026":recent[0].date.slice(0,4);
        const fullDate=yr+"-"+mm; const r=FFF_PROJ.idx[fullDate]; return r?r.ctl:null;});
      const projATL=cats.map(mm=>{
        const yr=mm.length===5?"2026":recent[0].date.slice(0,4);
        const fullDate=yr+"-"+mm; const r=FFF_PROJ.idx[fullDate]; return r?r.atl:null;});
      const projTSB=cats.map(mm=>{
        const yr=mm.length===5?"2026":recent[0].date.slice(0,4);
        const fullDate=yr+"-"+mm; const r=FFF_PROJ.idx[fullDate]; return r?r.tsb:null;});
      // Rebuild cats with full year prefix for projection lookup
      const fullCats=recent.map(r=>r.date);
      const rawPCTL=fullCats.map(d=>{const r=FFF_PROJ.idx[d];return r?r.ctl:null;});
      const rawPATL=fullCats.map(d=>{const r=FFF_PROJ.idx[d];return r?r.atl:null;});
      const rawPTSB=fullCats.map(d=>{const r=FFF_PROJ.idx[d];return r?r.tsb:null;});
      const hasProjInWindow=rawPCTL.some(v=>v!=null);
      // Bias-correct projection: shift future values so they start from the last real point
      // (eliminates step-change at the real→projected join; shape/trajectory unchanged)
      let offCTL=0,offATL=0,offTSB=0;
      const lastRealIdx=ctls.reduceRight((acc,v,i)=>acc===-1&&v!=null?i:acc,-1);
      if(lastRealIdx>=0&&rawPCTL[lastRealIdx]!=null){
        offCTL=(ctls[lastRealIdx]??0)-(rawPCTL[lastRealIdx]??0);
        offATL=(atls[lastRealIdx]??0)-(rawPATL[lastRealIdx]??0);
        offTSB=(tsbs[lastRealIdx]??0)-(rawPTSB[lastRealIdx]??0);
      }
      const pCTL=rawPCTL.map((v,i)=>v==null?null:(i>lastRealIdx?v+offCTL:v));
      const pATL=rawPATL.map((v,i)=>v==null?null:(i>lastRealIdx?v+offATL:v));
      const pTSB=rawPTSB.map((v,i)=>v==null?null:(i>lastRealIdx?v+offTSB:v));
      const series=[
        {name:"CTL (live)",color:C.teal,data:ctls},
        {name:"ATL (live)",color:C.rose,data:atls},
        {name:"TSB (live)",color:C.violet,data:tsbs},
      ];
      if(hasProjInWindow){
        series.push({name:"CTL proj",color:C.teal,data:pCTL,dash:"5 4",opacity:0.4,width:1.1});
        series.push({name:"ATL proj",color:C.rose,data:pATL,dash:"5 4",opacity:0.4,width:1.1});
        series.push({name:"TSB proj",color:C.violet,data:pTSB,dash:"5 4",opacity:0.4,width:1.1});
      }
      return chartSVGdash({w:860,h:180,cats,series,refs:[{y:0,label:"TSB=0",color:C.dim}]});
    })()}</div>
    <div class="note" style="margin-top:8px">Solid = live (intervals.icu computed)${perAgg==="D"?" · dashed = plan projection (05/07/26 baseline, Bannister τ CTL=42/ATL=7), bias-corrected to join seamlessly at the last real data point. Divergence shape = calibration signal — log deltas in FFF_PROJECTION_BASELINE.md §4.":" · plan projection overlay shows in Daily view only"}. HR is chest-strap on most runs and trended continuously — no 3-Jul break (corrected 9 Jul 2026).</div></div>`;
  },

      <div class="card"><div class="eyebrow">Lean mass (BIA-est.) ${this.infoBtn("lean")}</div>${this.infoPanel("lean")}

        <div class="note" style="margin-top:8px">UTA taper milestone: +0.7–1.2 kg (ceiling 1.5) · +5.4 kg lean = 73 kg @ 15% long-horizon goal (4–7+ yr arc)</div></div>
      <div class="card"><div class="eyebrow">Protein target ${this.infoBtn("protein")}</div>${this.infoPanel("protein")}
        <div style="font-family:var(--mono);font-size:22px;margin-top:8px">136–146 <span style="font-size:11px;color:var(--c-dim)">g/d</span></div>
        <div class="note" style="margin-top:8px">hypertrophy blocks · ≥125 g elsewhere (1.8–2.2 g/kg @ 67.79 kg)</div></div>
      <div class="card"><div class="eyebrow">Nutrition oversight ${this.infoBtn("oversight")}</div>${this.infoPanel("oversight")}
        <div style="font-family:var(--mono);font-size:22px;margin-top:8px">MacroFactor</div>

  /* ── baseline-photo store (v1.28) — device-local by privacy ruling 06/07/26:
     lives under PHOTO_KEY in localStorage on THIS device only. Deliberately
     outside state: never exported, never imported, never synced, never in the
     public HTML. In-memory fallback when storage is blocked. ── */
  getPhoto(){
    if(this._photoMem) return this._photoMem;
    try{ const v=localStorage.getItem(PHOTO_KEY);
      if(v && v.slice(0,11)==="data:image/") return v; }catch(e){}
    return null;
  },
  setPhoto(dataUrl){
    if(!dataUrl || dataUrl.slice(0,11)!=="data:image/"){ this.flash("Not an image"); return; }
    this._photoMem=dataUrl;
    try{ localStorage.setItem(PHOTO_KEY,dataUrl); this.flash("Photo stored on this device"); }
    catch(e){ this.flash("Storage blocked — photo held for this session only"); }
    this.render();
  },
  clearPhoto(){
    this._photoMem=null;
    try{ localStorage.removeItem(PHOTO_KEY); }catch(e){}
    this.flash("Photo removed from this device"); this.render();
  },
  pickPhoto(){
    const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
    inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
      const rd=new FileReader();
      rd.onload=()=>{ const raw=String(rd.result||"");
        const im=new Image();
        im.onload=()=>{ // re-encode: cap width 1100 px, jpeg q0.85 — keeps localStorage light
          const w=Math.min(1100,im.width), h=Math.round(im.height*w/im.width);
          const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
          cv.getContext("2d").drawImage(im,0,0,w,h);
          this.setPhoto(cv.toDataURL("image/jpeg",0.85));
        };
        im.onerror=()=>this.flash("Could not read that image");
        im.src=raw;
      };
      rd.readAsDataURL(f);
    };
    inp.click();
  },

  girthSorted(){ return [...(this.state.girths||[])].sort((a,b)=>a.d.localeCompare(b.d)); },

  /* λ-blend model scale for a given goal (v1.29 — centralised) */
  modelScale(lam, kg, bf){
    const baseLean=52, baseFat=13;
    const lr=(kg*(1-bf/100))/baseLean, fr=(kg*bf/100)/baseFat;
    return Math.sqrt(lam*lr*1.193 + (1-lam)*fr*0.842);
  },
  /* per-site target girths for any {kg,bf} goal — explicit GIRTHS targets are
     canonical at GIRTH_TARGET_ANCHOR and ratio-scaled elsewhere; sites without
     an explicit target use the pure model against the 04/07/26 seed */
  targetGirths(tgt){
    const out={};
    GIRTHS.forEach(g=>{
      if(g.target!=null){
        out[g.id]=parseFloat((g.target * this.modelScale(g.λ,tgt.kg,tgt.bf)/this.modelScale(g.λ,GIRTH_TARGET_ANCHOR.kg,GIRTH_TARGET_ANCHOR.bf)).toFixed(1));
      } else if(GIRTH_SEED[g.id]!=null){
        out[g.id]=parseFloat((GIRTH_SEED[g.id]*this.modelScale(g.λ,tgt.kg,tgt.bf)).toFixed(1));
      } else out[g.id]=null;
    });
    return out;
  },
  tgtAdj(v){
    const adopted=this.state.target||{kg:73,bf:15};
    if(v==="reset"){ this.tgtView=null; this.render(); return; }
    const cur=this.tgtView||{kg:adopted.kg,bf:adopted.bf};
    const n={kg:cur.kg,bf:cur.bf};
    if(v==="kg-") n.kg=Math.max(60,+(n.kg-0.5).toFixed(1));
    else if(v==="kg+") n.kg=Math.min(85,+(n.kg+0.5).toFixed(1));
    else if(v==="bf-") n.bf=Math.max(8,+(n.bf-0.5).toFixed(1));
    else if(v==="bf+") n.bf=Math.min(25,+(n.bf+0.5).toFixed(1));
    this.tgtView=(n.kg===adopted.kg&&n.bf===adopted.bf)?null:n;
    this.render();
  },
  tgtAdopt(){
    if(!this.tgtView) return;
    this.state.target={kg:this.tgtView.kg,bf:this.tgtView.bf};
    this.tgtView=null; this.persist(); this.render();
    this.flash("Target adopted — mirror the decision to the athlete brief at block end");
  },

  wellnessSection(){
    /* Daily device-wellness block — RHR / HRV / readiness / sleep from
       intervals.icu Sync. Distinct from the clinical labs below (point-in-time
       blood panel). Lives in the Health tab (Wellness zone) per Andre's call
       06/07/26 (option A). Screen-only — kept out of the clinical print view,
       which stays lab-only for the physician. Depth is provisional. */
    const CH=[
      {id:"rhr",         name:"Resting HR",    unit:"bpm", color:C.rose,   lower:true,  why:"recovery / overreach — vs own baseline"},
      {id:"hrv",         name:"HRV",           unit:"ms",  color:C.teal,   lower:false, why:"overnight rMSSD — vs own rolling baseline only"},
      {id:"readiness",   name:"Readiness",     unit:"",    color:C.violet, lower:false, why:"Garmin Training Readiness composite 0–100"},
      {id:"bodyBattery", name:"Body Battery",  unit:"",    color:C.amber,  lower:false, why:"Garmin Body Battery 0–100 — daily energy reserve"},
      {id:"sleepHrs",    name:"Sleep",         unit:"h",   color:C.mist,   lower:false, why:"nightly hours"},
    ];
    const fff=(this.state.fff||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
    const anyWell=CH.some(c=>fff.some(r=>r[c.id]!=null));
    if(!anyWell){
      return `<div class="card"><div class="eyebrow" style="color:${C.violet}">Wellness · daily device data ${this.infoBtn("well")}</div>${this.infoPanel("well")}
        <div class="empty">◦ No daily wellness data yet (RHR · HRV · readiness · Body Battery · sleep). Populated by Sync from intervals.icu. Distinct from the blood-panel labs below. History depth is a reveal at the first 2-year sync — these channels only go back as far as your device wrote them.</div></div>
        <div class="note" style="color:${C.dim};margin:4px 0 14px">— clinical labs below —</div>`;
    }
    const sel=CH.find(c=>c.id===this.wellMetric)||CH[0];
    const ctl = this.chartCtl.well || (this.chartCtl.well={from:null,to:null,per:"D"});
    const effFrom = ctl.from || (()=>{ const c=new Date(); c.setDate(c.getDate()-120); return c.toISOString().slice(0,10); })();
    const wellRes=applyCtl(fff,"date",{from:effFrom,to:ctl.to,per:ctl.per||"D"},{[sel.id]:"mean"});
    const cats=wellRes.cats, data=wellRes[sel.id];
    // current + 7-day baseline for each channel (baseline = mean of last 7 non-null)
    const stat=id=>{ const pts=fff.filter(r=>r[id]!=null); if(!pts.length) return {cur:null,base:null};
      const cur=pts[pts.length-1][id];
      const last7=pts.slice(-7).map(r=>r[id]); const base=last7.reduce((s,v)=>s+v,0)/last7.length;
      return {cur,base:+base.toFixed(1)}; };
    // #R8 (v1.39): HRV tolerance corridor — rolling N-day mean ±1 SD, status vs today's reading.
    let hrvBand=null, hrvStatus=null;
    {
      const hrvVals = fff.filter(r=>r.hrv!=null).map(r=>r.hrv);
      const recentN = hrvVals.slice(-HRV_BASE_N);
      if(recentN.length>=HRV_BASE_N){
        const mean=recentN.reduce((s,v)=>s+v,0)/recentN.length;
        const variance=recentN.reduce((s,v)=>s+(v-mean)*(v-mean),0)/recentN.length;
        const sd=Math.sqrt(variance);
        hrvBand={lo:+(mean-sd).toFixed(1),hi:+(mean+sd).toFixed(1),color:C.teal};
        const todayHrv=hrvVals[hrvVals.length-1];
        hrvStatus = todayHrv<hrvBand.lo ? {label:"Low",color:C.rose}
                  : todayHrv>hrvBand.hi ? {label:"Unbalanced (high)",color:C.amber}
                  : {label:"Balanced",color:C.teal};
      } else {
        hrvStatus = {label:`baseline building (${recentN.length}/${HRV_BASE_N})`, color:C.dim};
      }
    }
    const pills=CH.map(c=>`<button class="pill ${c.id===sel.id?"on":""}" data-act="wellMetric" data-v="${c.id}">${esc(c.name)}</button>`).join("");
    const cards=CH.map(c=>{ const s=stat(c.id); const have=s.cur!=null;
      const dir=have&&s.base!=null?(c.lower?(s.cur<s.base?C.teal:s.cur>s.base?C.rose:C.dim):(s.cur>s.base?C.teal:s.cur<s.base?C.rose:C.dim)):C.dim;
      const hrvLine = c.id==="hrv" ? `<div class="note" style="color:${hrvStatus.color}">${esc(hrvStatus.label)}</div>` : "";
      return `<div style="text-align:center">
        <div class="eyebrow">${esc(c.name)}</div>
        <div style="font-family:var(--mono);font-size:22px;color:${have?dir:C.dim};margin-top:6px">${have?fmt(s.cur,c.id==="sleepHrs"?1:0):"—"}${have&&c.unit?`<span style="font-size:11px;color:${C.dim}"> ${esc(c.unit)}</span>`:""}</div>
        <div class="note">${have&&s.base!=null?`7-day base ${fmt(s.base,c.id==="sleepHrs"?1:0)}`:"no data"}</div>${hrvLine}</div>`; }).join("");
    const toggle=this.timeCtl("well",{periods:["D","W","M"],default:"D"});
    const yOpt = sel.id==="readiness"?{yMin:0,yMax:100}:(sel.id==="sleepHrs"?{yMin:0}:{});
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div><div class="eyebrow" style="color:${C.violet}">Wellness · daily device data (intervals.icu) ${this.infoBtn("well")}</div>${this.infoPanel("well")}
          <div class="note" style="margin-top:3px">RHR · HRV · readiness · sleep — separate from the blood labs below</div></div>
        ${toggle}
      </div>
      <div class="cols4" style="margin-top:14px">${cards}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:14px">${pills}</div>
      <div class="note" style="margin-top:8px;color:${C.dim}">${esc(sel.name)}${sel.unit?` (${esc(sel.unit)})`:""} · ${esc(sel.why)} · ${(ctl.per||"D")==="D"?"trailing 120 days (default) or your From/To range":"period means"}</div>
      <div style="margin-top:8px">${chartSVG(Object.assign({w:860,h:180,cats,yUnit:sel.unit||"",
        series:[{name:sel.name,color:sel.color,data}]},yOpt,(sel.id==="hrv"&&hrvBand)?{band:hrvBand}:{}))}</div>
      <div class="note" style="margin-top:8px">Trend-vs-own-baseline only — HRV/RHR absolute numbers aren't comparable between people. HR is trended continuously across history (no 3-Jul device break — corrected 9 Jul 2026). Depth is provisional: these channels reach back only as far as intervals.icu stored them.</div></div>
      <div class="note" style="color:${C.dim};margin:4px 0 14px">— clinical labs below —</div>`;
  },

  /* ── actions ── */
  addWeek(){
    const w=parseInt(qs("wk_w").value); if(!w||w<1||w>62) return this.flash("Week must be 1–62");
    const map={km:"wk_km",h:"wk_h",vert:"wk_vert",desc:"wk_desc",longH:"wk_long",decoup:"wk_dec",ef:"wk_ef",z12:"wk_z",z3:"wk_z3",z45:"wk_z45"};
    const entry={}; Object.keys(map).forEach(k=>{ const v=num(qs(map[k]).value); if(v!=null) entry[k]=v; });
    this.state.actualWeeks[w]={...(this.state.actualWeeks[w]||{}),...entry};
    this.persist(); this.render(); this.flash("W"+w+" saved");
  },
  addBody(){ const d=qs("bd_d").value.trim(), kg=num(qs("bd_kg").value); if(!d||kg==null) return this.flash("Need date + kg");
    this.state.body.push({d,kg,bf:num(qs("bd_bf").value)}); this.persist(); this.render(); this.flash("Body point saved"); },
  addLab(){ const d=qs("lb_d").value.trim(), v=num(qs("lb_v").value); if(!d||v==null) return this.flash("Need date + value");
    this.state.labs.push({d,marker:qs("lb_m").value,value:v}); this.persist(); this.render(); this.flash("Lab saved"); },
  addLift(){ const d=qs("lf_d").value.trim(), v=num(qs("lf_v").value); if(!d||v==null) return this.flash("Need date + kg");
    this.state.lifts.push({d,lift:qs("lf_l").value,e1rm:v}); this.persist(); this.render(); this.flash("Lift point saved"); },
  addSeg(){
    // back-compat: kept for any imported states with old segmental data
    const d=qs("sg_d")&&qs("sg_d").value.trim();
    if(!d) return;
    const vals={la:num(qs("sg_la")&&qs("sg_la").value),ra:num(qs("sg_ra")&&qs("sg_ra").value),
      tr:num(qs("sg_tr")&&qs("sg_tr").value),ll:num(qs("sg_ll")&&qs("sg_ll").value),rl:num(qs("sg_rl")&&qs("sg_rl").value)};
    if(Object.values(vals).some(v=>v==null)) return this.flash("Need date + all 5 areas");
    this.state.segmental.push({d,...vals}); this.persist(); this.render(); this.flash("Segmental entry saved");
  },
  addGirth(){
    const d=qs("gr_d")&&qs("gr_d").value.trim();
    if(!d) return this.flash("Need a date");
    const entry={d};
    let hasAny=false;
    GIRTHS.forEach(g=>{ const v=num(qs("gr_"+g.id)&&qs("gr_"+g.id).value); if(v!=null){ entry[g.id]=v; hasAny=true; } });
    if(!hasAny) return this.flash("Enter at least one girth measurement");
    // merge with existing entry on same date if present
    const existing=this.state.girths.find(e=>e.d===d);
    if(existing){ Object.assign(existing, entry); }
    else { this.state.girths.push(entry); }
    this.persist(); this.render(); this.flash("Girth entry saved");
  },
  segSorted(){ return [...(this.state.segmental||[])].sort((a,b)=>a.d.localeCompare(b.d)); },
  addProt(){
    const d=qs("pr_d").value.trim(), c=qs("pr_c").value.trim();
    if(!d||!c) return this.flash("Need date + change");
    const r=qs("pr_r").value.trim();
    this.state.protocol.push({d,by:qs("pr_by").value,change:c,...(r?{reason:r}:{})});
    this.persist(); this.render(); this.flash("Protocol change saved");
  },
  setTarget(){
    const kg=num(qs("tg_kg").value), bf=num(qs("tg_bf").value);
    if(kg==null||bf==null) return this.flash("Need both target kg and bf %");
    this.state.target={kg,bf}; this.persist(); this.render(); this.flash("Projection target set");
  },
  doExport(){ qs("io").value=JSON.stringify(this.state,null,2); this.flash("Exported — copy the text (or paste into a share-copy's EMBEDDED_STATE)"); },
  doImport(){ try{ const p=JSON.parse(qs("io").value); if(!p.version) throw 0; this.state=norm(p); this.persist(); this.render(); this.flash("Imported"); }
    catch(e){ this.flash("Import failed — invalid JSON"); } },
  importSessions(){
    /* Accepts: whole runs.json ({runs:[{date,run_type,dist_km,time_s,…}]}) ·
       {gym:[{d,name}]} · a prior state export ({sessions:{…}}) · or any mix.
       Merge = replace-by-date within each kind. Import-only: the lens never
       writes back — runs.json and MacroFactor stay the sources of truth. */
    try{
      const p=JSON.parse(qs("sess_io").value); let nr=0, ng=0, skipped=0;
      const S=this.state.sessions;
      // v1.37: runs id-keyed on import too. A rebuilt runs.json emitting a per-
      //   row id keeps AM+PM doubles on one date as two rows; id-less legacy
      //   rows still key by date. Import stays runs.json-authoritative (full-row
      //   replace), so no field-preserving merge here — the pasted file wins.
      const upsertRunI=(arr,e)=>{
        let i=-1;
        if(e.id!=null){
          i=arr.findIndex(x=>x.id!=null&&x.id===e.id);
          if(i<0) i=arr.findIndex(x=>x.id==null&&x.d===e.d); // adopt legacy same-date
        } else { i=arr.findIndex(x=>x.d===e.d); }
        if(i>=0) arr[i]=e; else arr.push(e);
      };
      // Gym keyed on d + name + tod: two DIFFERENT sessions on one day coexist
      //   (e.g. AM Push / PM Pull, or two Push blocks with tod set). Re-importing
      //   the same {d,name,tod} updates in place. tod is optional — absent tod
      //   degrades the key to d+name (identical id-less gym rows are preserved,
      //   not collapsed). Long-term: emit tod ("AM"/"PM"/"HH:MM") in the dump.
      const gymKey=g=>`${g.d}|${(g.name||"").toLowerCase()}|${g.tod||""}`;
      const upsertGymI=(arr,e)=>{ const k=gymKey(e);
        const i=arr.findIndex(x=>gymKey(x)===k); if(i>=0) arr[i]=e; else arr.push(e); };
      const rawRuns = (p.sessions&&p.sessions.runs) || p.runs || [];
      rawRuns.forEach(r=>{ if(!r) return;
        const d=r.d||r.date; if(!d) return;
        // Quarantined runs (e.g. UTK 2025, injury-skewed) are KEPT for volume
        // display but tagged so any fitness/trend calc can exclude them.
        const isQ=(r.scale_flags||[]).some(f=>String(f).includes("quarantine"));
        upsertRunI(S.runs,{ d, id:(r.id!=null?String(r.id):(r.activity_id!=null?String(r.activity_id):null)),
          type:r.type||r.run_type||null,
          km: r.km!=null?r.km:(r.dist_km!=null?r.dist_km:null),
          h:  r.h!=null?r.h:(r.time_s!=null?Math.round(r.time_s/36)/100:null),
          quarantined: isQ,
          // Build 2: terrain + GAP preserved for derivePace engine
          terrain: r.terrain||null,
          run_type: r.run_type||r.type||null,
          avg_pace: r.avg_pace||null,
          gap_s_str: r.gap_pace||null,  // "M:SS" string; parsePaceStr reads it at derive time
          // §A4 (D044, v1.50): gain/desc from runs.json paste-import — closes the
          // v1.49 import-path VERT gap (previously live-Sync-only).
          gain: r.gain!=null?r.gain:(r.gain_m!=null?r.gain_m:null),
          desc: r.desc!=null?r.desc:(r.descent_m!=null?r.descent_m:null)
        });
        if(isQ) skipped++; else nr++; });
      const rawGym = (p.sessions&&p.sessions.gym) || p.gym || [];
      rawGym.forEach(g=>{ if(!g||!(g.d||g.date)) return; upsertGymI(S.gym,{d:g.d||g.date, name:g.name||null, tod:g.tod||null}); ng++; });
      if(!nr&&!ng){ this.flash("Nothing recognised — expected runs.json and/or {gym:[…]}"); return; }
      S.runs.sort((a,b)=>a.d.localeCompare(b.d)); S.gym.sort((a,b)=>a.d.localeCompare(b.d));
      this.persist(); this.render();
      this.flash(`Merged ${nr} run${nr===1?"":"s"} · ${ng} gym session${ng===1?"":"s"}${skipped?` · ${skipped} quarantined skipped`:""}`);
    }catch(e){ this.flash("Sessions import failed — invalid JSON"); }
  },
  importFFF(){
    /* Accepts: intervals.icu Wellness CSV converted to JSON array [{date,ctl,atl,tsb,rampRate}]
       or the raw wellness CSV rows converted to objects. Merge by date, replace-on-conflict.
       Same import-only pattern as importSessions(). */
    try{
      const raw = JSON.parse(qs("fff_io").value);
      const rows = Array.isArray(raw) ? raw : (raw.fff||[]);
      if(!rows.length){ this.flash("Nothing recognised — expected array [{date,ctl,atl,tsb,rampRate}]"); return; }
      // field-preserving merge: never null-out an existing channel
      const nn=v=>(v!=null&&!isNaN(+v))?+v:null;
      const upsert=(arr,e)=>{ const i=arr.findIndex(x=>x.date===e.date);
        if(i<0){ arr.push(e); return; }
        const cur=arr[i]; Object.keys(e).forEach(k=>{ if(k==="date") return; if(e[k]!=null) cur[k]=e[k]; }); };
      let n=0;
      rows.forEach(r=>{ if(!r||!r.date) return;
        const sleepSecs=nn(r.sleepSecs);
        upsert(this.state.fff,{ date:r.date,
          ctl: nn(r.ctl), atl:nn(r.atl),
          tsb: r.tsb!=null?+r.tsb:(nn(r.ctl)!=null&&nn(r.atl)!=null?+(r.ctl-r.atl).toFixed(3):null),
          rampRate: nn(r.rampRate!=null?r.rampRate:r.ramp_rate),
          rhr:nn(r.rhr!=null?r.rhr:r.restingHR), hrv:nn(r.hrv),
          readiness:nn(r.readiness),
          bodyBattery:nn(r.bodyBattery!=null?r.bodyBattery:r.garminBodyBattery),
          sleepSecs, sleepHrs:sleepSecs!=null?+(sleepSecs/3600).toFixed(2):nn(r.sleepHrs),
          sleepScore:nn(r.sleepScore) });
        n++; });
      this.state.fff.sort((a,b)=>a.date.localeCompare(b.date));
      this.persist(); this.render();
      this.flash(`FFF: merged ${n} wellness row${n===1?"":"s"}`);
    }catch(e){ this.flash("FFF import failed — paste a JSON array [{date,ctl,atl,tsb,rampRate}]"); }
  },

  async syncICU(){
    /* Calls the Cloudflare Worker relay, which calls intervals.icu server-side.
       Worker returns {activities:[…], wellness:[…]} — same shape as CSV exports.
       Requires WORKER_URL to be set (Data tab shows the URL input). */
    const url = (qs("worker_url")||{}).value || WORKER_URL;
    if(!url){ this.flash("Worker URL not set — paste it in the field above or edit WORKER_URL in the file"); return; }
    const btn = qs("sync_btn");
    if(btn){ btn.disabled=true; btn.textContent="⟳ Syncing…"; }
    try{
      const res = await fetch(url, {method:"GET", headers:{"Accept":"application/json"}});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // Ingest activities → sessions.runs + body weight (icu_weight, kg, when present)
      let nr=0, nf=0, nw=0, skipped=0;
      const S=this.state.sessions;
      // Run upsert (v1.36, fork 3a). Two precedence classes:
      //  · VOLUME fields (type/km/h) — live Sync always refreshes when non-null
      //    (freshest distance/time wins; these aren't pace-engine authority).
      //  · PACE-ENGINE fields (terrain/run_type/avg_pace/gap_s_str/quarantined)
      //    — runs.json is authoritative. Sync FILLS them only when the existing
      //    row has no value; it NEVER overwrites a value a runs.json import set.
      //    So a rebuild's GAP, real run_type (long/quality/race/test), corrected
      //    terrain, and quarantine flag all survive every future Sync.
      const RUN_FILL_ONLY=["terrain","run_type","avg_pace","gap_s_str","quarantined"];
      // v1.37: id-keyed merge. intervals.icu activities carry a unique id, so
      //   two runs on the SAME DATE (e.g. an AM + PM double) are distinct rows
      //   instead of the 2nd silently overwriting the 1st (the old date-only key).
      //   Precedence when locating the row to merge into:
      //     1. incoming id matches an existing id → that row
      //     2. incoming has an id but no id-match → adopt a legacy id-less row on
      //        the same date (backfill its id) so a runs.json import row and its
      //        later live-sync twin converge to ONE row, not a duplicate
      //     3. otherwise push a new row
      //   Legacy incoming (no id, e.g. an older runs.json paste) still keys by
      //   date so historical behaviour is unchanged.
      const findRun=(arr,e)=>{
        if(e.id!=null){
          let i=arr.findIndex(x=>x.id!=null&&x.id===e.id); if(i>=0) return i;
          i=arr.findIndex(x=>x.id==null&&x.d===e.d);
          if(i>=0){ arr[i].id=e.id; return i; }   // adopt legacy row, backfill id
          return -1;
        }
        return arr.findIndex(x=>x.d===e.d);        // legacy: date-keyed
      };
      const upsertR=(arr,e)=>{ const i=findRun(arr,e);
        if(i<0){ arr.push(e); return; }
        const cur=arr[i];
        Object.keys(e).forEach(k=>{ if(k==="d"||k==="id") return;
          if(RUN_FILL_ONLY.includes(k)){
            // fill-only: set only if the existing row lacks a value
            if((cur[k]==null)&&e[k]!=null) cur[k]=e[k];
          } else {
            // volume/label: refresh when incoming is non-null
            if(e[k]!=null) cur[k]=e[k];
          }
        });
      };
      const upsertBdy=(arr,e)=>{ const i=arr.findIndex(x=>x.d===e.d);
        if(i>=0){ if(e.kg!=null) arr[i].kg=e.kg; } // weight-only: never overwrite existing bf%
        else arr.push({d:e.d, kg:e.kg}); };
      (data.activities||[]).forEach(r=>{
        const d=(r.start_date_local||r.date||r.Date||"").slice(0,10); if(!d) return;
        // Body weight: icu_weight field present on any activity type (Withings→MFP→Garmin→ICU chain)
        const wkg=r.icu_weight!=null?+r.icu_weight:null;
        if(wkg!=null&&wkg>30&&wkg<200){ upsertBdy(this.state.body,{d,kg:Math.round(wkg*10)/10}); nw++; }
        // Runs only
        const type=r.type||r.Type||r.sport_type||"";
        if(!["Run","TrailRun","VirtualRun"].includes(type)) return;
        const dist_m=r.distance||r.Distance||r.icu_distance||r.dist_m||null;
        const dist_km=dist_m?Math.round(dist_m/10)/100:null;
        const time_s=r.moving_time||r.elapsed_time||r["Moving Time"]||r.time_s||null;
        // ── Pace-engine feed (v1.36) ────────────────────────────────────────
        // terrain (fork 1a): activity type → surface. TrailRun→trail, Run/
        //   VirtualRun→road. As good as Garmin activity-type labelling; a
        //   mislabelled run is self-correctable at source. GAP/gain heuristics
        //   were deferred (see D020 / OPERATING_BRIEF §3).
        const terrain = type==="TrailRun" ? "trail" : "road";
        // avg_pace (fork 2a): derive "M:SS"/km from dist+time so derivePace has
        //   its designed fallback on live rows. GAP (gap_s_str) is NOT set here —
        //   it's a FIT-derived field authoritative only via a runs.json rebuild,
        //   so live rows carry avg_pace and the engine falls back to it (D1).
        //   On trail this is noisier than GAP (terrain-corrupted) until the next
        //   rebuild refreshes GAP; the field-preserving upsert keeps any GAP a
        //   prior import set.
        let avg_pace=null;
        if(dist_km&&dist_km>0&&time_s&&time_s>0){
          const spk=time_s/dist_km, mm=Math.floor(spk/60), ss=Math.round(spk%60);
          const mm2=ss===60?mm+1:mm, ss2=ss===60?0:ss;
          avg_pace=mm2+":"+(ss2<10?"0"+ss2:ss2);
        }
        // run_type (fork: real type, not hardcoded "easy"). intervals.icu has no
        //   easy/long/quality field live, so live rows are "easy" by default but
        //   a prior runs.json import's run_type (long/quality/race/test) is
        //   preserved by the field-preserving upsert. Race/test weighting in
        //   derivePace therefore relies on the runs.json rebuild, as designed.
        // §5 (Phase 4, D043): additive volume-class channels — refresh-on-sync
        // (NOT fill-only; not in RUN_FILL_ONLY), nullable, raw intervals.icu
        // summary fields pass through the Worker unchanged. If a live payload
        // uses different field names than expected, these stay null and ship
        // anyway (no throw) — `??` fallbacks below cover the two most likely
        // alternate keys observed in intervals.icu summary objects.
        const gain  = (r.total_elevation_gain ?? r.icu_elevation_gain) != null ? Math.round(r.total_elevation_gain ?? r.icu_elevation_gain) : null;
        const avg_hr= (r.average_heartrate ?? r.icu_average_hr)       != null ? Math.round(r.average_heartrate ?? r.icu_average_hr) : null;
        const np    = (r.icu_weighted_avg_watts ?? r.weighted_average_watts) != null ? Math.round(r.icu_weighted_avg_watts ?? r.weighted_average_watts) : null;
        const load  = (r.icu_training_load ?? r.training_load)        != null ? Math.round(r.icu_training_load ?? r.training_load) : null;
        // §A4 (D044, v1.50): additive nullable descent channel, same refresh-on-sync
        // class as gain (volume-class, NOT RUN_FILL_ONLY). `??` fallbacks cover the
        // most likely alternate intervals.icu field names — executor verifies
        // against a real Sync payload; stays null and ships anyway if none match.
        const desc  = (r.total_descent ?? r.icu_descent ?? r.descent) != null ? Math.round(r.total_descent ?? r.icu_descent ?? r.descent) : null;
        upsertR(S.runs,{ d, id:(r.id!=null?String(r.id):null), type:"easy", km:dist_km,
          h: time_s?Math.round(time_s/36)/100:null,
          terrain, run_type:"easy", avg_pace,
          quarantined:false,
          gain, avg_hr, np, load, desc });
        nr++;
      });
      // Ingest wellness → fff (CTL/ATL/TSB/rampRate + daily wellness channels).
      // Merge-by-date, field-preserving: a later sync that lacks a channel must
      // not wipe a value an earlier sync/import set. Only overwrite when the
      // incoming value is non-null.
      const nn=v=>(v!=null&&!isNaN(+v))?+v:null;
      const upsertF=(arr,e)=>{ const i=arr.findIndex(x=>x.date===e.date);
        if(i<0){ arr.push(e); return; }
        const cur=arr[i];
        Object.keys(e).forEach(k=>{ if(k==="date") return; if(e[k]!=null) cur[k]=e[k]; });
      };
      (data.wellness||[]).forEach(r=>{
        const date=(r.date||"").slice(0,10); if(!date) return;
        const ctl=nn(r.ctl), atl=nn(r.atl);
        const sleepSecs=nn(r.sleepSecs);
        upsertF(this.state.fff,{ date, ctl, atl,
          tsb:(ctl!=null&&atl!=null)?+(ctl-atl).toFixed(3):(nn(r.tsb)),
          rampRate:nn(r.rampRate),
          rhr:nn(r.rhr), hrv:nn(r.hrv), readiness:nn(r.readiness),
          bodyBattery:nn(r.bodyBattery),
          sleepSecs, sleepHrs:sleepSecs!=null?+(sleepSecs/3600).toFixed(2):nn(r.sleepHrs),
          sleepScore:nn(r.sleepScore) });
        nf++;
      });
      S.runs.sort((a,b)=>a.d.localeCompare(b.d));
      this.state.fff.sort((a,b)=>a.date.localeCompare(b.date));
      this.state.body.sort((a,b)=>a.d.localeCompare(b.d));
      // Stash the sync diagnostics (not persisted state shape — a transient
      // note the Data tab surfaces, so the provisional-scope reveal is visible).
      this.lastSync={ at:new Date().toISOString(),
        detailDiag:data.detailDiag||null, coverage:data.wellnessCoverage||null };
      this.persist(); this.render();
      // Build an honest coverage line for the flash.
      const cov=data.wellnessCoverage, dd=data.detailDiag;
      let extra="";
      if(cov){ const has=k=>cov[k]?cov[k]:"none";
        extra=` · wellness back to ${cov.oldest||"—"} (RHR from ${has("first_rhr")}, HRV from ${has("first_hrv")}, sleep from ${has("first_sleep")})`; }
      if(dd&&dd.detailAvailable===false) extra+=` · ⚠ no activity-detail fields on recent runs — detail half is inert (summary-only holds)`;
      this.flash(`Sync complete — ${nr} run${nr===1?"":"s"} · ${nf} wellness row${nf===1?"":"s"}${nw?` · ${nw} weight point${nw===1?"":"s"}`:""}${extra}`);
    }catch(e){
      this.flash(`Sync failed: ${e.message}`);
    }finally{
      if(btn){ btn.disabled=false; btn.textContent="↻ Sync now"; }
    }
  },

  /* ── Scorecard (v1.5): computed from logged data only — "—" until data exists ── */
  scores(){
    const S=this.state, cw=todayWeek();
    // running adherence: executed vs plan hours over weeks with actuals
    let adh=null; { let ph=0,ah=0; Object.keys(S.actualWeeks||{}).forEach(k=>{ const a=S.actualWeeks[k];
      if(a&&a.h!=null&&PLAN[k-1]){ ph+=PLAN[k-1].h; ah+=a.h; } });
      if(ph>0) adh=Math.round(ah/ph*100); }
    // D036/F13 (v1.39): TWO counts per front — planFull (denominator, full 7-day week) and
    // dueToDate/doneToDate (colour only, pace-to-date). Displayed fraction = doneToDate/planFull
    // (matches the Week-Lens full-week view); colour reads doneToDate/dueToDate so an early-week
    // state isn't punished (Mon 1/4 with the day's session done = teal, not rose).
    const now=new Date(); const di=Math.min(6,(now.getDay()+6)%7);
    const {R,G}=sessionMaps();
    let gPlanFull=0,gDueToDate=0,gDoneToDate=0,rPlanFull=0,rDueToDate=0,rDoneToDate=0;
    for(let i=0;i<7;i++){ const p=plannedDay(cw,i), iso=dayISO(cw,i);
      const gOn=classifyGym(p.g), rOn=classifyRun(p.r)!=="rest";
      if(gOn) gPlanFull++;
      if(rOn) rPlanFull++;
      if(i<=di){
        if(gOn){ gDueToDate++; if((G[iso]||[]).length) gDoneToDate++; }
        if(rOn){ rDueToDate++; if((R[iso]||[]).length) rDoneToDate++; }
      }
    }
    // protein: last 7 calendar days, days ≥117 g
    const wk=[...Array(7)].map((_,k)=>{ const d=new Date(Date.now()-k*864e5);
      return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); });
    const plog=(S.protein||[]).filter(p=>wk.includes(p.d));
    const pHit=plog.filter(p=>p.g>=117).length, pDays=plog.length;
    // health: latest value per marker vs range
    let flags=0, seen=0;
    MARKERS.forEach(m=>{ const pts=(S.labs||[]).filter(l=>l.marker===m.id).sort((a,b)=>a.d.localeCompare(b.d));
      if(!pts.length) return; seen++;
      const lv=pts[pts.length-1].value;
      if((m.lo!=null&&lv<m.lo)||(m.hi!=null&&lv>m.hi)) flags++; });
    // mind: latest weekly check-in → 0–100 (stress inverted)
    const ci=[...(S.checkins||[])].sort((a,b)=>a.d.localeCompare(b.d)).pop()||null;
    const mind=ci?Math.round(((ci.sleep+(6-ci.stress)+ci.mot)/3)/5*100):null;
    return {adh, gym:gPlanFull?`${gDoneToDate}/${gPlanFull}`:null, gymOK:gDueToDate?gDoneToDate/gDueToDate:null,
            run:rPlanFull?`${rDoneToDate}/${rPlanFull}`:null, runOK:rDueToDate?rDoneToDate/rDueToDate:null,
            prot:pDays?`${pHit}/7`:null, protOK:pDays?pHit/7:null, flags, seen, mind, ci};
  },
  scoreCard(){
    const sc=this.scores();
    const dot=v=>v==null?C.dim:(v>=0.85?C.teal:v>=0.6?C.amber:C.rose);
    const tile=(lab,val,sub,col)=>`<div class="card" style="padding:12px">
      <div class="eyebrow" style="margin-bottom:4px">${lab}</div>
      <div style="font-family:var(--mono);font-size:20px;color:${col}">${val==null?"—":val}</div>
      <div class="note" style="margin-top:4px">${sub}</div></div>`;
    return `<div class="card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div class="eyebrow" style="color:${C.teal}">Scorecard — all fronts, logged data only ${this.infoBtn("score")}</div>
      <span class="note">empty = not yet instrumented, never guessed</span></div>
      ${this.infoPanel("score")}
      <div class="cols4" style="margin-top:10px">
      ${tile("Run · plan adherence", sc.adh==null?null:sc.adh+"%", "executed vs plan hours, logged weeks", dot(sc.adh==null?null:Math.min(sc.adh,100)/100))}
      ${tile("Run · this week", sc.run, "sessions done/planned to date (imports)", dot(sc.runOK))}
      ${tile("Gym · this week", sc.gym, "sessions done/planned to date (imports)", dot(sc.gymOK))}
      ${tile("Fuel · protein days", sc.prot, "days ≥117 g in last 7 (quick-add in Data)", dot(sc.protOK))}
      ${tile("Health · lab flags", sc.seen?String(sc.flags):null, sc.seen?`${sc.flags} of ${sc.seen} tracked markers out of range`:"no labs logged yet", sc.seen?(sc.flags===0?C.teal:C.rose):C.dim)}
      ${tile("Mind · weekly check-in", sc.mind==null?null:sc.mind+"%", sc.ci?`sleep ${sc.ci.sleep} · stress ${sc.ci.stress} · motivation ${sc.ci.mot} (${esc(sc.ci.d)})`:"3 taps in the Data tab — the only manual input", dot(sc.mind==null?null:sc.mind/100))}
      </div></div>`;
  },

    const dot=v=>v==null?C.dim:(v>=0.85?C.teal:v>=0.6?C.amber:C.rose);
    const pill=(lab,val,sub,col)=>`<div style="display:flex;flex-direction:column;gap:2px;padding:8px 12px;border:1px solid var(--c-contour);border-radius:10px;min-width:100px">
      <div class="eyebrow" style="margin-bottom:2px;font-size:9px">${lab}</div>
      <div style="font-family:var(--mono);font-size:18px;color:${col}">${val==null?"—":val}</div>
      <div class="note" style="font-size:9px;margin-top:2px">${sub}</div></div>`;
    const pills=[
      pill("Run adherence", sc.adh==null?null:sc.adh+"%", "vs plan hrs", dot(sc.adh==null?null:Math.min(sc.adh,100)/100)),
      pill("Run · wk", sc.run, "done/planned", dot(sc.runOK)),
      pill("Gym · wk", sc.gym, "done/planned", dot(sc.gymOK)),
      pill("Protein days", sc.prot, "≥117 g/7 d", dot(sc.protOK)),
      pill("Lab flags", sc.seen?String(sc.flags):null, sc.seen?`${sc.flags}/${sc.seen} markers`:"no labs", sc.seen?(sc.flags===0?C.teal:C.rose):C.dim),
      pill("Mind", sc.mind==null?null:sc.mind+"%", sc.ci?`slp ${sc.ci.sleep} · str ${sc.ci.stress} · mot ${sc.ci.mot}`:"tap Data tab", dot(sc.mind==null?null:sc.mind/100)),
    ].join("");

        <span class="note">empty = not yet instrumented, never guessed</span></div>
      ${this.infoPanel("score")}
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div style="flex-shrink:0">${perfRadarSVG(sc)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;flex:1">${pills}</div>
      </div></div>`;
  },
  boardSignals(){
    /* Live wellness read-outs, routed to the relevant board persona's lens.
       COMPUTED from synced data — NOT written into state.boardNotes (those stay
       coach-authored dated entries; fabricating them would break the no-invented-
       data rule). Each signal has a severity; only `action`-severity items are
       promoted to the CEO banner. All thresholds are trend-vs-own-baseline, never
       cross-athlete (HR trended continuously — no 3-Jul device break, corrected 9 Jul). Returns
       {items:[{persona,role,text,sev}], ceo:[…action texts…]} or null if no data. */
    const fff=(this.state.fff||[]).filter(r=>r.date);
    if(!fff.length) return null;
    const roleOf=id=>(BOARD.find(b=>b.id===id)||{}).role||id;
    // helper: latest value + baseline (mean of prior 7 non-null, excluding latest)
    const chan=id=>{ const p=fff.filter(r=>r[id]!=null); if(!p.length) return null;
      const cur=p[p.length-1][id]; const prior=p.slice(-8,-1).map(r=>r[id]);
      const base=prior.length?prior.reduce((s,v)=>s+v,0)/prior.length:null;
      return {cur, base:base!=null?+base.toFixed(1):null, n:p.length}; };
    const items=[]; const ceo=[];
    const push=(persona,text,sev)=>{ items.push({persona,role:roleOf(persona),text,sev}); if(sev==="action") ceo.push(text); };

    const hrv=chan("hrv"), rhr=chan("rhr"), rd=chan("readiness"), sl=chan("sleepHrs"), bb=chan("bodyBattery");
    // HRV — Data Analyst lens; suppressed vs baseline = overreach signal (Physio/CMO on action)
    if(hrv&&hrv.base!=null){ const d=(hrv.cur-hrv.base)/hrv.base*100;
      if(d<=-12) push("data",`HRV ${fmt(hrv.cur,0)} ms is ${fmt(Math.abs(d),0)}% below its 7-day baseline (${fmt(hrv.base,0)}) — an overreach flag. Corroborate with RHR + readiness before cutting load.`,"action");
      else if(d>=8) push("data",`HRV ${fmt(hrv.cur,0)} ms sits above baseline — parasympathetic recovery looks intact.`,"info");
      else push("data",`HRV ${fmt(hrv.cur,0)} ms tracking its own baseline (${fmt(hrv.base,0)}) — no divergence.`,"info"); }
    // RHR — Physio/CMO lens; elevated vs baseline = accumulated fatigue/illness
    if(rhr&&rhr.base!=null){ const d=rhr.cur-rhr.base;
      if(d>=5) push("phys",`Resting HR ${fmt(rhr.cur,0)} bpm is ${fmt(d,0)} above baseline (${fmt(rhr.base,0)}) — fatigue or an incoming bug. Cross-check HRV; if both point the same way, it's real.`,"action");
      else push("phys",`Resting HR ${fmt(rhr.cur,0)} bpm near baseline — nothing flagging.`,"info"); }
    // Readiness — COO/Mindset lens; low readiness = check the quality day, don't auto-cut
    if(rd){ if(rd.cur<45) push("coo",`Readiness ${fmt(rd.cur,0)}/100 is low. If today carries a quality run, the call is to inspect the session — not reflexively cut it — and to look at what sleep/stress drove it.`,"action");
      else if(rd.cur>=70) push("coo",`Readiness ${fmt(rd.cur,0)}/100 — green. Good day to bank a harder session if the plan calls for one.`,"info");
      else push("coo",`Readiness ${fmt(rd.cur,0)}/100 — moderate. Proceed as planned, watch the warm-up.`,"info"); }
    // Body Battery — Data Analyst lens; a different angle on recovery than readiness (intraday)
    if(bb&&bb.base!=null){ const d=bb.cur-bb.base;
      if(bb.cur<20) push("data",`Body Battery at ${fmt(bb.cur,0)}/100 — critically low. Garmin's model says reserves are near-empty; a quality session today is likely wasted adaptation stimulus.`,"action");
      else if(bb.cur<40&&d<=-15) push("data",`Body Battery ${fmt(bb.cur,0)}/100 and ${fmt(Math.abs(d),0)} below its own baseline — trending down. Worth noting alongside readiness.`,"action");
      else push("data",`Body Battery ${fmt(bb.cur,0)}/100 — adequate.`,"info"); }
    // Sleep — COO (the lever a full-time job squeezes first) + Dietitian if chronic
    if(sl&&sl.base!=null){ if(sl.base<6.5) push("coo",`Sleep averaging ${fmt(sl.base,1)} h over the last week — under the 7 h hypertrophy/recovery floor. This is the first lever to protect before adaptation slips.`,"action");
      else push("coo",`Sleep averaging ${fmt(sl.base,1)} h — holding the recovery floor.`,"info"); }

    return {items, ceo};
  },

      zone:(qs("ng_zone")||{value:""}).value.trim()});

  /* niggleFormHTML — the ONE niggle entry form (Data tab + Health inline card +
     voice confirmation card). `pre` pre-fills (from a map tap or an extraction
     draft); `missing` field-keys render amber = extraction could not resolve
     them and Andre must confirm. All D026 minimum fields, ids unchanged. */
  mapPick(id){
    this.nigPick=(this.nigPick===id?null:id);
    if(!this.nigPick) this.nigDraft=null;

  async extractNiggle(){
    /* Voice path (D026): free text (dictated via the Wispr Flow keyboard or typed)
       → Worker POST /claude (Haiku, key server-side per FK-A(a) 18/07/26)
       → parseNiggleExtract (enum-strict) → confirmation form. Never auto-saves. */
    const txt=((qs("ng_voice")||{}).value||"").trim();
    if(txt.length<8) return this.flash("Dictate or type the niggle description first");
    if(typeof navigator!=="undefined"&&navigator.onLine===false) return this.flash("Extraction needs a connection — the manual fields work offline");
    const base=(((qs("worker_url")||{}).value)||WORKER_URL).replace(/\/+$/,"");
    const btn=qs("ng_extract"); if(btn){ btn.disabled=true; btn.textContent="⟳ Extracting…"; }
    try{
      const res=await fetch(base+"/claude",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({system:niggleExtractSystem(),text:txt})});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      const parsed=parseNiggleExtract(data.text||"");
      if(!parsed) throw new Error("no JSON in the reply");
      this.nigDraft=parsed; this.render();
      this.flash(parsed.missing.length?`Extracted — confirm the ${parsed.missing.length} amber field${parsed.missing.length>1?"s":""} before saving`:"Extracted — review and save");
    }catch(e){
      const b=qs("ng_extract"); if(b){ b.disabled=false; b.textContent="✦ Extract"; }
      this.flash("Extraction failed ("+e.message+") — the manual fields still work");
    }
  },
  /* ── Phase 8 #39/#40 (D025): clinical-print additions ─────────────────────
     Form (TSB) past 3 months (measured, intervals.icu) + FFF_PROJ forward 6
     months (PLAN-DERIVED Bannister projection — flagged on the chart, roadmap
     §E) with all five readiness bands labelled; RHR/HRV/Sleep 90-day charts
     (paper palette; HRV keeps the ±1 SD corridor, N=HRV_BASE_N); full niggle
     log table for the physio (Andre-ratified addition, 18/07/26). ── */
  clinicalFormChart(){
    const iso=d=>d.toISOString().slice(0,10);
    const t=new Date(), past=new Date(t), fut=new Date(t);
    past.setDate(past.getDate()-90); fut.setDate(fut.getDate()+180);
    /* local Monday-bucket helper — NOT weekStartISO (that maps macro-week NUMBER → date) */
    const wkOf=dte=>{ const d=new Date(dte+"T00:00:00"); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); };
    const wk={}, add=(dte,v,key)=>{ const w=wkOf(dte); (wk[w]=wk[w]||{}); (wk[w][key]=wk[w][key]||[]).push(v); };
    (this.state.fff||[]).forEach(r=>{ if(r.tsb!=null&&r.date>=iso(past)&&r.date<=iso(t)) add(r.date,r.tsb,"real"); });
    FFF_PROJ.rows.forEach(r=>{ if(r.date>iso(t)&&r.date<=iso(fut)) add(r.date,r.tsb,"proj"); });
    const weeks=Object.keys(wk).sort();
    if(!weeks.length) return `<div class="card"><div class="eyebrow">Form (TSB) — trajectory</div><div class="empty" style="color:${C.papersub}">◦ No Form data yet — run Sync on the Data tab.</div></div>`;
    const mean=a=>a.reduce((s,v)=>s+v,0)/a.length;
    const real=weeks.map(w=>wk[w].real?+mean(wk[w].real).toFixed(1):null);
    const proj=weeks.map(w=>wk[w].proj?+mean(wk[w].proj).toFixed(1):null);
    const vals=real.concat(proj).filter(v=>v!=null);
    const lo=Math.min(-35,Math.floor(Math.min.apply(null,vals))-4), hi=Math.max(28,Math.ceil(Math.max.apply(null,vals))+4);
    const W=860,H=250,Pl=44,Pr=76,Pt=16,Pb=26,iw=W-Pl-Pr,ih=H-Pt-Pb,n=weeks.length;
    const sx=i=>n<=1?Pl+iw/2:Pl+i*(iw/(n-1)), sy=v=>Pt+ih-(v-lo)/(hi-lo)*ih;
    const bands=[
      {lo:-100,hi:-30,f:"#F6DBDB",lc:"#B95F5F",label:"High Risk"},
      {lo:-30,hi:-10,f:"#DFF0E3",lc:"#4E8B63",label:"Optimal"},
      {lo:-10,hi:5,f:"#EDEDE3",lc:"#87876F",label:"Grey Zone"},
      {lo:5,hi:25,f:"#DCEBF4",lc:"#4A87A8",label:"Fresh"},
      {lo:25,hi:100,f:"#F3EFDC",lc:"#A08E45",label:"Transition"}];
    let g="";
    bands.forEach(b=>{ if(b.hi<lo||b.lo>hi) return;
      const y1=sy(Math.min(b.hi,hi)), y2=sy(Math.max(b.lo,lo)); if(y2<=y1) return;
      g+=`<rect x="${Pl}" y="${y1}" width="${iw}" height="${y2-y1}" fill="${b.f}" opacity="0.75"/>`;
      const my=(y1+y2)/2; if(my>Pt&&my<H-Pb) g+=`<text x="${W-Pr+6}" y="${my+3}" font-family="var(--mono)" font-size="9" fill="${b.lc}">${b.label}</text>`; });
    for(let i=0;i<=4;i++){ const v=lo+(hi-lo)*i/4, y=sy(v);
      g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${y}" y2="${y}" stroke="${C.paperline}" stroke-opacity="0.6"/>`;
      g+=`<text x="${Pl-6}" y="${y+3}" text-anchor="end" font-family="var(--mono)" font-size="9" fill="${C.papersub}">${Math.round(v)}</text>`; }
    if(lo<=0&&hi>=0) g+=`<line x1="${Pl}" x2="${W-Pr}" y1="${sy(0)}" y2="${sy(0)}" stroke="${C.ink}" stroke-dasharray="3 3" opacity="0.35"/>`;
    const todayW=wkOf(iso(t)), ti=weeks.indexOf(todayW);
    if(ti>=0){ const x=sx(ti); g+=`<line x1="${x}" x2="${x}" y1="${Pt}" y2="${H-Pb}" stroke="${C.ink}" stroke-dasharray="2 3" opacity="0.5"/><text x="${x}" y="${Pt-4}" text-anchor="middle" font-family="var(--mono)" font-size="8.5" fill="${C.papersub}">today</text>`; }
    const path=(data,dash)=>{ let p="",ok=false;
      data.forEach((v,i)=>{ if(v==null) return; p+=(ok?"L":"M")+sx(i)+" "+sy(v); ok=true; });
      return p?`<path d="${p}" fill="none" stroke="${dash?"#6A5A9E":C.ink}" stroke-width="1.8"${dash?` stroke-dasharray="5 4" opacity="0.85"`:""}/>`:""; };
    g+=path(real,false)+path(proj,true);
    const step=Math.max(1,Math.ceil(n/9));
    weeks.forEach((w,i)=>{ if(i%step===0||i===n-1){ g+=`<text x="${sx(i)}" y="${H-8}" text-anchor="${i===n-1?"end":"middle"}" font-family="var(--mono)" font-size="8.5" fill="${C.papersub}">${fmtDshort(w)}</text>`; } });
    return `<div class="card"><div class="eyebrow" style="color:${C.ink}">Form (TSB) — past 3 months measured · forward 6 months projected</div>
      <div style="margin-top:10px"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${g}</svg></div>
      <div class="note" style="margin-top:6px;color:${C.papersub}">Solid line = measured daily Form (intervals.icu, weekly means). Dashed line = <b>plan-derived projection</b> (Bannister impulse-response over the training plan) — a forecast of intended load, not a measurement. Bands: High Risk &lt;−30 · Optimal −30…−10 · Grey −10…5 · Fresh 5…25 · Transition &gt;25.</div></div>`;
  },
  clinicalWellness(){
    const iso=d=>d.toISOString().slice(0,10);
    const past=new Date(); past.setDate(past.getDate()-90);
    const fff=(this.state.fff||[]).filter(r=>r.date>=iso(past)).sort((a,b)=>a.date<b.date?-1:1);
    const CHP=[
      {id:"rhr",name:"Resting HR",unit:"bpm",color:"#A85555"},
      {id:"hrv",name:"HRV (overnight)",unit:"ms",color:"#3D7D76"},
      {id:"sleepHrs",name:"Sleep",unit:"h",color:"#5E6B7A"}];
    const blocks=CHP.map(c=>{
      const pts=fff.filter(r=>r[c.id]!=null);
      if(!pts.length) return `<div class="card"><div class="eyebrow" style="color:${C.ink}">${c.name}</div><div class="empty" style="color:${C.papersub}">◦ No ${c.name} data in the last 90 days.</div></div>`;
      let band=null,status="";
      if(c.id==="hrv"){
        const vals=pts.map(r=>r.hrv), rec=vals.slice(-HRV_BASE_N);
        if(rec.length>=HRV_BASE_N){ const m=rec.reduce((s,v)=>s+v,0)/rec.length;
          const sd=Math.sqrt(rec.reduce((s,v)=>s+(v-m)*(v-m),0)/rec.length);
          band={lo:+(m-sd).toFixed(1),hi:+(m+sd).toFixed(1),color:"#3D7D76"};
          const cur=vals[vals.length-1];
          status=` · current ${cur} ms — ${cur<band.lo?"below":cur>band.hi?"above":"within"} the ±1 SD ${HRV_BASE_N}-day baseline corridor`; } }
      return `<div class="card"><div class="eyebrow" style="color:${C.ink}">${c.name} — last 90 days${status}</div>
        <div style="margin-top:10px">${chartSVG(Object.assign({w:860,h:170,cats:pts.map(r=>fmtDshort(r.date)),yUnit:c.unit,
          series:[{name:c.name,color:c.color,data:pts.map(r=>r[c.id])}],line:C.paperline,sub:C.papersub},band?{band}:{},c.id==="sleepHrs"?{yMin:0}:{}))}</div></div>`;
    }).join("");
    return blocks+`<div class="note" style="color:${C.papersub};margin:2px 0 6px">Wellness channels are device-derived (Garmin via intervals.icu) — trend-vs-own-baseline reading only; HRV/RHR absolutes are not comparable between individuals.</div>`;
  },

        <button class="btn" id="ng_extract" data-act="extractNiggle">✦ Extract</button>
      </div>
      <div class="row" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">

        <label class="f"><span>region</span>${sel("ng_region",NIGGLE_REGIONS,pre.region,"region")}</label>
        <label class="f"><span>zone (map)</span><input id="ng_zone" style="width:150px" placeholder="finer label, optional" value="${esc(pre.zone||"")}"></label>
        <label class="f"><span>side</span>${sel("ng_side",NIGGLE_SIDE,pre.side,"side")}</label>

      </div>

  },
  niggleSection(){
    const ns=[...(this.state.niggles||[])].sort((a,b)=>String(b.d).localeCompare(String(a.d)));
    const counts={};
    ns.forEach(n=>{ const k=n.region+(n.side&&n.side!=="central"?" "+n.side:""); counts[k]=(counts[k]||0)+1; });
    const chips=Object.entries(counts).sort((a,b)=>b[1]-a[1])
      .map(([k,c])=>`<span class="pill${c>=3?" on":""}" style="${c>=3?`border-color:${C.rose};color:${C.rose}`:c===2?`border-color:${C.amber};color:${C.amber}`:""}">${esc(k)} ×${c}</span>`).join(" ");
    const rows=ns.slice(0,10).map(n=>`<div class="note" style="padding:6px 0;border-bottom:1px solid var(--c-contour)">
      <span style="font-family:var(--mono)">${fmtD(n.d)}</span> · <b>${esc(n.region)}${n.side&&n.side!=="central"?" "+esc(n.side):""}</b>${n.zone?` <span style="color:var(--c-mist)">(${esc(n.zone)})</span>`:""} · ${esc(n.struct)} · sev <b>${n.sev}</b> · ${esc(n.timing)} · ${esc(n.warmup)}${n.ref?` · <span style="color:var(--c-mist)">${esc(n.ref)}</span>`:""}${n.note?`<br><span style="color:var(--c-mist)">${esc(n.note)}</span>`:""}</div>`).join("");
    const pickZone=this.nigPick?ANATOMY_ZONES.find(z=>z.id===this.nigPick):null;
    let formPre=null, formMissing=[];
    if(this.nigDraft){ formPre=Object.assign({},this.nigDraft.obj); formMissing=this.nigDraft.missing;
      if(pickZone){ /* a deliberate map tap fills what extraction left null */
        if(formPre.region==null){ formPre.region=pickZone.region; formMissing=formMissing.filter(k=>k!=="region"); }
        if(formPre.side==null&&pickZone.side){ formPre.side=pickZone.side; formMissing=formMissing.filter(k=>k!=="side"); }
        if(!formPre.zone) formPre.zone=pickZone.zone; } }
    else if(pickZone){ formPre={region:pickZone.region,side:pickZone.side,zone:pickZone.zone}; }
    const mapCard=`<div class="card">
      <div class="eyebrow" style="color:var(--c-teal)">Body map — tap where it registers ${this.infoBtn("bodymap")}</div>
      ${this.infoPanel("bodymap")}
      <div style="display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:12px">
        <div>${anatomySVG("front",counts,this.nigPick)}<div class="note" style="text-align:center;margin-top:4px">front</div></div>
        <div>${anatomySVG("rear",counts,this.nigPick)}<div class="note" style="text-align:center;margin-top:4px">rear</div></div>
      </div>
      <div class="note" style="margin-top:8px">Zones tint amber at ×2 and red at ×3 recurrences of the same region+side — same rule as the chips below. Tap a zone to open a pre-filled entry; or dictate into the voice box and ✦ Extract.</div>
      ${formPre?`<div style="margin-top:10px;border-top:1px solid var(--c-contour);padding-top:4px">
        <div class="eyebrow" style="color:${C.amber};margin-top:8px">${this.nigDraft?"Confirm extracted niggle":"Log niggle — "+esc(pickZone?pickZone.zone+(pickZone.side!=="central"?" ("+pickZone.side+")":""):"")}</div>
        ${this.niggleFormHTML(formPre,formMissing)}</div>`:""}
    </div>`;
    return mapCard+`<div class="card">
      <div class="eyebrow" style="color:var(--c-amber)">Niggle log — recurrence watch ${this.infoBtn("niggles")}</div>
      ${this.infoPanel("niggles")}
      ${ns.length?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${chips}</div>
        <div style="margin-top:10px">${rows}</div>${ns.length>10?`<div class="note" style="margin-top:6px">…${ns.length-10} older entries in state</div>`:""}`
      :`<div class="note" style="margin-top:8px">No niggles logged — good. Log via the Data tab the moment something registers; the amber/red chips fire at ×2/×3 recurrences of the same region+side.</div>`}
    </div>`;

  addEvent(){
    const name=qs("ev_name").value.trim(), date=qs("ev_date").value.trim();
    if(!name||!/^\d{4}-\d{2}-\d{2}$/.test(date)) return this.flash("Need a name + date as YYYY-MM-DD");
    this.state.events.push({id:"ev"+Date.now(), name, date, km:num(qs("ev_km").value), gain:num(qs("ev_gain").value), url:qs("ev_url").value.trim(), site:qs("ev_site").value.trim(), notes:qs("ev_notes").value.trim(), profile:null});
    this.persist(); this.render(); this.flash("Event added");
  },
  setEvLinks(id){
    const ev=(this.state.events||[]).find(e=>e.id===id); if(!ev) return;
    ev.site=qs("evl_site").value.trim(); ev.url=qs("evl_url").value.trim();
    this.evEdit=null; this.persist(); this.render(); this.flash("Links saved");
  },
  delEvent(id){
    const i=(this.state.events||[]).findIndex(e=>e.id===id); if(i<0) return;
    if(typeof confirm==="function" && !confirm(`Remove "${this.state.events[i].name}"? (its GPX profile goes with it)`)) return;
    this.state.events.splice(i,1); this.persist(); this.render(); this.flash("Event removed");
  },
  pickGPX(id){
    const ev=(this.state.events||[]).find(e=>e.id===id); if(!ev) return;
    const inp=document.createElement("input"); inp.type="file"; inp.accept=".gpx,application/gpx+xml,text/xml";
    inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
      if(f.size>15*1024*1024) return this.flash("GPX too large (>15 MB) — export a lighter track");
      const rd=new FileReader();
      rd.onload=()=>{
        const parsed=parseGPX(String(rd.result||""));
        if(!parsed) return this.flash("No track points found in that GPX");
        const prof=downsampleProfile(parsed.distKm, parsed.ele, 200, parsed.lat, parsed.lon);
        if(JSON.stringify(prof).length>60000) return this.flash("Profile too large after downsampling — quota guard tripped");
        ev.profile=prof;
        this.persist(); this.render();
        this.flash(parsed.ele?`GPX imported — ${fmt(parsed.totalKm,1)} km profile stored (${prof.distKm.length} pts)`:"GPX imported without <ele> — distance only, no elevation thumbnail");
      };
      rd.onerror=()=>this.flash("Could not read that file");
      rd.readAsText(f);
    };
    inp.click();
  },
